<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Little Storybook</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,700;0,800;0,900;1,700&family=Fredoka+One&display=swap"
    rel="stylesheet" />
  <style>
    /* ── Responsive scaling ── */
    .book-scene {
      position: absolute;
      top: max(40px, 6vh) !important;
      left: 50%;
      transform: translateX(-50%) scale(var(--book-scale, 1));
      transform-origin: top center;
    }

    /* ── Preloader ── */
    #preloader {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: var(--theme-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Fredoka One', 'Nunito', sans-serif;
      transition: opacity .5s ease;
    }

    #preloader.hide {
      opacity: 0;
      pointer-events: none;
    }

    /* Loader stage: book SVG matches open-book height (~472px), title + start button overlay it */
    .loader-stage {
      position: relative;
      width: min(78vw, 560px);
      height: min(54vh, 360px);
      margin-top: 8vh;
      /* invisible header safe area so book never touches top */
      display: flex;
      align-items: center;
      justify-content: center;
      animation: loaderBounce 2.4s ease-in-out infinite;
    }

    @keyframes loaderBounce {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    .loader-book {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loader-book svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 18px 36px rgba(0, 0, 0, .30)) drop-shadow(0 6px 12px rgba(0, 0, 0, .18));
    }

    .loader-overlay {
      /* Cover face area (portrait orientation, widened by non-uniform scaling) */
      position: absolute;
      z-index: 2;
      left: 18.4%;
      right: 20.7%;
      top: 10%;
      height: 72%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .loader-text {
      font-family: 'Fredoka One', 'Nunito', sans-serif;
      font-size: clamp(18px, 3vw, 30px);
      color: #ffffff;
      text-shadow: 0 2px 0 rgba(0, 0, 0, .18), 0 4px 12px rgba(0, 0, 0, .25);
      letter-spacing: .5px;
      margin-bottom: 14px;
      padding: 0 8px;
    }

    .loader-bar-wrap {
      width: min(75%, 170px);
      height: 7px;
      background: rgba(255, 255, 255, .25);
      border-radius: 6px;
      overflow: hidden;
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, .2);
    }

    .loader-bar {
      height: 100%;
      width: 0%;
      background: #ffffff;
      border-radius: 6px;
      transition: width .3s ease;
      box-shadow: 0 0 8px rgba(255, 255, 255, .6);
    }

    /* Loader book SVG — paths use class hooks for theming */
    .loader-book .lb-cover {
      fill: var(--theme-cover);
    }

    .loader-book .lb-cover-light {
      fill: var(--theme-cover-light);
    }

    .loader-book .lb-cover-dark {
      fill: var(--theme-cover);
    }

    .loader-book .lb-pages {
      fill: #ffffff;
    }

    .loader-book .lb-pages-edge {
      fill: #ffffff;
    }

    .loader-book .lb-spine {
      fill: #FFB6CE;
    }

    .loader-book .lb-spine-light {
      fill: #FFB6CE;
    }

    .loader-book .lb-spine-light {
      fill: #616161;
    }

    /* Responsive book scaling handled by JS via --book-scale */

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--theme-bg);
      font-family: 'Nunito', sans-serif;
    }

    /* ── Theme tokens (set by JS via THEMES[ACTIVE_THEME]) ── */
    :root {
      /* Defaults match ACTIVE_THEME ('pawYellow') to avoid initial-paint flash */
      --theme-bg: #c4a2ff !important;
      --theme-cover: #7B2630;
      --theme-cover-dark: #5C1B23;
      --theme-cover-light: #9C3641;
      --theme-accent: #7B2630;
      --theme-decor: rgba(243, 180, 42, .55);
    }

    html,
    body,
    #preloader {
      background: var(--theme-bg);
    }

    /* ── Centered book scene ── */
    .book-scene {
      position: absolute;
      top: 53%;
      left: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Purple hardcover wrap — left spine border only ── */
    .book-cover-wrap {
      position: relative;
      background: var(--theme-cover);
      padding: 0 0 0 5px;
      border-radius: 0;
      filter:
        drop-shadow(0 20px 40px rgba(0, 0, 0, .38)) drop-shadow(0 6px 14px rgba(0, 0, 0, .22));
    }

    .book-cover-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(to bottom, rgba(255, 255, 255, .07) 0%, transparent 35%, rgba(0, 0, 0, .06) 100%);
      border-radius: inherit;
    }

    /* ── Flipbook sizing (single-page landscape) ── */
    .flipbook-viewport {
      overflow: hidden;
      width: 820px;
      height: 472px;
      position: relative;
    }

    .flipbook-viewport .container {
      position: absolute;
      top: 50%;
      left: 50%;
    }

    #flipbook {
      width: 820px;
      height: 472px;
      position: relative;
      left: -410px;
      top: -236px;
    }

    /* turn.js page styles — single page is the full landscape size */
    .flipbook-viewport .page {
      width: 820px;
      height: 472px;
      background-color: #fff;
      background-repeat: no-repeat;
      background-size: 100% 100%;
      border-radius: 4px 10px 10px 4px;
      overflow: hidden;
    }

    /* Subtle paper curve — soft inset shadow along the outer (right) edge
               gives the illusion of a gentle page bow without distorting content. */
    .flipbook-viewport .page::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: inherit;
      box-shadow:
        inset -14px 0 22px -14px rgba(0, 0, 0, 0.22),
        inset 6px 0 12px -8px rgba(0, 0, 0, 0.10);
      z-index: 50;
    }

    /* Make the back face of a turning page mirror the same artwork (no white/purple flash).
               turn.js renders the folded leaf inside .turn-page-wrapper and uses ::after as the back face.
               We apply the current page's artwork to that back face via a CSS variable set in JS. */
    .flipbook-viewport .page.fixed,
    .flipbook-viewport .turn-page-wrapper .page {
      background-color: #fff;
    }

    .flipbook-viewport .turn-page-wrapper {
      background-image: var(--back-face-image, none) !important;
      background-color: var(--back-face-color, #fff) !important;
      background-size: 100% 100% !important;
      background-repeat: no-repeat !important;
      background-position: 0 0 !important;
      border-radius: 4px 10px 10px 4px;
    }

    .flipbook .page {
      box-shadow: 0 2px 6px rgba(0, 0, 0, .12), 0 0 22px rgba(0, 0, 0, .18)
    }

    .flipbook-viewport .shadow {
      transition: box-shadow .5s;
      box-shadow: 0 0 20px #bbb
    }

    /* ── Binding overlay — sits on the LEFT edge of the book ── */
    .book-spine {
      position: absolute;
      top: 0;
      left: 0;
      width: 18px;
      height: 100%;

      cursor: pointer;
      /* clickable to go back */
      background: linear-gradient(to right,
          rgba(0, 0, 0, 0.35) 0%,
          rgba(0, 0, 0, 0.22) 40%,
          rgba(0, 0, 0, 0.10) 75%,
          rgba(0, 0, 0, 0) 100%);
      box-shadow: 2px 0 6px -1px rgba(0, 0, 0, 0.18) inset;
    }

    .book-spine::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      width: 3px;
      background: linear-gradient(to bottom, var(--theme-cover-dark), var(--theme-cover), var(--theme-cover-dark));
      border-radius: 0 2px 2px 0;
    }

    /* ── Page turn hint — corner peel (cornerTease) ── */
    .page-turn-hint {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 76px;
      height: 76px;
      z-index: 9998;
      pointer-events: none;
      transform: scale(0);
      transform-origin: 100% 100%;
      background: linear-gradient(315deg, #f5f5ed 0%, #e8e8de 26%, rgba(0,0,0,0.14) 45%, transparent 54%);
      box-shadow: -4px -4px 12px rgba(0,0,0,0.22);
    }

    .page-turn-hint.active {
      animation: cornerTease 2.8s ease-in-out forwards;
    }

    @keyframes cornerTease {
      0%   { transform: scale(0);    opacity: 0; }
      18%  { transform: scale(1);    opacity: 1; }
      40%  { transform: scale(0.28); opacity: 0.8; }
      62%  { transform: scale(0.85); opacity: 1; }
      82%  { transform: scale(0.22); opacity: 0.65; }
      100% { transform: scale(0);    opacity: 0; }
    }

    .page-next-zone {
      position: absolute;
      top: 0;
      right: 0;
      width: 70px;
      height: 100%;
      z-index: 9997;
      cursor: pointer;
      touch-action: manipulation;
      background: transparent;
    }

    .page-next-zone::after {
      content: '';
      position: absolute;
      right: 0;
      bottom: 0;
      width: 42px;
      height: 42px;
      background: linear-gradient(315deg, rgba(255, 255, 255, .74) 0 45%, rgba(0, 0, 0, .10) 50%, transparent 56%);
      opacity: 0;
      transform: scale(.86);
      transform-origin: bottom right;
      transition: opacity .18s ease, transform .18s ease;
      pointer-events: none;
    }

    .page-next-zone:hover::after {
      opacity: .62;
      transform: scale(1);
    }

    .page-next-zone.hide {
      display: none;
    }


    /* ── Page stack below cover — hidden, no bottom border ── */
    .page-stack {
      display: none;
      width: 825px;
      margin-top: 0;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .page-stack::before {
      content: '';
      position: absolute;
      top: -1px;
      bottom: 0;
      left: 0;
      width: 5px;
      background: var(--theme-cover);
      z-index: 0;
    }

    .page-stack-inner {
      display: none;
      width: 820px;
      height: 24px;
      background-image: repeating-linear-gradient(to bottom,
          #f0f0f8 0px, #f0f0f8 3.5px,
          #d8d8e8 3.5px, #d8d8e8 6px);
      border-radius: 0 0 10px 10px;
      position: relative;
      z-index: 1;
      overflow: hidden;
    }

    .page-stack-inner::before {
      content: '';
      display: block;
      height: 100%;
      background: linear-gradient(to right, rgba(150, 150, 185, .45) 0%, transparent 7%, transparent 93%, rgba(150, 150, 185, .45) 100%);
      border-radius: inherit;
    }

    /* Purple hardcover strip — hidden */
    .page-stack-purple {
      display: none;
      width: 825px;
      height: 10px;
      background: var(--theme-cover);
      border-radius: 0 0 10px 10px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, .22), 0 3px 6px rgba(0, 0, 0, .1);
      position: relative;
      z-index: 1;
    }

    /* ── Spine tab — hidden with bottom border ── */
    .spine-tab {
      display: none;
      width: 60px;
      height: 22px;
      background: linear-gradient(to bottom, var(--theme-cover), var(--theme-cover-dark));
      border-radius: 0 0 30px 30px;
      box-shadow: 0 6px 14px rgba(0, 0, 0, .26);
      position: absolute;
      left: 5px;
      /* flush against left edge — represents binding */
      top: 100%;
      /* sits immediately below the page-stack with no gap */
      margin-top: -1px;
      z-index: 2;
    }

    /* ── Page counter ── */
    .pg-cnt {
      margin-top: 10px;
      font-size: 28px;
      font-weight: 900;
      color: var(--theme-accent);
      letter-spacing: .5px;
      font-family: 'Fredoka One', 'Nunito', sans-serif;
    }

    /* ── Text/dialogue overlay — sits OVER the flipbook, not inside pages ──
               Avoids overflow:hidden clipping from turn.js page-wrappers
            ── */

    /* Narrator text bar */
    /* (unified into the second .text-bar rule below) */

    /* Character dialogue bubbles */

    /* ── Replay btn ── */
    #replayBtn {
      position: fixed;
      top: 18px;
      right: 18px;
      background: rgba(255, 255, 255, .32);
      border: none;
      border-radius: 22px;
      color: #2D3561;
      font-size: 13px;
      font-weight: 800;
      padding: 8px 18px;
      cursor: pointer;
      transition: background .15s;
      z-index: 9999;
      display: none;
      align-items: center;
      gap: 5px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .1);
      font-family: 'Nunito', sans-serif;
    }

    #replayBtn:hover {
      background: rgba(255, 255, 255, .55)
    }

    #replayBtn.show {
      display: flex
    }

    /* Dummy pages hidden */
    .dummy-page {
      visibility: hidden;
    }

    .cover-title-wrap {
      position: absolute;
      top: 20px;
      left: 16px;
      right: 16px;
      background: rgba(50, 0, 110, .5);
      border-radius: 10px;
      padding: 10px 16px;
      text-align: center;
      z-index: 3;
      box-shadow: inset 0 0 0 1.5px rgba(255, 255, 255, .1), 0 4px 12px rgba(0, 0, 0, .25);
    }

    .cover-title-text {
      font-family: 'Fredoka One', 'Nunito', sans-serif;
      font-size: 22px;
      font-weight: 400;
      color: white;
      line-height: 1.25;
      text-shadow: 0 2px 8px rgba(0, 0, 0, .4);
    }

    .cover-stars {
      position: absolute;
      bottom: 22px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 18px;
      letter-spacing: 6px;
      color: rgba(255, 255, 255, .75);
      text-shadow: 0 1px 4px rgba(0, 0, 0, .3);
    }

    .cover-hint {
      position: absolute;
      bottom: 6px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 11px;
      color: rgba(255, 255, 255, .42);
      font-weight: 700;
      letter-spacing: .3px;
    }

    /* Word animation */


    /* Dummy pages — completely invisible, just fix turn.js pairing */
    .dummy-page {
      background: transparent !important;
      box-shadow: none !important;
      visibility: hidden;
    }

    .gradient {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 100;
    }

    /* ── Story overlay — sits OVER the flipbook, no turn.js clipping ── */
    #storyOverlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 50;
      pointer-events: none !important;
      /* Center everything to the book spread */
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Text bar: spans full width, gradient from transparent to blue */
    #storyOverlay .text-bar {
      width: 100%;
      height: 0;
      overflow: hidden;
      padding: 0 60px;
      background: linear-gradient(to bottom,
          rgba(30, 58, 175, 0) 0%,
          rgba(30, 58, 175, .62) 28%,
          rgba(28, 54, 168, .96) 52%,
          rgba(26, 50, 158, 1) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: height .35s ease, padding .35s ease;
    }

    #storyOverlay .text-bar.active {
      height: 145px;
      padding: 40px 60px 16px;
    }

    .story-text {
      color: white;
      font-family: 'Fredoka One', 'Nunito', sans-serif;
      font-size: 23px;
      line-height: 1.45;
      text-align: center;
      text-shadow: 0 1px 8px rgba(0, 0, 0, .4);
      max-width: 680px;
    }

    /* Word animation */
    .w {
      display: inline;
      opacity: 0;
      transition: opacity .08s ease;
    }

    .w.on {
      opacity: 1;
    }

    .w::after {
      content: ' ';
    }

    /* Dialogue bubbles — centered to book, left-aligned text */
    #storyOverlay .dial-layer {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 0 0 16px 0;
      width: 560px;
      /* fixed width so bubbles stay centered to book */
      align-items: flex-start;
    }

    .dbubble {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      /* Less pale — stronger white with more visible shadow */
      background: rgba(255, 255, 255, .93);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 10px;
      /* Tighter padding — less chunky */
      padding: 5px 12px 5px 6px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, .22), 0 1px 4px rgba(0, 0, 0, .12);
      opacity: 0;
      transform: translateY(6px);
      transition: opacity .22s ease, transform .22s ease;
      align-self: flex-start;
    }

    .dbubble.show {
      opacity: 1;
      transform: translateY(0);
    }

    .dbubble.dim {
      opacity: .38;
      transform: translateY(0);
    }

    /* Smaller rectangular avatar */
    .bav {
      width: 36px;
      height: 32px;
      border-radius: 7px;
      flex-shrink: 0;
      overflow: hidden;
      border: 1.5px solid rgba(0, 0, 0, .1);
      box-shadow: 0 1px 4px rgba(0, 0, 0, .15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      background: rgba(240, 248, 255, .8);
    }

    .bav img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 5px;
    }

    .bt {
      font-size: 14px;
      font-weight: 700;
      color: #111827;
      line-height: 1.35;
      text-align: left;
    }


    /* ── Count page ── */
    .count-page-overlay {
      position: absolute;
      inset: 0;
      z-index: 60;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .count-text {
      font-family: 'Fredoka One', 'Nunito', sans-serif;
      font-size: 38px;
      color: #FFFFFF;
      text-align: center;
      text-shadow: 0 2px 8px rgba(0, 0, 0, .3);
      opacity: 0;
      transform: scale(0.7);
      animation: countPop .6s ease forwards;
    }

    @keyframes countPop {
      0% {
        opacity: 0;
        transform: scale(0.7);
      }

      60% {
        opacity: 1;
        transform: scale(1.1);
      }

      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* Star confetti from corners */
    .confetti-container {
      position: fixed;
      inset: 0;
      z-index: 99998;
      pointer-events: none;
      overflow: hidden;
    }

    .confetti-star {
      position: absolute;
      width: var(--cs-size, 24px);
      height: var(--cs-size, 24px);
      will-change: transform, opacity;
      animation: confettiFly var(--cs-dur, 3.5s) cubic-bezier(.18, .7, .4, 1) forwards;
      animation-delay: var(--cs-delay, 0s);
      opacity: 0;
      filter: drop-shadow(0 2px 4px rgba(120, 80, 0, .35));
    }

    @keyframes confettiFly {
      0% {
        opacity: 0;
        transform: translate(0, 0) rotate(0deg) scale(.6);
      }

      8% {
        opacity: 1;
      }

      60% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        transform: translate(var(--cs-tx), var(--cs-ty)) rotate(var(--cs-rot, 540deg)) scale(1);
      }
    }

    /* Star burst (legacy, kept for any other uses) */
    .star-particle {
      position: fixed;
      pointer-events: none;
      z-index: 99999;
      width: var(--star-size, 24px);
      height: var(--star-size, 24px);
      animation: starBurst var(--star-dur) ease-out forwards;
    }

    @keyframes starBurst {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1) rotate(0deg);
      }

      100% {
        opacity: 0;
        transform: translate(var(--sx), var(--sy)) scale(0.3) rotate(360deg);
      }
    }

    /* ── Inline quiz page ── */
    .quiz-scene {
      position: relative;
      width: 820px;
      height: 472px;
      overflow: hidden;
      isolation: isolate;
      font-family: 'Nunito', sans-serif;
      background: #241336;
    }

    .quiz-bg {
      position: absolute;
      inset: 0;
      width: 820px;
      height: 472px;
      pointer-events: none;
      user-select: none;
    }

    .quiz-option {
      position: absolute;
      z-index: 10;
      cursor: pointer;
      border-radius: 26px;
      filter: drop-shadow(0 13px 20px rgba(40, 18, 66, .24));
      transform-origin: center;
      transition: transform .2s ease, filter .2s ease, opacity .2s ease;
      -webkit-user-drag: none;
      user-select: none;
    }

    #q1o1 {
      left: 20px;
      top: 80px;
      width: 337px;
      height: 249px;
    }

    #q1o2 {
      left: 510px;
      top: 110px;
      width: 259px;
      height: 190px;
    }

    #q1s.is-question .quiz-option:hover {
      transform: translateY(-5px) scale(1.035);
      filter: drop-shadow(0 18px 28px rgba(40, 18, 66, .34)) drop-shadow(0 0 18px rgba(255, 244, 184, .38));
    }

    #q1s.is-question .quiz-option:active {
      transform: translateY(-1px) scale(1.01);
    }

    #q1s.is-correct .quiz-option,
    #q1s.is-wrong .quiz-option {
      cursor: default;
      pointer-events: none;
    }

    #q1s.is-correct #q1o1 {
      opacity: .34;
      transform: translate(-12px, 4px) scale(.9);
      filter: blur(.25px) saturate(.72) drop-shadow(0 8px 12px rgba(40, 18, 66, .14));
    }

    #q1s.is-correct #q1o2 {
      left: 478px;
      top: 94px;
      width: 316px;
      height: 232px;

    #q7s.is-wrong .quiz-option { cursor: default; pointer-events: none; }

    #q7s.is-correct #q7o1 {
      left: 18px; top: 72px; width: 324px; height: 244px;
      animation: quizCorrectPop .58s cubic-bezier(.18, 1.3, .32, 1) both;
      filter: drop-shadow(0 15px 22px rgba(27, 93, 38, .28)) drop-shadow(0 0 18px rgba(73, 255, 96, .48));
    }

    #q7s.is-correct #q7o2 {
      opacity: .34;
      transform: translate(8px, 4px) scale(.92);
      filter: blur(.25px) saturate(.72) drop-shadow(0 8px 12px rgba(40, 18, 66, .14));
    }

    #q7s.is-wrong #q7o1 {
      opacity: .34;
      transform: translate(-8px, 2px) scale(.93);
      filter: blur(.25px) saturate(.72) drop-shadow(0 8px 12px rgba(40, 18, 66, .14));
    }

    #q7s.is-wrong #q7o2 {
      left: 452px; top: 78px; width: 360px; height: 248px;
      animation: quizWrongShake .44s ease both;
      filter: drop-shadow(0 16px 26px rgba(122, 17, 26, .35));
    }

    #q7dl, #q7dr { opacity: 0; }

    #q7s.is-correct .quiz-feedback { display: flex; }
    #q7s.is-wrong .quiz-retry { display: block; animation: quizNextIn .2s ease both; }
    #q7s.is-correct .quiz-next { display: block; animation: quizNextIn .34s .18s ease both; }

    @media (prefers-reduced-motion: reduce) {
      .quiz-option,
      .quiz-feedback,
      .quiz-next,
      .quiz-retry {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>

    function startSeq(si) {
      stopSeq();
      if (si < 0 || si >= TOTAL) return;
      var page = STORY.pages[si];
      var dialogs = page && Array.isArray(page.dialogues) ? page.dialogues : [];
      if (!page) return;
      if (!dialogs.length) { onDone(si); return; }
      seqActive = true;

      var isNarr = dialogs.every(function (d) { return d && d.type === 'narrator'; });
      if (isNarr) {
        var ws = $('#storyOverlay .story-text .w').get();
        ws.forEach(function (w) { $(w).removeClass('on'); });
        animSeq(ws, dialogs[0] && dialogs[0].audio, function () { onDone(si); });
      } else {
        playDial(si, 0);
      }
    }

    function stopSeq() {
      seqActive = false;
      wTimers.forEach(clearTimeout); wTimers = [];
      if (actAudio) { try { actAudio.pause(); actAudio.src = ''; } catch (e) { } actAudio = null; }
    }

    function playDial(si, di) {
      if (!seqActive) return;
      var page = STORY.pages[si];
      var dialogs = page && Array.isArray(page.dialogues) ? page.dialogues : [];
      if (!page || di >= dialogs.length) { onDone(si); return; }
      var d = dialogs[di];
      if (!d) { onDone(si); return; }

      for (var i = 0; i < di; i++) {
        $('#db-' + si + '-' + i).removeClass('show').addClass('dim');
      }
      var $b = $('#db-' + si + '-' + di);
      if (!$b.length) { playDial(si, di + 1); return; }
      $b.find('.w').removeClass('on');
      setTimeout(function () { $b.addClass('show'); }, 30);

      animSeq($b.find('.w').get(), d.audio, function () {
        if (!seqActive) return;
        $b.find('.w').addClass('on');
        var t = setTimeout(function () { playDial(si, di + 1); }, 480);
        wTimers.push(t);
      });
    }

    function animSeq(ws, src, cb) {
      var doW = function (ms) {
        ms = ms || Math.max(ws.length * 220, 900);
        var gap = ms / Math.max(ws.length, 1);
        ws.forEach(function (el, i) {
          var t = setTimeout(function () { if (seqActive) $(el).addClass('on'); }, i * gap);
          wTimers.push(t);
        });
      };
      if (src) {
        var a = new Audio(src); actAudio = a; a.volume = 1;
        a.addEventListener('loadedmetadata', function () { doW(a.duration * 1000); });
        a.addEventListener('error', function () { doW(); });
        a.addEventListener('ended', cb);
        a.play().catch(function () { doW(); var t = setTimeout(cb, ws.length * 220 + 300); wTimers.push(t); });
      } else {
        var dur = Math.max(ws.length * 210, 800); doW(dur);
        var t = setTimeout(cb, dur + 240); wTimers.push(t);

    function playPageTurnSound(direction) {
      try {
        var key = direction === 'back' ? '__pageTurnSound_back' : '__pageTurnSound_forward';
        if (window[key]) {
          var s = window[key].cloneNode(true);
          s.volume = 1.0;
          var pp = s.play();
          if (pp && pp.catch) pp.catch(function () {
            try { window[key].currentTime = 0; window[key].volume = 1.0; window[key].play(); } catch (e) { }
          });
          return;
        }
        /* Synth fallback: short paper-swish using WebAudio noise burst */
        var Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return;
        var ctx = window.__pageTurnCtx || (window.__pageTurnCtx = new Ctx());
        var dur = 0.35;
        var buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
        var data = buf.getChannelData(0);
        for (var i = 0; i < data.length; i++) {
          var t = i / data.length;
          data[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, 2.2) * 0.5;
        }
        var src = ctx.createBufferSource(); src.buffer = buf;
        var bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 2200; bp.Q.value = 0.8;
        var gain = ctx.createGain(); gain.gain.value = 0.6;
        src.connect(bp).connect(gain).connect(ctx.destination);
        src.start();
      } catch (e) { }
    }

    function playQuizFeedbackSound(kind) {
      if (kind === 'incorrect') {
        try { var oa = new Audio('audio/oops!wrong .mp3'); oa.volume = 0.9; oa.play().catch(function () { }); } catch (e) { }
        return;
      }
      try {
        var Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return;
        var ctx = window.__quizFeedbackCtx || (window.__quizFeedbackCtx = new Ctx());
        if (ctx.state === 'suspended') ctx.resume();

        var master = ctx.createGain();
        master.gain.value = 0.42;
        master.connect(ctx.destination);

        function tone(freq, start, dur, type, peak) {
          var osc = ctx.createOscillator();
          var gain = ctx.createGain();
          osc.type = type || 'sine';
          osc.frequency.setValueAtTime(freq, start);
          gain.gain.setValueAtTime(0.0001, start);
          gain.gain.exponentialRampToValueAtTime(peak || 0.34, start + 0.018);
          gain.gain.exponentialRampToValueAtTime(0.0001, start + dur);
          osc.connect(gain).connect(master);
          osc.start(start);
          osc.stop(start + dur + 0.03);
        }

        var now = ctx.currentTime + 0.015;
        if (kind === 'correct') {
          [523.25, 659.25, 783.99, 1046.5].forEach(function (freq, i) {
            tone(freq, now + i * 0.075, 0.22, 'triangle', 0.25);
          });
          tone(1318.5, now + 0.28, 0.26, 'sine', 0.16);
        } else {
          var osc = ctx.createOscillator();
          var gain = ctx.createGain();
          var filter = ctx.createBiquadFilter();
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(230, now);
          osc.frequency.exponentialRampToValueAtTime(115, now + 0.34);
          filter.type = 'lowpass';
          filter.frequency.setValueAtTime(980, now);
          filter.frequency.exponentialRampToValueAtTime(320, now + 0.34);
          gain.gain.setValueAtTime(0.0001, now);
          gain.gain.exponentialRampToValueAtTime(0.22, now + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.34);
          osc.connect(filter).connect(gain).connect(master);
          osc.start(now);
          osc.stop(now + 0.39);
          tone(92, now + 0.11, 0.18, 'sine', 0.2);
        }
      } catch (e) { }
    }

    function fireBalloons() {
      /* Golden star confetti shooting from bottom-left and bottom-right corners */
      $('.confetti-container').remove();
      $('.balloon-container').remove();
      /* Play confetti pop sound */
      try {
        var pop = new Audio('confetti-pop.mp3');
        pop.volume = 0.9;
        pop.play().catch(function () { });
      } catch (e) { }
      var $c = $('<div class="confetti-container"></div>');
      document.body.appendChild($c[0]);

      var vw = window.innerWidth;
      var vh = window.innerHeight;

      function shoot(side, count, baseDelay) {
        for (var i = 0; i < count; i++) {
          var el = document.createElement('div');
          el.className = 'confetti-star';
          el.innerHTML = makeGoldStarSVG();

          /* Origin: bottom-left or bottom-right corner */
          var originX = side === 'left' ? -10 : vw + 10;
          var originY = vh + 10;
          el.style.left = originX + 'px';
          el.style.top = originY + 'px';

          /* Varied star sizes */
          var size = 14 + Math.random() * 42; /* 14–56px */
          el.style.setProperty('--cs-size', size + 'px');

          /* Aim toward upper-opposite area, fanning out */
          /* Left cannon: aim up-right (angles ~ -75° to -25° from +x axis)
             Right cannon: aim up-left (~180+25° to 180+75°) */
          var angle;
          if (side === 'left') {
            angle = (-75 + Math.random() * 50) * Math.PI / 180;
          } else {
            angle = (180 + 25 + Math.random() * 50) * Math.PI / 180;
          }
          var dist = vw * (0.55 + Math.random() * 0.55); /* travel far across viewport */
          var tx = Math.cos(angle) * dist;
          var ty = Math.sin(angle) * dist - Math.random() * vh * 0.25; /* extra lift */
          el.style.setProperty('--cs-tx', tx + 'px');
          el.style.setProperty('--cs-ty', ty + 'px');

          /* Rotation & timing */
          var rot = (Math.random() * 720 + 360) * (Math.random() < 0.5 ? -1 : 1);
          el.style.setProperty('--cs-rot', rot + 'deg');
          el.style.setProperty('--cs-dur', (2.6 + Math.random() * 1.8) + 's');
          el.style.setProperty('--cs-delay', (baseDelay + Math.random() * 0.6) + 's');

          $c[0].appendChild(el);
        }
      }

      /* Two bursts per side for a fuller effect */
      shoot('left', 28, 0);
      shoot('right', 28, 0);
      shoot('left', 18, 0.8);
      shoot('right', 18, 0.8);

      /* Cleanup */
      setTimeout(function () { $c.remove(); }, 7000);
    }

    /* ── loadApp ── */
    function loadApp() {
      var $fb = $('#flipbook');
      if ($fb.width() === 0 || $fb.height() === 0) { setTimeout(loadApp, 10); return; }

      $('#flipbook').turn({
        width: 820,
        height: 472,
        display: 'single',
        elevation: 50,
        gradients: true,
        autoCenter: true,
        acceleration: true,
        duration: 680,
        direction: 'ltr',
        when: {
          turning: function (e, page, view) {
            /* Block navigation to dummy pages (first and last) */
            var lastPage = TOTAL + 2;
            if (page <= 1 || page >= lastPage) { e.preventDefault(); return; }
            /* Play directional page-turn sound */
            var curP = $('#flipbook').turn('page');
            var goingForward = page > curP;
            playPageTurnSound(goingForward ? 'forward' : 'back');
            /* Mirror the back face of the folding leaf with the SAME artwork as the
               destination page, so while flipping both sides show the same image. */
            try {
              var destPage = $('#flipbook .page').eq(page - 1);
              var bgImg = destPage.css('background-image');
              var bgCol = destPage.css('background-color');
              if (!bgImg || bgImg === 'none') {
                /* Fallback to the current page if destination has no bg yet */
                var cur = $('#flipbook .page').eq(curP - 1);
                bgImg = cur.css('background-image');
                bgCol = cur.css('background-color');
              }
              var fbEl = document.querySelector('.flipbook-viewport');
              if (fbEl) {
                fbEl.style.setProperty('--back-face-image', (bgImg && bgImg !== 'none') ? bgImg : 'none');
                fbEl.style.setProperty('--back-face-color', bgCol || '#fff');
              }
            } catch (err) { }
            stopSeq();
            $('#replayBtn').removeClass('show');
            $('#storyOverlay').empty();
            $('.count-page-overlay').remove();
            $('.balloon-container').remove();
            $('.confetti-container').remove();
            /* Stop poem/quiz audio on page change */
            if (window.__currentPoemAudio) {
              try { window.__currentPoemAudio.pause(); window.__currentPoemAudio.src = ''; } catch (e) { }
              window.__currentPoemAudio = null;
            }
            if (window.__currentQuizAudio) {
              try { window.__currentQuizAudio.pause(); window.__currentQuizAudio.src = ''; } catch (e) { }
              window.__currentQuizAudio = null;
            }
            /* Pause all videos and clear sync intervals */
            $('#flipbook video').each(function () {
              try {
                if (this._syncInterval) clearInterval(this._syncInterval);
                this.pause();
              } catch (e) { }
            });
          },
          turned: function (e, page, view) {
            updateCounter(page);
            startMusic();
            /* Auto-play video on current page */
            if (curSpread >= 0) {
              var vid = $('#flipbook .page[data-si="' + curSpread + '"] video').get(0);
              if (vid) {
                try { vid.currentTime = 0; } catch (e) { }
                vid.muted = false;
                vid.play().catch(function () { });
                /* Poem audio: play at 72% of video duration */
                var poemMap = { 0: 'audio/poem1.mp3', 2: 'audio/poem2.mp3', 4: 'audio/poem3.mp3', 6: 'audio/poem4.mp3', 8: 'audio/poem5.mp3', 10: 'audio/poem6.mp3', 12: 'audio/poem7.mp3' };
                var poemSrc = poemMap[curSpread];
                if (poemSrc) {
                  vid._poemPlayed = false;
                  if (vid._poemHandler) vid.removeEventListener('timeupdate', vid._poemHandler);
                  vid._poemHandler = function () {
                    if (!vid._poemPlayed && vid.duration && vid.currentTime >= vid.duration * 0.72) {
                      vid._poemPlayed = true;
                      var pa = new Audio(poemSrc);
                      pa.volume = 1.0;
                      pa.play().catch(function () { });
                      window.__currentPoemAudio = pa;
                    }
                  };
                  vid.addEventListener('timeupdate', vid._poemHandler);
                }
              }
            }
            /* Quiz audio: play when navigating to a quiz page */
            var quizAudioMap = { 1: 'audio/q1.mp3', 3: 'audio/q2.mp3', 5: 'audio/q3.mp3', 7: 'audio/q4.mp3', 9: 'audio/q5.mp3', 11: 'audio/q6.mp3', 13: 'audio/q7.mp3' };
            if (quizAudioMap[curSpread]) {
              var qSrc = quizAudioMap[curSpread];
              setTimeout(function () {
                if (window.__currentQuizAudio) { try { window.__currentQuizAudio.pause(); window.__currentQuizAudio.src = ''; } catch (e) { } }
                window.__currentQuizAudio = new Audio(qSrc);
                window.__currentQuizAudio.volume = 1.0;
                window.__currentQuizAudio.play().catch(function () { });
              }, 600);
            }
            if (curSpread >= 0) {
              var curPage = STORY.pages[curSpread];
              if (curPage && curPage.isCountPage) {
                showCountPage();
              } else {
                buildOverlay(curSpread);
                setTimeout(function () { startSeq(curSpread); }, 350);
              }
            }
          }
        }
      });

      /* Corner-peel page-turn hint — inactivity-based, from reference implementation */
      var $cornerHint = $('<div class="page-turn-hint"></div>');
      var $nextZone = $('<div class="page-next-zone" aria-label="Next page" role="button" tabindex="0"></div>');
      $('.flipbook-viewport').append($cornerHint);
      $('.flipbook-viewport').append($nextZone);

      var _hintTimer = null, _hintPlaying = false;
      var HINT_DELAY = 3000, HINT_DUR = 2800;

      function _isLastPage() {
        try { return $('#flipbook').turn('page') >= STORY.pages.length + 2 - 1; } catch(e) { return false; }
      }

      function _playHint() {
        if (_hintPlaying || _isLastPage()) return;
        _hintPlaying = true;
        $cornerHint.removeClass('active');
        void $cornerHint[0].offsetWidth;
        $cornerHint.addClass('active');
        _hintTimer = setTimeout(function () {
          $cornerHint.removeClass('active');
          _hintPlaying = false;
          _scheduleHint();
        }, HINT_DUR);
      }

      function _scheduleHint() { clearTimeout(_hintTimer); _hintTimer = setTimeout(_playHint, HINT_DELAY); }
      function _cancelHint() { clearTimeout(_hintTimer); $cornerHint.removeClass('active'); _hintPlaying = false; _scheduleHint(); }

      _scheduleHint();
      $(document).on('mousemove.hint touchstart.hint mousedown.hint', _cancelHint);
      $('#flipbook').bind('turning', _cancelHint);

      function _updateNextZone() {
        try {
          var cur = $('#flipbook').turn('page');
          var lastPage = STORY.pages.length + 2;
          if (cur >= lastPage - 1) { $nextZone.addClass('hide'); }
          else { $nextZone.removeClass('hide'); }
        } catch(e) {}
      }
      setTimeout(_updateNextZone, 1200);
      $('#flipbook').bind('turned', function () { setTimeout(_updateNextZone, 400); });

      /* Jump to page 2 (first real spread) without animation */
      $('#flipbook').turn('page', 2);
      updateCounter(2);
      buildOverlay(0);
      setTimeout(function () { startSeq(0); }, 400);


      setTimeout(function () {
        var v = $('#flipbook .page[data-si="0"] video').get(0);
        if (v) {
          v.muted = false;
          v.removeAttribute('muted');
          v.play().catch(function () { });
        }
      }, 600);

      /* Click/tap left binding to go to previous page (mouse + touch + pointer) */
      var spineHandled = false;
      $('.book-spine').on('pointerdown mousedown touchstart', function (e) {
        if (spineHandled) return;
        spineHandled = true;
        setTimeout(function () { spineHandled = false; }, 300);
        e.preventDefault();
        $('#flipbook').turn('previous');
      });

      /* Right edge: media/html pages can swallow the native turn.js gesture, so
         this narrow edge target reliably starts the same animated turn. */
      var nextHandled = false;
      function goNextFromEdge(e) {
        if (nextHandled) return;
        nextHandled = true;
        setTimeout(function () { nextHandled = false; }, 320);
        e.preventDefault();
        e.stopPropagation();
        try { $('#flipbook').turn('next'); } catch (err) { }
      }
      $nextZone.on('pointerdown mousedown touchstart', goNextFromEdge);
      $nextZone.on('keydown', function (e) {
        if (e.key !== 'Enter' && e.key !== ' ') return;
        goNextFromEdge(e);
      });
    }

    /* ── Preload all videos, then show Start button ── */
    function preloadAllVideos(callback) {
      var videoUrls = [];
      STORY.pages.forEach(function (p) { if (p.video) videoUrls.push(p.video); });
      var unique = videoUrls.filter(function (v, i, a) { return a.indexOf(v) === i; });
      if (unique.length === 0) { showStartButton(callback); return; }

      var loaded = 0;
      var bar = document.getElementById('loaderBar');

      unique.forEach(function (url) {
        fetch(url).then(function (r) { return r.blob(); }).then(function (blob) {
          var blobUrl = URL.createObjectURL(blob);
          preloadedVideos[url] = blobUrl;
          loaded++;
          if (bar) bar.style.width = Math.round((loaded / unique.length) * 100) + '%';
          if (loaded === unique.length) onAllLoaded();
        }).catch(function () {
          loaded++;
          if (bar) bar.style.width = Math.round((loaded / unique.length) * 100) + '%';
          if (loaded === unique.length) onAllLoaded();
        });
      });

      function onAllLoaded() {
        /* Assign blob URLs to all video elements */
        var allVids = $('.spread-video').get();
        allVids.forEach(function (vid) {
          var si = parseInt(vid.getAttribute('data-spread'));
          var page = STORY.pages[si];
          if (page && page.video) {
            vid.src = preloadedVideos[page.video] || page.video;
          }
        });

        /* Warm up all videos: play muted briefly to prime the decoder,
           then pause & reset. This eliminates first-play flicker. */
        var warmCount = 0;
        var uniqueVids = [];
        var seen = {};
        allVids.forEach(function (v) {
          var key = v.getAttribute('data-spread') + '-' + v.getAttribute('data-side');
          if (!seen[key]) { seen[key] = true; uniqueVids.push(v); }
        });
        if (uniqueVids.length === 0) { showStartButton(callback); return; }

        function onWarm() {
          warmCount++;
          if (warmCount >= uniqueVids.length) {
            /* All warmed up — reset and show start */
            allVids.forEach(function (v) {
              try { v.pause(); v.currentTime = 0; } catch (e) { }
            });
            showStartButton(callback);
          }
        }

        uniqueVids.forEach(function (v) {
          v.muted = true;
          var played = false;
          function done() {
            if (played) return; played = true;
            try { v.pause(); v.currentTime = 0; } catch (e) { }
            onWarm();
          }
          /* Play and wait for at least one frame to render, then stop */
          v.addEventListener('playing', function warmHandler() {
            v.removeEventListener('playing', warmHandler);
            setTimeout(done, 150);
          });
          v.play().catch(function () { done(); });
          /* Fallback timeout in case 'playing' never fires */
          setTimeout(done, 2000);
        });
      }
    }

    var _appCallback = null;
    function showStartButton(callback) {
      _appCallback = callback;
      var btn = document.getElementById('startBtn');
      var barWrap = document.querySelector('.loader-bar-wrap');
      if (barWrap) barWrap.style.display = 'none';
      if (btn) btn.style.display = 'inline-block';
    }

    function startApp() {
      /* User clicked — now we can play audio */
      startMusic();
      /* Hide preloader */
      var pl = document.getElementById('preloader');
      if (pl) {
        pl.classList.add('hide');
        setTimeout(function () { pl.style.display = 'none'; }, 600);
      }
      if (_appCallback) setTimeout(_appCallback, 100);
    }

    $(document).keydown(function (e) {
      startMusic();
      if (e.key === 'ArrowRight') $('#flipbook').turn('next');
      if (e.key === 'ArrowLeft') $('#flipbook').turn('previous');
      if (e.key === ' ') replayPage();
    });

    initMusic();
    $(document).ready(function () { preloadAllVideos(loadApp); });
  </script>
</body>

</html>
