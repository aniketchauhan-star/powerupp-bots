<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PowerUp Bots </title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #d9e7ff;
      display: flex;
      align-items: center;
      justify-content: center
    }

    button {
      font: inherit
    }

    #game {
      position: absolute;
      width: 1280px;
      height: 720px;
      overflow: hidden;
      transform-origin: top left;
      font-family: "Trebuchet MS", "Arial Rounded MT Bold", Arial, sans-serif;
      color: #154aa5;
      user-select: none;
      background: #d9e7ff;
      isolation: isolate;
      --ease-in-out-soft: cubic-bezier(.65, 0, .35, 1);
      --ease-out-back: cubic-bezier(.18, .89, .32, 1.18);
      --ease-snap: cubic-bezier(.16, 1.18, .3, 1);
    }

    /* Screen transition fade overlay removed; it caused a visible white flash. */

    .bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      display: none;
    }

    .hidden {
      opacity: 0;
      pointer-events: none
    }

    #instruction {
      position: absolute;
      top: 8px;
      left: 32px;
      width: 1120px;
      height: 150px;
      z-index: 40;
      transition: opacity .28s ease, transform .28s ease;
    }

    #instruction {
      filter: drop-shadow(0 10px 16px rgba(77, 151, 220, .12));
    }

    #instruction.hidden {
      transform: translateY(-8px)
    }

    #game.teaching-active #instruction {
      opacity: 0 !important;
      pointer-events: none;
      visibility: hidden;
    }

    #instruction img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    #instructionText {
      position: absolute;
      left: 154px;
      right: 14px;
      top: 42px;
      min-height: 58px;
      display: flex;
      align-items: center;
      color: #154aa5;
      font-size: 26px;
      line-height: 1.14;
      font-weight: 900;
      letter-spacing: 0;
    }

    #scene {
      position: absolute;
      inset: 0;
      z-index: 5;
    }

    .bot-slot {
      position: absolute;
      width: 260px;
      height: 520px;
      transform-origin: bottom center;
    }

    .bot-slot::after {
      content: "";
      position: absolute;
      left: 50%;
      top: var(--power-spark-top, 510px);
      width: 18px;
      height: 18px;
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(.35);
      opacity: 0;
      background: radial-gradient(circle, #fff 0 18%, #8af3ff 32%, rgba(114, 219, 255, 0) 72%);
      box-shadow: 0 0 0 rgba(116, 219, 255, 0);
      pointer-events: none;
      z-index: 12;
    }

    .layout-ready.power-connecting .bot-slot::after {
      animation: connectionFlash .66s cubic-bezier(.18, .89, .32, 1.18) 1.58s both;
    }

    .layout-ready.power-connecting .right-bot::after {
      animation-delay: 1.75s;
    }

    .bot-img {
      position: absolute;
      left: 50%;
      bottom: 0;
      max-width: none;
      object-fit: contain;
      transform: translateX(-50%);
      transition: filter .35s ease, transform .45s cubic-bezier(.18, .89, .35, 1.18);
      z-index: 8;
      will-change: transform, filter;
      backface-visibility: hidden;
    }

    .bot-img.happy {
      filter: drop-shadow(0 0 16px rgba(116, 219, 255, .95));
    }

    .bot-slot.celebrate-jump {
      animation: botSlotCelebrateJump .72s ease-in-out 2;
    }

    .layout-ready.power-connecting .bot-img {
      animation: botPowerNotice 2.7s cubic-bezier(.65, 0, .35, 1) .92s both;
    }

    .layout-ready.power-connecting .right-bot .bot-img {
      animation-delay: 1.06s;
    }

    .electric-pulse {
      position: absolute;
      left: 50%;
      top: 150px;
      width: 4px;
      height: 40px;
      background: #fff;
      border-radius: 4px;
      box-shadow: 0 0 16px 6px #74dbff;
      transform: translateX(-50%);
      animation: pulseDown 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      z-index: 10;
    }

    @keyframes pulseDown {
      0% {
        transform: translate(-50%, 0);
        opacity: 1;
      }

      80% {
        transform: translate(-50%, 380px);
        opacity: 1;
      }

      100% {
        transform: translate(-50%, 380px);
        opacity: 0;
      }
    }

    @keyframes botSlotCelebrateJump {

      0%,
      100% {
        transform: translateY(0);
      }

      42% {
        transform: translateY(-14px);
      }
    }

    @keyframes botPowerNotice {

      0%,
      38%,
      100% {
        transform: translateX(-50%) translateY(0) scale(1);
        filter: none;
      }

      48% {
        transform: translateX(-50%) translateY(-5px) scale(1.018);
        filter: drop-shadow(0 0 10px rgba(116, 219, 255, .55));
      }

      59% {
        transform: translateX(-50%) translateY(1px) scale(.996);
      }
    }

    @keyframes connectionFlash {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(.35);
        box-shadow: 0 0 0 rgba(116, 219, 255, 0);
      }

      42% {
        opacity: .95;
        transform: translate(-50%, -50%) scale(1.2);
        box-shadow: 0 0 22px 10px rgba(116, 219, 255, .42);
      }

      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1.9);
        box-shadow: 0 0 36px 18px rgba(116, 219, 255, 0);
      }
    }

    .pod-img {
      position: absolute;
      left: 50%;
      top: 0;
      width: 134px;
      height: auto;
      transform: translateX(-50%);
      object-fit: contain;
      opacity: 0;
      transition: opacity .35s ease, filter .35s ease;
      z-index: 4;
      will-change: transform, opacity;
      backface-visibility: hidden;
    }

    .pod-img.visible {
      opacity: 1
    }

    .pod-img.glow {
      animation: podGlow 1s ease-in-out 2
    }

    .pod-img.front-layer {
      z-index: 60;
    }

    .pod-connector-neck-cover {
      position: absolute;
      left: 50%;
      width: var(--connector-cover-w, 20px);
      height: var(--connector-cover-h, 15px);
      transform: translateX(-50%);
      border-radius: 10px 10px 5px 5px;
      background:
        linear-gradient(90deg,
          rgba(213, 235, 255, .98) 0%,
          rgba(247, 253, 255, .98) 48%,
          rgba(197, 225, 249, .98) 100%);
      border: 1px solid rgba(126, 179, 214, .66);
      box-shadow:
        inset 0 1px 3px rgba(255, 255, 255, .82),
        inset 0 -2px 4px rgba(126, 179, 214, .28),
        0 0 4px rgba(56, 172, 223, .22);
      opacity: 0;
      pointer-events: none;
      z-index: 10;
    }

    .pod-connector-neck-cover::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -10px;
      width: 5px;
      height: 18px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: linear-gradient(90deg, #153d72 0%, #2e5d96 48%, #123866 100%);
      box-shadow: 0 0 2px rgba(74, 170, 240, .26);
    }

    .pod-connector-neck-cover.visible {
      opacity: 1;
    }

    @keyframes podGlow {

      0%,
      100% {
        filter: brightness(1)
      }

      50% {
        filter: brightness(1.55) saturate(1.75) drop-shadow(0 0 16px rgba(76, 222, 255, .9))
      }
    }

    .layout-intro .left-bot {
      left: 360px;
      bottom: 0
    }

    .layout-intro .right-bot {
      right: 360px;
      bottom: 0
    }

    .layout-intro .bot-img {
      width: 205px
    }

    .layout-intro .pod-img {
      display: none
    }

    .layout-intro-plug .left-bot,
    .layout-intro-connected .left-bot {
      left: 360px;
      top: 0;
      bottom: auto;
      height: 720px
    }

    .layout-intro-plug .right-bot,
    .layout-intro-connected .right-bot {
      right: 360px;
      top: 0;
      bottom: auto;
      height: 720px
    }

    .layout-intro-plug .bot-img,
    .layout-intro-connected .bot-img {
      bottom: 0
    }

    .layout-intro-plug .pod-img,
    .layout-intro-connected .pod-img {
      display: block;
      width: 160px
    }

    .pod-seq-layer {
      position: absolute;
      left: 50%;
      width: 160px;
      height: auto;
      object-fit: contain;
      pointer-events: none;
      opacity: 0;
      z-index: 4;
      will-change: transform, opacity, filter;
      backface-visibility: hidden;
    }

    .pod-seq-hollow {
      clip-path: inset(0 0 68.5% 0 round 14px);
      animation: podHollowArrive .48s cubic-bezier(.22, 1, .36, 1) both;
    }

    .pod-seq-cable {
      clip-path: inset(32% 0 0 0 round 12px);
      animation: podCableDescend .78s cubic-bezier(.2, .92, .24, 1) .46s both;
    }

    .layout-intro-plug.power-connecting .pod-img.visible {
      z-index: 4;
      opacity: 0;
      animation: powerPodTakeover 1.42s linear both;
    }

    .layout-intro-plug.power-connecting .right-bot .pod-img.visible {
      animation-delay: .12s;
    }

    .layout-intro-plug.power-connecting .bot-slot::after {
      animation: connectionFlash .48s cubic-bezier(.22, 1, .36, 1) 1.08s both;
    }

    .layout-intro-plug.power-connecting .right-bot::after {
      animation-delay: 1.14s;
    }

    .layout-intro-plug.power-connecting .bot-img {
      animation: botPowerNotice 1.55s cubic-bezier(.65, 0, .35, 1) .92s both;
    }

    .layout-intro-plug.power-connecting .right-bot .bot-img {
      animation-delay: .98s;
    }

    @keyframes podHollowArrive {
      0% {
        opacity: 0;
        transform: translateX(-50%) translateY(-24px) scale(.99);
        filter: brightness(.94);
      }

      72% {
        opacity: 1;
        transform: translateX(-50%) translateY(1px) scale(1.004);
        filter: brightness(1.045) drop-shadow(0 0 7px rgba(116, 219, 255, .2));
      }

      100% {
        opacity: 1;
        transform: translateX(-50%) translateY(0) scale(1);
        filter: brightness(1);
      }
    }

    @keyframes podCableDescend {
      0% {
        opacity: 0;
        transform: translateX(-50%) translateY(-96px) scale(.997);
        filter: brightness(.96);
      }

      14% {
        opacity: .78;
      }

      36% {
        opacity: 1;
        filter: brightness(1.04) drop-shadow(0 0 7px rgba(116, 219, 255, .28));
      }

      80% {
        opacity: 1;
        transform: translateX(-50%) translateY(1px) scale(1.003);
        filter: brightness(1.12) drop-shadow(0 0 9px rgba(116, 219, 255, .42));
      }

      90% {
        transform: translateX(-50%) translateY(-.5px) scale(.999);
      }

      100% {
        opacity: 1;
        transform: translateX(-50%) translateY(0) scale(1);
        filter: brightness(1);
      }
    }

    @keyframes powerPodTakeover {
      0%, 91% { opacity: 0; }
      92%, 100% { opacity: 1; }
    }

    .layout-ready .left-bot {
      left: 80px;
      bottom: 0
    }

    .layout-ready .right-bot {
      right: 80px;
      bottom: 0
    }

    .layout-ready .bot-slot {
      top: 0;
      bottom: auto;
      height: 720px
    }

    .layout-ready .left-bot,
    .layout-ready .right-bot {
      bottom: auto
    }

    .layout-ready .bot-img {
      width: 235px
    }

    .layout-ready .bot-img {
      bottom: 0
    }

    .layout-ready .pod-img {
      display: block;
      top: 0;
      width: 160px
    }

    .layout-ready.move-from-center .left-bot {
      animation: botMoveFromCenterLeft 1.08s cubic-bezier(.16, 1.08, .3, 1) both;
    }

    .layout-ready.move-from-center .right-bot {
      animation: botMoveFromCenterRight 1.08s cubic-bezier(.16, 1.08, .3, 1) both;
    }

    @keyframes botMoveFromCenterLeft {
      0% {
        transform: translateX(280px) scale(1.035);
        filter: drop-shadow(0 0 0 rgba(116, 219, 255, 0));
      }

      72% {
        filter: drop-shadow(0 0 14px rgba(116, 219, 255, .28));
      }

      100% {
        transform: translateX(0) scale(1);
        filter: none;
      }
    }

    @keyframes botMoveFromCenterRight {
      0% {
        transform: translateX(-280px) scale(1.035);
        filter: drop-shadow(0 0 0 rgba(116, 219, 255, 0));
      }

      72% {
        filter: drop-shadow(0 0 14px rgba(116, 219, 255, .28));
      }

      100% {
        transform: translateX(0) scale(1);
        filter: none;
      }
    }

    .layout-ready.power-connecting .pod-img.visible {
      z-index: 4;
      opacity: 1;
      animation: powerCableConnect 1.86s cubic-bezier(.16, 1.12, .3, 1) both;
    }

    .layout-ready.power-connecting .right-bot .pod-img.visible {
      animation-delay: .14s;
    }

    @keyframes dropPod {
      0% {
        transform: translateX(-50%) translateY(-150px);
        opacity: 0;
      }

      100% {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }
    }

    @keyframes powerCableConnect {
      0% {
        opacity: 0;
        clip-path: inset(0 0 0 0 round 14px);
        transform: translateX(-50%) translateY(-132px) scale(.98);
        filter: brightness(.96);
      }

      16% {
        opacity: 1;
        clip-path: inset(0 0 0 0 round 14px);
        transform: translateX(-50%) translateY(-96px) scale(.99);
      }

      62% {
        clip-path: inset(0 0 0 0 round 14px);
        transform: translateX(-50%) translateY(-12px) scale(1);
      }

      78% {
        clip-path: inset(0 0 0 0 round 14px);
        transform: translateX(-50%) translateY(4px) scale(1.012);
        filter: brightness(1.18) drop-shadow(0 0 10px rgba(116, 219, 255, .48));
      }

      88% {
        transform: translateX(-50%) translateY(-2px) scale(.998);
      }

      100% {
        opacity: 1;
        clip-path: inset(0 0 0 0 round 14px);
        transform: translateX(-50%) translateY(0) scale(1);
        filter: brightness(1);
      }
    }

    @keyframes powerPodSequence {
      0% {
        opacity: 0;
        clip-path: inset(0 0 62% 0 round 14px);
        transform: translateX(-50%) translateY(-42px) scale(.96);
        filter: brightness(.95);
      }

      18% {
        opacity: 1;
        clip-path: inset(0 0 62% 0 round 14px);
        transform: translateX(-50%) translateY(0) scale(1);
        filter: brightness(1.04) drop-shadow(0 0 8px rgba(116, 219, 255, .22));
      }

      34% {
        opacity: 1;
        clip-path: inset(0 0 62% 0 round 14px);
        transform: translateX(-50%) translateY(0) scale(1);
        filter: brightness(1);
      }

      68% {
        opacity: 1;
        clip-path: inset(0 0 0 0 round 14px);
        transform: translateX(-50%) translateY(0) scale(1);
        filter: brightness(1);
      }

      80% {
        opacity: 1;
        clip-path: inset(0 0 0 0 round 14px);
        transform: translateX(-50%) translateY(5px) scale(1.012);
        filter: brightness(1.18) drop-shadow(0 0 10px rgba(116, 219, 255, .5));
      }

      90% {
        transform: translateX(-50%) translateY(-2px) scale(.998);
      }

      100% {
        opacity: 1;
        clip-path: inset(0 0 0 0 round 14px);
        transform: translateX(-50%) translateY(0) scale(1);
        filter: brightness(1);
      }
    }

    .layout-laser .bot-slot {
      top: 0;
      height: 720px
    }

    .layout-laser .left-bot {
      left: 20px
    }

    .layout-laser .right-bot {
      right: 20px
    }

    .layout-laser .bot-img {
      width: 148px;
      bottom: 0
    }

    .layout-laser .pod-img {
      display: block;
      top: 180px;
      width: 132px
    }

    .layout-laser .pod-img.visible {
      opacity: 1
    }

    .layout-clear .bot-slot {
      display: none
    }

    .target-fill {
      position: absolute;
      left: 50%;
      top: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
      opacity: 0;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 3;
      transition: opacity .25s ease, filter .35s ease;
    }

    .target-fill.filled {
      opacity: 1;
      z-index: 7;
    }

    .target-fill.filled .fit-piece,
    .target-fill.charged-focus .fit-piece {
      position: relative;
      z-index: 2;
    }

    .target-fill.glow {
      animation: targetGlow .9s ease-in-out 2
    }

    /* Slot focus no longer paints inside the hollow; the pod-head clone owns the glow. */
    .target-fill.socket-focus {
      opacity: 0;
      overflow: hidden;
      background: none;
      box-shadow: none;
      filter: none;
      animation: none;
      z-index: 6;
    }

    .target-fill.socket-focus::before {
      display: none;
    }

    .target-fill.socket-focus::after {
      display: none;
    }

    @keyframes socketRimPulse {
      0%, 100% { opacity: .7; }
      50%      { opacity: 1; }
    }

    @keyframes socketYellowGlow {
      0%, 100% {
        filter:
          drop-shadow(0 0 6px rgba(255, 232, 96, .85))
          drop-shadow(0 0 14px rgba(255, 210, 40, .52))
          drop-shadow(0 0 28px rgba(255, 210, 40, .26));
      }
      50% {
        filter:
          drop-shadow(0 0 12px rgba(255, 248, 130, 1))
          drop-shadow(0 0 24px rgba(255, 210, 40, .78))
          drop-shadow(0 0 48px rgba(255, 210, 40, .42));
      }
    }

    @keyframes socketHollowBlink {
      0%, 100% {
        opacity: .54;
        transform: scale(1);
      }

      50% {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* Circle variants use explicit half-ellipse / angled clips from JS. Keep
       their glow inside the same slot box as the fitted block piece. */
    .target-fill.socket-focus.slot-circle-horizontal::before,
    .target-fill.socket-focus.slot-circle-horizontal::after,
    .target-fill.socket-focus.slot-circle-vertical::before,
    .target-fill.socket-focus.slot-circle-vertical::after {
      inset: var(--slot-focus-inset, 4px);
      width: auto;
      height: auto;
      clip-path: var(--slot-focus-clip, inset(0));
      border-radius: 0;
    }

    .target-fill.socket-focus.slot-circle-diagonal::before,
    .target-fill.socket-focus.slot-circle-diagonal::after {
      inset: var(--slot-focus-inset, 6px);
      width: auto;
      height: auto;
      clip-path: var(--slot-focus-clip, inset(0));
      border-radius: var(--slot-focus-radius, 50%);
    }

    .target-fill.socket-focus.slot-circle-diagonal {
      border-radius: 50%;
    }

    .pod-hollow-focus {
      position: absolute;
      left: 50%;
      width: 132px;
      height: auto;
      object-fit: contain;
      pointer-events: none;
      opacity: .88;
      z-index: 5;
      clip-path: inset(0 0 68.5% 0 round 14px);
      filter:
        brightness(1.08)
        drop-shadow(0 0 8px rgba(47, 255, 255, .76))
        drop-shadow(0 0 22px rgba(18, 218, 226, .48));
      animation: podHollowOnlyGlow 1.15s ease-in-out infinite;
      backface-visibility: hidden;
      will-change: filter, opacity;
    }

    .pod-hollow-focus-frame {
      position: absolute;
      left: 50%;
      width: var(--hollow-focus-w, 104px);
      height: var(--hollow-focus-h, 104px);
      border: 4px solid #2fffff;
      border-radius: 12px;
      pointer-events: none;
      opacity: .92;
      z-index: 7;
      box-sizing: border-box;
      background: rgba(47, 255, 255, .025);
      box-shadow:
        0 0 0 2px rgba(218, 255, 255, .66),
        0 0 18px 5px rgba(47, 255, 255, .78),
        0 0 46px 16px rgba(18, 218, 226, .4),
        inset 0 0 12px rgba(47, 255, 255, .38);
      animation: podHollowCyanPulse 1.08s ease-in-out infinite;
      transform-origin: center center;
      will-change: opacity, transform, box-shadow;
    }

    .pod-hollow-focus-frame.triangle-focus {
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      overflow: visible;
      animation: triangleHollowCyanPulse .92s ease-in-out infinite;
      filter:
        drop-shadow(0 0 8px rgba(47, 255, 255, .72))
        drop-shadow(0 0 20px rgba(18, 218, 226, .38));
    }

    .pod-hollow-focus-frame.semicircle-focus {
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      overflow: visible;
      animation: semicircleHollowCyanPulse .98s ease-in-out infinite;
      filter:
        drop-shadow(0 0 9px rgba(47, 255, 255, .78))
        drop-shadow(0 0 24px rgba(18, 218, 226, .42));
    }

    .triangle-focus-aura {
      fill: rgba(47, 255, 255, .025);
      stroke: rgba(47, 255, 255, .28);
      stroke-width: 13;
      stroke-linejoin: round;
      stroke-linecap: round;
      animation: triangleFocusAuraPulse .92s ease-in-out infinite;
    }

    .triangle-focus-rim {
      fill: none;
      stroke: #2fffff;
      stroke-width: 6;
      stroke-linejoin: round;
      stroke-linecap: round;
      animation: triangleFocusRimPulse .92s ease-in-out infinite;
    }

    .semicircle-focus-aura {
      fill: rgba(47, 255, 255, .04);
      stroke: rgba(47, 255, 255, .34);
      stroke-width: 11;
      stroke-linejoin: round;
      stroke-linecap: round;
      animation: semicircleFocusAuraPulse .98s ease-in-out infinite;
    }

    .semicircle-focus-rim {
      fill: none;
      stroke: #2fffff;
      stroke-width: 5.5;
      stroke-linejoin: round;
      stroke-linecap: round;
      animation: semicircleFocusRimPulse .98s ease-in-out infinite;
    }

    @keyframes podHollowOnlyGlow {
      0%, 100% {
        opacity: .72;
        filter:
          brightness(1.06)
          drop-shadow(0 0 7px rgba(47, 255, 255, .62))
          drop-shadow(0 0 17px rgba(18, 218, 226, .36));
      }
      50% {
        opacity: .98;
        filter:
          brightness(1.15)
          drop-shadow(0 0 14px rgba(47, 255, 255, .94))

    /* Guided slot preview: each half travels to the hollow, snaps back faster,
       then finishes with one final move into the hollow. The dotted SVG path mirrors
       the sampled Bezier points so the motion and visual cue agree. */
    .split-demo-piece.fly-tease {
      transition: none;
      animation: splitFlyToHollowTease 7.8s linear forwards;
      filter: drop-shadow(0 0 14px rgba(94, 226, 255, .55));

    @keyframes splitFlyToHollowTease {
      0%, 7% {
        transform: translate(var(--seamX, 0px), var(--seamY, 0px)) scale(1);
        opacity: 1;
      }
      13% {
        transform: translate(var(--p18x), var(--p18y)) scale(.98);
        opacity: .96;
      }
      19% {
        transform: translate(var(--p38x), var(--p38y)) scale(.91);
        opacity: .98;
      }
      27% {
        transform: translate(var(--p62x), var(--p62y)) scale(.82);
        opacity: 1;
      }
      35% {
        transform: translate(var(--p82x), var(--p82y)) scale(calc(var(--slotScale, .68) + .04));
        opacity: 1;
      }
      42% {
        transform: translate(var(--tx), var(--ty)) scale(var(--slotScale, .68));
        opacity: 1;
      }
      49% {
        transform: translate(var(--tx), var(--ty)) scale(var(--slotScale, .68));
        opacity: 1;
      }
      54% {
        transform: translate(var(--p82x), var(--p82y)) scale(calc(var(--slotScale, .68) + .04));
        opacity: 1;
      }
      58% {
        transform: translate(var(--p62x), var(--p62y)) scale(.82);
        opacity: .98;
      }
      62% {
        transform: translate(var(--p38x), var(--p38y)) scale(.91);
        opacity: .96;
      }
      66% {
        transform: translate(var(--seamX, 0px), var(--seamY, 0px)) scale(1);
        opacity: 1;
      }
      72% {
        transform: translate(var(--seamX, 0px), var(--seamY, 0px)) scale(1);
        opacity: 1;
      }
      78% {
        transform: translate(var(--p18x), var(--p18y)) scale(.98);
        opacity: .96;
      }
      86% {
        transform: translate(var(--p38x), var(--p38y)) scale(.91);
        opacity: .98;
      }
      92% {
        transform: translate(var(--p62x), var(--p62y)) scale(.82);

      }
      97% {
        transform: translate(var(--p82x), var(--p82y)) scale(calc(var(--slotScale, .68) + .04));

      }
      100% {
        transform: translate(var(--tx), var(--ty)) scale(var(--slotScale, .68));

      background:
        radial-gradient(120% 120% at 50% 42%, rgba(60, 140, 210, .45) 0%, rgba(20, 70, 125, 0) 60%),

      position: absolute;
      left: var(--x);
      top: var(--y);

      height: var(--s);

      opacity: 0;
      background: rgba(255, 255, 255, .82);
      box-shadow: 0 0 10px rgba(109, 224, 255, .78);

    @keyframes playLightSweep {
      0% {
        transform: translate3d(-2%, -1%, 0);
        background-position: 0% 50%, 100% 50%;
      }

      100% {
        transform: translate3d(2%, 1%, 0);
        background-position: 100% 50%, 0% 50%;
      }
    }

    @keyframes playGridDrift {
      0% {
        background-position: 0 0, 0 0;
      }

      100% {
        background-position: 88px 44px, 44px 88px;
      }
    }

    @keyframes playBgBreath {

      0%,
      100% {
        transform: scale(1);
        filter: saturate(1) brightness(1);
      }

      50% {
        transform: scale(1.018);
        filter: saturate(1.06) brightness(1.03);
      }
    }

    @keyframes iraBreath {

      0%,
      100% {
        transform: translateX(0) translateY(0) rotate(0);
      }

      50% {
        transform: translateX(0) translateY(-8px) rotate(.5deg);
      }
    }

    @keyframes iraGlowSettle {
      0% {
        opacity: 0;
        transform: translateX(-50%) scale(.45);
      }

      100% {
        opacity: 1;
        transform: translateX(-50%) scale(1);
      }
    }

    @keyframes iraShadowFloat {

      0%,
      100% {
        transform: translateX(-50%) scale(1);
        opacity: .7;
      }

      50% {
        transform: translateX(-50%) scale(.88);
        opacity: .48;
      }
    }

      100% {
        transform: scale(1) translateY(0);
      }

      50% {
        transform: scale(1.07) translateY(-6px);
      }
    }

      0%,
      100% {
        filter: drop-shadow(0 0 16px rgba(255, 214, 54, .78)) drop-shadow(0 10px 20px rgba(255, 149, 0, .35));
      }

      50% {
        filter: drop-shadow(0 0 34px rgba(255, 224, 48, 1)) drop-shadow(0 0 22px rgba(255, 255, 255, .72)) drop-shadow(0 12px 22px rgba(255, 149, 0, .42));

    @keyframes letsGoAura {
      0%,
      100% {
        opacity: .55;
        transform: scale(.88);
      }

      50% {
        opacity: .96;
        transform: scale(1.08);
      }
    }

    @keyframes playButtonClickPop {
      0% {
        transform: scale(1.06) translateY(-4px);
      }

      55% {
        transform: scale(.92) translateY(5px);
      }

      100% {
        transform: scale(1.02) translateY(-1px);
      }
    }

      }

        transform: translate3d(0, 20px, 0) rotate(var(--r)) scale(.72);

      78% {

      }

      object-fit: contain;
      pointer-events: none;
      z-index: 27;
      opacity: 0;
    }

    #cutOverlay.show {
      opacity: 1
    }

    #cutOverlay.flash {
      animation: cutFlash .32s ease-out forwards
    }

    @keyframes cutFlash {
      0% {
        opacity: 1
      }

      100% {
        opacity: 0
      }
    }


    .machine-hit.pressed {
      animation: hitPress .18s ease
    }

    @keyframes guideOverlayPulse {

      0%,
      100% {
        opacity: .58;
      }

      50% {
        opacity: .86;
      }
    }

    @keyframes guideTrace {
      0% {
        background-position: 0 0;
      }

      100% {
        background-position: 88px 0;
      }
    }

    @keyframes guidePulse {

      0%,
      100% {
        opacity: .72;
        filter: brightness(1);
      }

      50% {
        opacity: 1;
        filter: brightness(1.22);
      }
    }

    @keyframes rejoinPop {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(.92);
        filter: drop-shadow(0 0 20px rgba(116, 219, 255, .7));
      }

      62% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.045);
      }

      100% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
        filter: none;
      }
    }

    .hand-gesture {
      position: absolute;
      width: 70px;
      height: auto;
      z-index: 45;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.4));
    }

    .hand-gesture.show {
      opacity: 1;
    }

    .hand-gesture.point-right {
      left: 770px;
      top: 300px;
      animation: handTapRight 0.8s infinite alternate;
    }

    .hand-gesture.point-left {
      left: 112px;
      top: 300px;
      animation: handTapLeft 0.8s infinite alternate;
    }

    .hand-gesture.point-cut {
      left: 450px;
      top: 610px;
      transform: translateX(-50%);
      animation: handTapCut 0.8s infinite alternate;
    }

    @keyframes handTapRight {
      0% {
        transform: scale(1) translate(0, 0);
      }

      100% {
        transform: scale(0.85) translate(-10px, 10px);
      }
    }

    @keyframes handTapLeft {
      0% {
        transform: scale(1) translate(0, 0);
      }

      100% {
        transform: scale(0.85) translate(10px, 10px);
      }
    }

    @keyframes handTapCut {
      0% {
        transform: translateX(-50%) scale(1) translateY(0);
      }

      100% {
        transform: translateX(-50%) scale(0.85) translateY(10px);
      }
    }

    @keyframes hitPress {

      0%,
      100% {
        transform: scale(1)
      }

      50% {
        transform: scale(.92)
      }
    }

    @keyframes tutHighlightGlow {

      0%,
      100% {
        filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.5));
        transform: scale(1);
      }

      50% {
        filter: drop-shadow(0 0 12px rgba(255, 255, 255, 1));
        transform: scale(1.05);
      }
    }

    @keyframes tutHighlightGlowCenter {

      0%,
      100% {
        filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.5));
        transform: translateX(-50%) scale(1);
      }

      50% {
        filter: drop-shadow(0 0 12px rgba(255, 255, 255, 1));
        transform: translateX(-50%) scale(1.05);
      }
    }

    #btnLeft.tut-highlight,
    #btnRight.tut-highlight {
      animation: tutHighlightGlow 1.2s infinite;
      z-index: 40;
    }

    #btnCut.tut-highlight {
      animation: tutHighlightGlowCenter 1.2s infinite;
      z-index: 40;
    }

    .tutorial-bubble {
      position: absolute;
      z-index: 31;
      object-fit: contain;
      filter: drop-shadow(0 8px 12px rgba(44, 92, 139, .22));
      transition: opacity .3s ease, transform .3s ease;
      pointer-events: none;
    }

    /* bubbles below left/right buttons; cut bubble above cut button */
    #bubbleLeft {
      width: 270px;
      left: -70px;
      top: 402px
    }

    #bubbleRight {
      width: 270px;
      right: -70px;
      top: 402px
    }

    /* Sits flush to the right of the Cut button (Cut spans x:382-518 in the machine stage);
       the bubble's tail is on its left edge so it points back at the button.
       Top chosen so the tail tip lines up with the button's vertical centre. */
    #bubbleCut {
      width: 280px;
      left: 545px;
      top: 595px
    }

    .tutorial-bubble.fade {
      opacity: 0;
      transform: translateY(8px)
    }

    #flightLayer {
      position: absolute;
      inset: 0;
      z-index: 55;
      pointer-events: none;
    }

    .flying-half {
      position: absolute;
      left: 0;
      top: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .9s cubic-bezier(.18, .89, .32, 1.08), opacity .9s ease;
      will-change: transform, opacity;
      backface-visibility: hidden;
    }

    .flying-half.wrong-slot-piece {
      z-index: 62;
    }

    .flying-half.soft-mismatch {
      animation: softMismatch .56s cubic-bezier(.36, 0, .66, -0.56) 2;
      filter: drop-shadow(0 0 12px rgba(120, 219, 255, .5)) saturate(1.06);
    }

    @keyframes softMismatch {

      0%,
      100% {
        transform: var(--fit-transform);
      }

      22% {
        transform: var(--fit-transform) translateX(-6px) rotate(-2deg);
      }

      48% {
        transform: var(--fit-transform) translateX(5px) rotate(1.7deg);
      }

      72% {
        transform: var(--fit-transform) translateX(-3px) rotate(-1deg);
      }
    }

    .fit-piece {
      display: flex;
      align-items: center;
      justify-content: center;
      transform-origin: center center;
      position: relative;
      z-index: 1;
    }

    #tryAgain,
    #nextButton {
      position: absolute;
      left: 50%;
      bottom: 4px;
      width: 168px;
      height: auto;
      transform: translateX(-50%);
      border: 0;
      background: transparent;
      z-index: 70;
      cursor: pointer;
      transition: opacity .22s ease, transform .12s ease;
      -webkit-tap-highlight-color: transparent;
    }

    #tryAgain {
      bottom: 310px;
      width: 220px;
    }

    #tryAgain:hover,
    #nextButton:hover {
      filter: drop-shadow(0 0 14px rgba(116, 219, 255, .78)) brightness(1.06);
      transform: translateX(-50%) scale(1.035);
    }

    #tryAgain img,
    #nextButton img {
      display: block;
      width: 100%;
      height: auto
    }

    #tryAgain:not(.hidden) {
      animation: tryAgainPulse 1.6s ease-in-out infinite;
    }

    @keyframes tryAgainPulse {
      0%, 100% {
        transform: translateX(-50%) scale(1);
        filter: drop-shadow(0 0 8px rgba(255, 255, 255, .8)) drop-shadow(0 0 18px rgba(255, 255, 255, .45));
      }
      50% {
        transform: translateX(-50%) scale(1.055);
        filter: drop-shadow(0 0 16px rgba(255, 255, 255, .95)) drop-shadow(0 0 32px rgba(255, 255, 255, .6));
      }
    }

    #tryAgain:active {
      transform: translateX(-50%) scale(.96)
    }

    #nextButton:active {
      opacity: .82;
      transform: translateX(-50%) scale(.96)
    }

    #nextButton.is-success {
      bottom: 310px;
      width: 220px;
      filter: drop-shadow(0 0 18px rgba(255, 167, 38, .78)) drop-shadow(0 8px 16px rgba(231, 116, 0, .42));
    }

    #nextButton.is-success:not(.hidden) {
      animation: nextSuccessPulse 1.6s ease-in-out infinite;
    }

    @keyframes nextSuccessPulse {
      0%, 100% {
        filter: drop-shadow(0 0 18px rgba(255, 167, 38, .78)) drop-shadow(0 8px 16px rgba(231, 116, 0, .42));
        transform: translateX(-50%) scale(1);
      }
      50% {
        filter: drop-shadow(0 0 28px rgba(255, 200, 80, 1)) drop-shadow(0 0 44px rgba(255, 149, 0, .62));
        transform: translateX(-50%) scale(1.045);
      }
    }

    #finishButton {
      position: absolute;
      left: 50%;
      bottom: 22px;
      width: 250px;
      height: 66px;
      transform: translateX(-50%);
      border: 0;
      border-radius: 14px;
      background: linear-gradient(180deg, #55e5ff 0%, #14b9ee 100%);
      color: #fff;
      font-size: 29px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
      text-shadow: 0 2px 0 rgba(18, 109, 181, .36);
      box-shadow: inset 0 -5px 0 rgba(0, 131, 210, .28), 0 4px 0 #0aa7e6;
      z-index: 8;
      cursor: pointer;
      transition: transform .12s ease, filter .2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    #finishButton:hover {
      filter: brightness(1.05)
    }

    #finishButton:active {
      transform: translateX(-50%) scale(.96)
    }

    #completeStage {
      position: absolute;
      inset: 0;
      z-index: 60;
      overflow: hidden;
      isolation: isolate;
      background-color: #e6f0ff;
      background:
        radial-gradient(circle at 50% 40%, #ffffff 0 13%, #e5efff 35%, #c5daff 100%),
        linear-gradient(180deg, #e6f0ff 0%, #dbeaff 100%);
      transition: opacity .35s ease;
    }

    #completeStage::before {
      content: "";
      position: absolute;
      inset: -110px -180px -60px;
      background: repeating-conic-gradient(from -10deg at 50% 32%,
          rgba(255, 255, 255, .5) 0deg,
          rgba(255, 255, 255, .5) 8deg,
          rgba(170, 201, 255, .2) 8deg,
          rgba(170, 201, 255, .2) 18deg);
      opacity: .74;
      z-index: 0;
      pointer-events: none;
    }

    #completeStage::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 58px;
      height: 31px;
      background: rgba(86, 150, 244, .55);
      box-shadow: 0 -1px 0 rgba(255, 255, 255, .46), 0 6px 16px rgba(77, 136, 221, .2);
      z-index: 1;
    }

    .complete-copy {
      position: absolute;
      left: 50%;
      top: 54px;
      width: 640px;
      transform: translateX(-50%);
      text-align: center;
      color: #10295d;
      font-weight: 900;
      z-index: 6;
      text-shadow: 0 3px 0 rgba(255, 255, 255, .76), 0 6px 13px rgba(20, 50, 104, .16);
    }

    .complete-title {
      font-size: 56px;
      line-height: 1.04;
      letter-spacing: 0;
    }

    .complete-sub {
      margin-top: 12px;
      font-size: 32px;
      line-height: 1.1;
      color: #10295d;
    }

    .complete-bots {
      position: absolute;
      left: 50%;
      bottom: 80px;
      width: 940px;
      height: 392px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      transform: translateX(-50%);
      z-index: 3;
    }

    .complete-bot {
      position: relative;
      width: 260px;
      height: 372px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .complete-bot-img {
      display: block;
      width: var(--bot-w);
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 16px 20px rgba(63, 96, 151, .2)) drop-shadow(0 0 22px rgba(86, 229, 255, .56));
      animation: completeBotBounce 1.6s ease-in-out infinite;
    }

    .complete-bot:nth-child(2) .complete-bot-img {
      animation-delay: .14s;
    }

    .complete-bot:nth-child(3) .complete-bot-img {
      animation-delay: .28s;
    }

    .complete-token {
      position: absolute;
      left: 50%;
      top: 7px;
      width: 92px;
      height: 92px;
      transform: translateX(-50%);
      animation: completeTokenFloat 1.6s ease-in-out infinite;
    }

    .complete-token-rect {
      top: 27px;
      width: 126px;
      height: 64px;
      border-radius: 0;
      background: #c74c67;
    }

    .complete-token-triangle {
      background: #9B5FD9;
      clip-path: polygon(0 0, 100% 0, 100% 100%);
    }

    .complete-token-circle {
      background: #efa033;
      clip-path: inset(0 0 50% 0);
      border-radius: 50%;
    }

    .complete-confetti {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 5;
      pointer-events: none;
    }

    .complete-confetti span {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: var(--w, 12px);
      height: var(--h, 28px);
      border-radius: 6px 6px 3px 3px;
      background: var(--c);
      opacity: 0;
      transform: translate3d(0, -80px, 0) rotate(var(--r));
      animation: completeConfettiFall var(--dur, 3.4s) linear infinite;
      animation-delay: var(--d);
    }

    .complete-ground-shadow {
      position: absolute;
      left: 50%;
      bottom: -2px;
      width: 150px;
      height: 18px;
      border-radius: 50%;
      transform: translateX(-50%);
      background: rgba(47, 85, 144, .16);
      filter: blur(3px);
      z-index: -1;
    }

    @keyframes completeBotBounce {

      0%,
      100% {
        transform: translateY(0) rotate(0)
      }

      50% {
        transform: translateY(-10px) rotate(1.2deg)
      }
    }

    @keyframes completeTokenFloat {

      0%,
      100% {
        transform: translateX(-50%) translateY(0)
      }

      50% {
        transform: translateX(-50%) translateY(-8px)
      }
    }

    @keyframes completeConfettiFall {

      0% {
        opacity: 0;
        transform: translate3d(0, -100px, 0) rotate(var(--r))
      }

      10% {
        opacity: 1
      }

      92% {
        opacity: 1
      }

      100% {
        opacity: 0;
        transform: translate3d(var(--dx, 0px), var(--fall, 780px), 0) rotate(calc(var(--r) + var(--spin, 380deg)))
      }
    }

    /* ── Interactive kid-game animations ── */
    @keyframes piecePopIn {
      0% {
        opacity: 0;
        transform: scale(.45) rotate(-10deg)
      }

      65% {
        transform: scale(1.15) rotate(4deg)
      }

      100% {
        opacity: 1;
        transform: scale(1) rotate(0)
      }
    }

    .teach-pop {
      animation: piecePopIn .4s cubic-bezier(.34, 1.5, .64, 1) both
    }

    .teach-pop-d1 {
      animation-delay: .16s
    }

    @keyframes sparkDot {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1)
      }

      100% {
        opacity: 0;
        transform: translate(var(--sx), var(--sy)) scale(0)
      }
    }

    .spark-dot {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: sparkDot .75s ease-out both;
      will-change: transform, opacity;
    }

    @keyframes nextBtnPop {
      0% {
        opacity: 0;
        transform: translateX(-50%) scale(.2) rotate(-15deg)
      }

      60% {
        transform: translateX(-50%) scale(1.2) rotate(5deg)
      }

      80% {
        transform: translateX(-50%) scale(.94) rotate(-1deg)
      }

      100% {
        opacity: 1;
        transform: translateX(-50%) scale(1) rotate(0)
      }
    }

    @keyframes nextBtnGlow {

      0%,
      100% {
        filter: none
      }

      50% {
        filter: drop-shadow(0 0 14px rgba(116, 219, 255, .95)) brightness(1.12)
      }
    }

    #nextButton:not(.hidden) {
      animation: nextBtnPop .5s cubic-bezier(.34, 1.3, .64, 1) both,
        nextBtnGlow 1.4s ease-in-out .52s infinite;
    }

    @keyframes idleHintPulse {

      0%,
      100% {
        filter: drop-shadow(0 0 4px rgba(255, 255, 255, .3));
        transform: scale(1);
      }

      50% {
        filter: drop-shadow(0 0 22px rgba(116, 219, 255, .95));
        transform: scale(1.14);
      }
    }

    #btnLeft.idle-hint {
      animation: idleHintPulse 1.4s ease-in-out infinite;
      z-index: 40;
    }

    #btnRight.idle-hint {
      animation: idleHintPulse 1.4s ease-in-out infinite;
      z-index: 40;
    }

    .wrong-fit-glow {
      filter: none !important;
    }

    .wrong-fit-hold {
      animation: none;
    }

    @media (prefers-reduced-motion:reduce) {

      *,
      *::before,
      *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .01ms !important
      }
    }

  </style>
</head>

<body>
  <main id="game" aria-label="PowerUp Bots halves game">
    <img id="sceneBg" class="bg" src="assets/Mainbg.png" alt="">

    <section id="instruction" class="hidden" aria-live="polite">
      <img src="assets/instructionPannel.png" alt="">
      <div id="instructionText"></div>
    </section>

    <section id="scene">
      <div id="bots" class="layout-intro">
        <div class="bot-slot left-bot">
          <div class="target-fill" id="leftFill"></div>
          <img class="pod-img" id="leftPod" src="assets/SquareHollow.png" alt="">
          <img class="bot-img" id="leftBot" src="assets/SquareBotSadState.png" alt="">
        </div>
        <div class="bot-slot right-bot">
          <div class="target-fill" id="rightFill"></div>
          <img class="pod-img" id="rightPod" src="assets/SquareHollow.png" alt="">
          <img class="bot-img" id="rightBot" src="assets/SquareBotSadState.png" alt="">
        </div>
      </div>

      <div id="shapeStage" class="hidden" aria-hidden="true"></div>

      <div id="teachStage" class="hidden" aria-hidden="true">
        <div id="teachContent"></div>
      </div>

      <section id="playStage" class="hidden">
        <img id="playBg" src="assets/GameStartScreen.png" alt="">
        <div id="playFx" aria-hidden="true"></div>
        <div id="iraGlowRing" aria-hidden="true"></div>
        <img id="iraChar" src="assets/Ira.png" alt="">
        <button id="playButton" type="button" aria-label="Let's go">
          <span id="playButtonImg">PLAY</span>
        </button>
      </section>

      <div id="machineStage" class="hidden" aria-hidden="true">
        <!-- base machine (always LaserMachineWithoutLines) -->
        <img id="machineImg" src="assets/LaserMachineWithoutLines.png" alt="">
        <!-- inline LaserMachine.svg for 3rd-attempt highlight (hidden by default) -->
        <div id="machineSvgLayer" aria-hidden="true"></div>
        <!-- LaserMachine.svg overlay — tutorial guide lines only -->
        <img id="tutorialOverlay" src="assets/LaserMachine.svg" alt="" aria-hidden="true">
        <img id="guideLineHighlight" src="assets/LaserMachine.svg" alt="" aria-hidden="true">
        <!-- Beam.svg — hidden by default, only shown on CUT -->
        <img id="beamImg" src="assets/Beam.svg" alt="" aria-hidden="true">
        <!-- Laser.png rotating sprite -->
        <img id="laserImg" src="assets/Laser.png" alt="" aria-hidden="true">
        <div id="blockCover"></div>
        <div id="machineBlock"></div>
        <img id="laserBurst" src="assets/laserlight.png" alt="">
        <div id="cutLine"></div>
        <div id="wrongSlash"></div>
        <!-- Tutorial instruction bubbles (below left/right buttons; above cut button) -->
        <img id="bubbleLeft" class="tutorial-bubble" src="assets/InstruictionTutorialLeft.png" alt="">
        <img id="bubbleRight" class="tutorial-bubble" src="assets/InstructionTutorialRight.png" alt="">
        <img id="bubbleCut" class="tutorial-bubble" src="assets/InstructionTutorialCutButton.png" alt="">
        <!-- Visible button images (src swaps on press) -->
        <img id="btnLeft" src="assets/LeftButton.png" alt="" aria-hidden="true">
        <img id="btnRight" src="assets/RightButton.png" alt="" aria-hidden="true">
        <img id="btnCut" src="assets/CutButton.png" alt="" aria-hidden="true">
        <!-- TappedCutButton.png tutorial highlight -->
        <img id="cutOverlay" src="assets/TappedCutButton.png" alt="" aria-hidden="true">
        <img id="handGesture" class="hand-gesture hidden" src="assets/hand.svg" alt="" aria-hidden="true">
        <!-- Invisible hit areas -->
        <button id="hitLeft" class="machine-hit" type="button" aria-label="Move laser left"></button>
        <button id="hitRight" class="machine-hit" type="button" aria-label="Move laser right"></button>
        <button id="hitCut" class="machine-hit" type="button" aria-label="Cut the block"></button>
      </div>

      <div id="flightLayer" aria-hidden="true"></div>

      <button id="tryAgain" class="hidden" type="button" aria-label="Try again">
        <img src="assets/TryAgainButton.png" alt="">
      </button>

      <button id="nextButton" class="hidden" type="button" aria-label="Next">
        <img src="assets/nextButton.png" alt="">
      </button>
    </section>

    <section id="completeStage" class="hidden" aria-live="polite">
      <div class="complete-copy">
        <div class="complete-title">Bots Powered Up!</div>
      </div>
      <div id="completeConfetti" class="complete-confetti" aria-hidden="true">
        <span style="--x:8%;--y:17%;--c:#4dbeff;--r:24deg;--d:.1s"></span>
        <span style="--x:15%;--y:31%;--c:#9b5fd9;--r:-38deg;--d:.7s"></span>
        <span style="--x:23%;--y:24%;--c:#78dc2d;--r:-24deg;--d:.2s"></span>
        <span style="--x:10%;--y:48%;--c:#78dc2d;--r:34deg;--d:1s"></span>
        <span style="--x:21%;--y:61%;--c:#9b5fd9;--r:31deg;--d:.4s"></span>
        <span style="--x:74%;--y:19%;--c:#9b5fd9;--r:-18deg;--d:.6s"></span>
        <span style="--x:84%;--y:30%;--c:#78dc2d;--r:18deg;--d:.2s"></span>
        <span style="--x:69%;--y:42%;--c:#4dbeff;--r:30deg;--d:.8s"></span>
        <span style="--x:79%;--y:57%;--c:#78dc2d;--r:-31deg;--d:.5s"></span>
        <span style="--x:62%;--y:63%;--c:#68c7ff;--r:48deg;--d:1.1s"></span>
      </div>
      <div class="complete-bots" aria-hidden="true">
        <div class="complete-bot">
          <div class="complete-token complete-token-rect"></div>
          <img class="complete-bot-img" style="--bot-w:190px" src="assets/happyPinkBot.png" alt="">
          <div class="complete-ground-shadow"></div>
        </div>
        <div class="complete-bot">
          <div class="complete-token complete-token-triangle"></div>
          <img class="complete-bot-img" style="--bot-w:216px" src="assets/HappyTriangleBot.png" alt="">
          <div class="complete-ground-shadow"></div>
        </div>
        <div class="complete-bot">
          <div class="complete-token complete-token-circle"></div>
          <img class="complete-bot-img" style="--bot-w:190px" src="assets/HappyCircleBot.png" alt="">
          <div class="complete-ground-shadow"></div>

      }

    /* Map a target angle (deg, 0..360) to the index of the corresponding <line>
       in LaserMachine.svg: vertical, horizontal, slash-up, backslash-down. */
    function machineSvgLineIndexForAngle(deg) {
      var snap = Math.round(((deg % 180) + 180) % 180 / 45) * 45;
      if (snap === 180) snap = 0;
      if (snap === 0) return 1;   // horizontal
      if (snap === 90) return 0;  // vertical
      if (snap === 45) return 2;  // slash (/)
      if (snap === 135) return 3; // backslash (\)
      return -1;
    }

    function applyAttemptGuides() {
      clearAttemptGuides();
      if ((state.wrongAttempts || 0) === 1) {
        els.tutorialOverlay.classList.add("show", "supportive-guide");
      }
      if ((state.wrongAttempts || 0) >= 2) {
        showMachineGuideLine(currentRound().targetAngle);
      }
    }

    function clearTimers() {
      state.timers.forEach(function (id) { clearTimeout(id); });
      state.timers = [];
      if (state.tutorialTimer) {
        clearTimeout(state.tutorialTimer);
        state.tutorialTimer = null;
      }
    }

    function stopIdleHint() {
      if (state.idleHintTimer) { clearTimeout(state.idleHintTimer); state.idleHintTimer = null; }
      els.btnLeft.classList.remove("idle-hint");
      els.btnRight.classList.remove("idle-hint");
    }

    function idleHintDirection() {
      var r = currentRound();
      if (!r) return null;
      var cur = state.angle;
      var targets = acceptedCutAnglesForRound(r);
      /* Button semantics (matching tutorial): LEFT button rotates +45,
         RIGHT button rotates -45. So "go +angle" → press LEFT,
         "go -angle" → press RIGHT. */
      var bestPlusSteps = Infinity, bestMinusSteps = Infinity;
      targets.forEach(function (t) {
        var plusSteps = ((t - cur + 360) % 360) / 45;
        var minusSteps = ((cur - t + 360) % 360) / 45;
        if (plusSteps < bestPlusSteps) { bestPlusSteps = plusSteps; }
        if (minusSteps < bestMinusSteps) { bestMinusSteps = minusSteps; }
      });
      if (bestPlusSteps === 0 || bestMinusSteps === 0) { return null; } /* already aligned — let cut do its thing */
      return bestPlusSteps < bestMinusSteps ? "left" : "right";
    }

    function startIdleHint() {
      stopIdleHint();
      if (state.tutActive) { return; }
      state.idleHintTimer = setTimeout(function () {
        if (!state.tutActive && !state.locked) {
          var dir = idleHintDirection();
          if (dir === "left") { els.btnLeft.classList.add("idle-hint"); }
          else if (dir === "right") { els.btnRight.classList.add("idle-hint"); }
        }
      }, 3000);
    }

    function later(fn, delay) {
      var id = setTimeout(fn, delay);
      state.timers.push(id);
    }

    function scheduleTeachingNext(action) {
      state.nextAction = action || null;
      hide(els.nextButton);
      els.nextButton.classList.remove("is-success");
      els.nextButton.querySelector("img").src = "assets/nextButton.png";
      later(function () {
        els.nextButton.classList.remove("is-success");
        els.nextButton.querySelector("img").src = "assets/nextButton.png";
        show(els.nextButton);
      }, TIMING.TEACH_NEXT_BUTTON);
    }

    function currentRound() {
      return ROUNDS[state.round];
    }

    function setInstruction(text, options) {
      if (state.teachingActive) {
        text = "";
      }
      if (!text) {
        hide(els.instruction);
        els.instructionText.textContent = "";
        return playInstructionAudio("", options);
      }
      els.instructionText.textContent = text;
      show(els.instruction);
      return playInstructionAudio(text, options);
    }

    function resetScene() {
      els.sceneBg.style.display = "none";
      els.sceneBg.src = ASSETS + "Mainbg.png";
      state.teachingActive = false;
      els.game.classList.remove("teaching-active", "laser-intro");
      /* Clear inline transitions/transforms left over by the previous round's
         success animation (switchBotsToHappy sets `transition: top 0.4s ease,
         margin-left 0.4s ease` on pods/fills and `bottom` on bots). Without
         this, the next round's setupBots writes new top/marginLeft/width
         values that *animate* from the previous round's positions over 0.4s
         — visible as the "alignment broken initially → suddenly corrects
         itself" glitch on question transitions. Safe because every code
         path that needs a transition on these elements re-applies its own
         inline transition explicitly. */
      [els.leftPod, els.rightPod].forEach(function (el) {
        if (!el) { return; }
        el.style.transition = "";
        el.classList.remove("charged-focus");
      });
      [els.leftFill, els.rightFill].forEach(function (el) {
        if (!el) { return; }
        el.style.transition = "";
        el.classList.remove("charged-focus");
      });
      [els.leftBot, els.rightBot].forEach(function (el) {
        if (!el) { return; }
        el.style.bottom = "";
        el.style.marginLeft = "";
        el.classList.remove("happy");
      });
      hide(els.shapeStage);
      hide(els.teachStage);
      hide(els.playStage);
      hide(els.machineStage);
      hide(els.tryAgain);
      hide(els.nextButton);
      els.nextButton.classList.remove("is-success");
      els.nextButton.querySelector("img").src = "assets/nextButton.png";
      hide(els.completeStage);
      state.nextAction = null;
      els.shapeStage.innerHTML = "";
      els.teachContent.innerHTML = "";
      if (els.playFx) { els.playFx.innerHTML = ""; }
      els.iraChar.classList.remove("play-idle");
      els.iraGlowRing.classList.remove("show");
      els.playStage.classList.remove("play-exit", "start-mode", "preplay-mode");
      els.playButton.classList.remove("play-ready", "play-clicked");
      els.machineBlock.classList.remove("vibrate");
      els.machineBlock.classList.remove("rejoin-pop");
      els.machineBlock.style.opacity = "";
      els.machineBlock.innerHTML = "";
      els.machineStage.classList.remove("checking-fit");
      els.flightLayer.innerHTML = "";
      clearTargetFills();
      clearAttemptGuides();
      els.wrongSlash.classList.remove("show");
      els.leftPod.classList.remove("front-layer");
      els.rightPod.classList.remove("front-layer");
      if (state.orbitRaf) { cancelAnimationFrame(state.orbitRaf); state.orbitRaf = null; }
      state.orbitActive = false;
      els.laserImg.style.display = "none";
      els.beamImg.style.display = "none";
      els.laserBurst.classList.remove("show");
      [els.bubbleLeft, els.bubbleRight, els.bubbleCut].forEach(function (el) {
        el.classList.add("fade");
      });
      els.cutOverlay.classList.remove("show");
      els.cutOverlay.classList.remove("flash");
      els.btnLeft.src = ASSETS + "LeftButton.png";
      els.btnRight.src = ASSETS + "RightButton.png";
      els.btnCut.src = ASSETS + "CutButton.png";
      els.btnLeft.classList.remove("tut-highlight");
      els.btnRight.classList.remove("tut-highlight");
      els.btnCut.classList.remove("tut-highlight");
      els.leftPod.classList.remove("socket-focus");
      els.rightPod.classList.remove("socket-focus");
      els.leftPod.classList.remove("charged-focus");
      els.rightPod.classList.remove("charged-focus");
      stopIdleHint();
      els.hitLeft.disabled = false;
      els.hitRight.disabled = false;
      els.hitCut.disabled = false;
      state.locked = false;
      state.tutActive = false;
      state.tutStep = 0;
    }

    function isIntroPlacement(layout) {
      return layout === "layout-intro" || layout === "layout-intro-plug" || layout === "layout-intro-connected";
    }

    function botWidthForLayout(r, layout) {
      if (isIntroPlacement(layout)) {
        return r.botWIntro;
      }
      if (layout === "layout-laser") {
        return r.botWLaser || r.botWReady;
      }
      return r.botWReady;
    }

    function showsChargingPods(layout) {
      return layout === "layout-ready" || layout === "layout-laser" ||
        layout === "layout-intro-plug" || layout === "layout-intro-connected";
    }

    function introPlugYOffset(layout) {
      return layout === "layout-intro-plug" || layout === "layout-intro-connected" ? 18 : 0;
    }

    function connectedPodPlacement(layout, options) {
      return layout === "layout-intro-connected" ||
        layout === "layout-intro-plug" ||
        layout === "layout-ready" ||
        layout === "layout-laser";
    }

    function connectorOverlapBoostForRound(r, layout, options) {
      if (!connectedPodPlacement(layout, options)) {
        return 0;
      }
      if (layout === "layout-ready" && r && r.readyConnectorOverlapBoost !== undefined) {
        return r.readyConnectorOverlapBoost;
      }
      if (layout === "layout-laser" && r && r.laserConnectorOverlapBoost !== undefined) {
        return r.laserConnectorOverlapBoost;
      }
      return r && r.connectorOverlapBoost !== undefined ? r.connectorOverlapBoost : 0;
    }

    function clearPodIntroLayers() {
      Array.prototype.slice.call(els.bots.querySelectorAll(".pod-seq-layer")).forEach(function (node) {
        if (node.parentNode) {
          node.parentNode.removeChild(node);
        }
      });
    }

    function clearHollowFocusLayers() {
      Array.prototype.slice.call(els.bots.querySelectorAll(".pod-hollow-focus, .pod-hollow-focus-frame")).forEach(function (node) {
        if (node.parentNode) {
          node.parentNode.removeChild(node);
        }
      });
    }

    function clearConnectorStemCovers() {
      Array.prototype.slice.call(els.bots.querySelectorAll(".pod-connector-neck-cover")).forEach(function (node) {
        if (node.parentNode) {
          node.parentNode.removeChild(node);
        }
      });
    }

    function addPodIntroLayer(slotEl, podEl, className, delay) {
      var layer = document.createElement("img");
      layer.className = "pod-seq-layer " + className;
      layer.src = podEl.src;
      layer.alt = "";
      layer.setAttribute("aria-hidden", "true");
      layer.style.top = podEl.style.top;
      layer.style.width = podEl.style.width;
      layer.style.transform = podEl.style.transform;
      layer.style.marginLeft = podEl.style.marginLeft || "0px";
      if (delay) {
        layer.style.animationDelay = delay + "ms";
      }
      slotEl.insertBefore(layer, podEl);
    }

    function addPlugIntroSequence(options) {
      options = options || {};
      if (!options.connect) { return; }
      [
        { slot: els.leftBot.parentNode, pod: els.leftPod, delay: 0 },
        { slot: els.rightBot.parentNode, pod: els.rightPod, delay: 60 }
      ].forEach(function (item) {
        addPodIntroLayer(item.slot, item.pod, "pod-seq-hollow", item.delay);
        addPodIntroLayer(item.slot, item.pod, "pod-seq-cable", 460 + item.delay);
      });
    }

    /* Hides a horizontal band of the pod-img via a CSS mask. Used to remove the
       "neck" taper in the circle-horizontal LEFT pod asset, where the asset's
       narrow arc tip transitions through a wide cream taper into the cable —
       the orange piece's narrow apex can't cover that taper, so the cream
       reads as an asymmetric "thick rim" next to the other pod. Hiding the
       band makes the cable visually emerge from the orange's apex like the
       other side. `band` is `{start, end}` as fractions of the pod-img height,
       or null/undefined to clear. */
    function applyPodMaskBand(podEl, band) {
      if (!podEl) { return; }
      if (!band) {
        podEl.style.webkitMaskImage = "";
        podEl.style.maskImage = "";
        return;
      }
      var startPct = (band.start * 100).toFixed(3) + "%";
      var endPct = (band.end * 100).toFixed(3) + "%";
      var grad = "linear-gradient(to bottom, black 0%, black " + startPct +
                 ", transparent " + startPct + ", transparent " + endPct +
                 ", black " + endPct + ", black 100%)";
      podEl.style.webkitMaskImage = grad;
      podEl.style.maskImage = grad;
    }

    function connectorStemCoverForRound(r, side, podW) {
      if (!r || !r.connectorStemCover) { return null; }
      var cfg = side === "right" ? r.connectorStemCover.right : r.connectorStemCover.left;
      if (!cfg) { return null; }
      var scale = podW / (r.podW || podW || 1);
      return {
        top: (cfg.top || 0) * scale,
        width: (cfg.width || 20) * scale,
        height: (cfg.height || 15) * scale,
        x: (cfg.x || 0) * scale
      };
    }

    function connectorStemCoverNode(slotEl) {
      var covers = slotEl ? slotEl.querySelectorAll(".pod-connector-neck-cover") : [];
      return covers.length ? covers[0] : null;
    }

    function addConnectorStemCover(slotEl, podEl) {
      var r = currentRound();
      var side = slotEl.classList.contains("right-bot") ? "right" : "left";
      var podW = parseFloat(podEl.style.width) || (r && r.podW) || 132;
      var cfg = connectorStemCoverForRound(r, side, podW);
      if (!cfg) { return; }
      var cover = connectorStemCoverNode(slotEl);
      if (!cover) {
        cover = document.createElement("div");
        cover.className = "pod-connector-neck-cover visible";
        cover.setAttribute("aria-hidden", "true");
        slotEl.insertBefore(cover, podEl.nextSibling);
      }
      cover.setAttribute("aria-hidden", "true");
      cover.classList.add("visible");
      cover.style.transition = podEl.style.transition || "top .4s ease, margin-left .4s ease";
      cover.style.top = (parseFloat(podEl.style.top) + cfg.top) + "px";
      cover.style.marginLeft = ((parseFloat(podEl.style.marginLeft) || 0) + cfg.x) + "px";
      cover.style.setProperty("--connector-cover-w", cfg.width + "px");
      cover.style.setProperty("--connector-cover-h", cfg.height + "px");
    }

    function diagonalSemicircleFocusPath(r, side, w, h, pad) {
      var angle = canonicalCutAngle(r) * Math.PI / 180;
      var orientation = cutOrientation(canonicalCutAngle(r));
      var slotIndex = side === "right" ? 1 : 0;
      var pieceIndex = pieceIndexForSlot(r, slotIndex);
      var keepSign = lineSideForPiece(orientation, pieceIndex);
      var cx = pad + w / 2;
      var cy = pad + h / 2;
      var radius = Math.min(w, h) / 2;
      var dx = Math.cos(angle);
      var dy = Math.sin(angle);
      var startA = angle;
      var endA = angle + Math.PI;
      var midA = Math.atan2(-dx * keepSign, dy * keepSign);
      var twoPi = Math.PI * 2;

      function norm(a) {
        a = a % twoPi;
        return a < 0 ? a + twoPi : a;
      }

      function forwardDistance(a, b) {
        return (norm(b) - norm(a) + twoPi) % twoPi;
      }

      function point(a) {
        return {
          x: cx + Math.cos(a) * radius,
          y: cy + Math.sin(a) * radius
        };
      }

      function fmt(p) {
        return p.x.toFixed(1) + "," + p.y.toFixed(1);
      }

      var start = point(startA);
      var end = point(endA);
      var forwardArc = forwardDistance(endA, midA) <= Math.PI + 0.001;
      var arcDistance = forwardArc ? forwardDistance(endA, startA) : forwardDistance(startA, endA);
      var path = "M" + fmt(start) + " L" + fmt(end);
      var steps = 28;
      for (var i = 1; i <= steps; i++) {
        var t = i / steps;
        var a = forwardArc ? endA + arcDistance * t : endA - arcDistance * t;
        path += " L" + fmt(point(a));
      }
      return path + " Z";
    }

    function addSemicircleFocusLayer(slotEl, side) {
      var r = currentRound();
      if (!r || r.name !== "circle" ||
        (r.variant !== "circle-horizontal" && r.variant !== "circle-vertical" &&
          r.variant !== "circle-diagonal")) {
        return false;
      }
      var fill = side === "right" ? els.rightFill : els.leftFill;
      if (!fill) { return false; }

      // Diagonal-circle: outline the SAME calibrated hollow shape the fill uses,
      // anchored to the pod box, so the cyan highlight traces the hollow exactly
      // (instead of the old slot-relative, hand-offset path that drifted inside it).
      if (r.variant === "circle-diagonal") {
        var dgeo = DIAG_HOLLOW_GEOMETRY[podBasename(side === "right" ? r.podRight : r.podLeft)];
        var dpod = side === "right" ? els.rightPod : els.leftPod;
        if (dgeo && dpod) {
          var fPodW = r.podW || 132;
          var fPodH = diagPodH(r, side);
          // The left/right pods are different assets with hollows ~6% different in size.
          // The cue uses ONE uniform radius so both sides look equal; biased slightly small
          // so it never spills out of the smaller hollow (at most a hair inside the larger).
          var fcx = dgeo.fx * fPodW, fcy = dgeo.fy * fPodW, frr = DIAG_FOCUS_RADIUS_FRAC * fPodW;
          var fd = semicircleSegmentPath(fcx, fcy, frr, dgeo.diamAng, dgeo.keepDir, DIAG_FILL_FLATPAD);
          var fns = "http://www.w3.org/2000/svg";
          var fsvg = document.createElementNS(fns, "svg");
          fsvg.setAttribute("viewBox", "0 0 " + fPodW + " " + fPodH);
          fsvg.classList.add("pod-hollow-focus-frame", "semicircle-focus", r.variant, "slot-" + side);
          fsvg.setAttribute("aria-hidden", "true");
          fsvg.style.top = (parseFloat(dpod.style.top) || 0) + "px";
          fsvg.style.width = fPodW + "px";
          fsvg.style.height = fPodH + "px";
          fsvg.style.marginLeft = (parseFloat(dpod.style.marginLeft) || 0) + "px";
          fsvg.style.transform = "translateX(-50%)"; // centre on the pod even before the pulse animation starts
          fsvg.style.transformOrigin = fcx + "px " + fcy + "px"; // pulse scales around the hollow, not the tall box
          ["semicircle-focus-aura", "semicircle-focus-rim"].forEach(function (className) {
            var fp = document.createElementNS(fns, "path");
            fp.setAttribute("class", className);
            fp.setAttribute("d", fd);
            fsvg.appendChild(fp);
          });
          slotEl.insertBefore(fsvg, fill.nextSibling);
          return true;
        }
      }

      var baseW = parseFloat(fill.style.width) || targetSlotSizeForRound(r).width;
      var baseH = parseFloat(fill.style.height) || targetSlotSizeForRound(r).height;
      var top = parseFloat(fill.style.top) || 0;
      var marginLeft = parseFloat(fill.style.marginLeft) || 0;
      var pad = r.variant === "circle-diagonal" ? 14 : (r.variant === "circle-vertical" ? 12 : 10);
      var focusOffset = (r.semicircleFocusOffset && (side === "right" ? r.semicircleFocusOffset.right : r.semicircleFocusOffset.left)) || {};
      var focusScaleCfg = r.semicircleFocusScale;
      var focusScale = 1;
      if (typeof focusScaleCfg === "number") {
        focusScale = focusScaleCfg;
      } else if (focusScaleCfg) {
        focusScale = side === "right" ? (focusScaleCfg.right || 1) : (focusScaleCfg.left || 1);
      }
      var w = baseW * focusScale;
      var h = baseH * focusScale;
      var svgW = w + pad * 2;
      var svgH = h + pad * 2;
      var p = pad;
      var d = "";

      if (r.variant === "circle-horizontal") {
        if (side === "right") {
          d = "M" + p + "," + (p + h) +
            " L" + (p + w) + "," + (p + h) +
            " C" + (p + w) + "," + (p - h * 0.333) +
            " " + p + "," + (p - h * 0.333) +
            " " + p + "," + (p + h) + " Z";
        } else {
          d = "M" + p + "," + p +
            " L" + (p + w) + "," + p +
            " C" + (p + w) + "," + (p + h * 1.333) +
            " " + p + "," + (p + h * 1.333) +
            " " + p + "," + p + " Z";
        }
      } else if (r.variant === "circle-vertical" && side === "right") {
        d = "M" + p + "," + p +
          " L" + p + "," + (p + h) +
          " C" + (p + w * 1.333) + "," + (p + h) +
          " " + (p + w * 1.333) + "," + p +
          " " + p + "," + p + " Z";
      } else if (r.variant === "circle-vertical") {
        d = "M" + (p + w) + "," + p +
          " L" + (p + w) + "," + (p + h) +
          " C" + (p - w * 0.333) + "," + (p + h) +
          " " + (p - w * 0.333) + "," + p +
          " " + (p + w) + "," + p + " Z";
      } else {
        d = diagonalSemicircleFocusPath(r, side, w, h, p);
      }

      var ns = "http://www.w3.org/2000/svg";
      var svg = document.createElementNS(ns, "svg");
      svg.setAttribute("viewBox", "0 0 " + svgW + " " + svgH);
      svg.classList.add("pod-hollow-focus-frame", "semicircle-focus", r.variant, "slot-" + side);
      svg.setAttribute("aria-hidden", "true");
      svg.style.top = (top - pad - (h - baseH) / 2 + (focusOffset.y || 0)) + "px";
      svg.style.width = svgW + "px";
      svg.style.height = svgH + "px";
      svg.style.marginLeft = (marginLeft - (w - baseW) / 2 + (focusOffset.x || 0)) + "px";

      ["semicircle-focus-aura", "semicircle-focus-rim"].forEach(function (className) {
        var path = document.createElementNS(ns, "path");
        path.setAttribute("class", className);
        path.setAttribute("d", d);
        svg.appendChild(path);
      });
      slotEl.insertBefore(svg, fill.nextSibling);
      return true;
    }

    function addHollowFocusLayer(slotEl, podEl) {
      var r = currentRound();
      var side = slotEl.classList.contains("right-bot") ? "right" : "left";
      var isTrianglePod = r && r.name === "square";
      var podW = parseFloat(podEl.style.width) || (r && r.podW) || 132;
      if (addSemicircleFocusLayer(slotEl, side)) {
        return;
      }
      if (isTrianglePod) {
        var ns = "http://www.w3.org/2000/svg";
        var svg = document.createElementNS(ns, "svg");
        var isRight = side === "right";
        var viewBox = isRight ? "0 0 444 430" : "0 0 469 390";
        var points = isRight ? "10,59 375,59 375,424" : "69,2 69,367 434,367";
        svg.setAttribute("viewBox", viewBox);
        svg.classList.add("pod-hollow-focus-frame", "triangle-focus", isRight ? "triangle-right" : "triangle-left");
        svg.setAttribute("aria-hidden", "true");
        svg.style.top = podEl.style.top;
        svg.style.width = podW + "px";
        svg.style.height = Math.round(podW * (isRight ? 430 / 444 : 390 / 469)) + "px";
        svg.style.marginLeft = podEl.style.marginLeft || "0px";

        ["triangle-focus-aura", "triangle-focus-rim"].forEach(function (className) {
          var poly = document.createElementNS(ns, "polygon");
          poly.setAttribute("class", className);
          poly.setAttribute("points", points);
          svg.appendChild(poly);
        });
        slotEl.insertBefore(svg, podEl.nextSibling);
        return;
      }

      var layer = document.createElement("img");
      layer.className = "pod-hollow-focus";
      layer.src = podEl.src;
      layer.alt = "";
      layer.setAttribute("aria-hidden", "true");
      layer.style.top = podEl.style.top;
      layer.style.width = podEl.style.width;
      layer.style.transform = podEl.style.transform;
      layer.style.marginLeft = podEl.style.marginLeft || "0px";
      if (r && r.hollowFocusClip) {
        layer.style.clipPath = r.hollowFocusClip;
      }
      slotEl.insertBefore(layer, podEl.nextSibling);

      var frame = document.createElement("div");
      frame.className = "pod-hollow-focus-frame";
      frame.setAttribute("aria-hidden", "true");
      var focusOffset = (r && r.focusFrameOffset) || {};
      var focusScale = podW / ((r && r.podW) || podW || 1);
      frame.style.top = (parseFloat(podEl.style.top) + (focusOffset.top || 0) * focusScale) + "px";
      var ffs = r && r.focusFrameSize;
      var wRatio = (ffs && ffs.wRatio) || 0.79;
      var hRatio = (ffs && ffs.hRatio) || 0.79;
      frame.style.setProperty("--hollow-focus-w", Math.round(podW * wRatio) + "px");
      frame.style.setProperty("--hollow-focus-h", Math.round(podW * hRatio) + "px");
      frame.style.marginLeft = ((parseFloat(podEl.style.marginLeft) || 0) + (focusOffset.x || 0) * focusScale) + "px";
      if (podEl.style.transform && podEl.style.transform.indexOf("scaleX(-1)") !== -1) {
        frame.style.transform = "translateX(-50%) scaleX(-1)";
      }
      slotEl.insertBefore(frame, layer.nextSibling);
    }

    function setupBots(layout, options) {
      var r = currentRound();
      options = options || {};
      var shouldAnimateConnection = (layout === "layout-ready" || layout === "layout-intro-plug") && options.connect === true;
      var className = layout;
      if (shouldAnimateConnection) {
        className += " power-connecting";
      } else if (showsChargingPods(layout)) {
        className += " power-connected";
      }
      if (options.moveFromCenter) {
        className += " move-from-center";
      }
      clearPodIntroLayers();
      clearHollowFocusLayers();
      clearConnectorStemCovers();
      /* Defensive: setupBots is also called outside the renderStep path
         (showSuccess, showFail, tryAgain, restoreMachineForRetry). If a
         stale inline transition from a previous switchBotsToHappy survived
         to this point, the new top/marginLeft we're about to write below
         would animate over ~0.4s — visible as a slide/snap. Snap inline
         transitions to none before we write the new geometry; CSS-class
         driven animations (powerCableConnect etc.) still fire normally. */
      [els.leftPod, els.rightPod, els.leftFill, els.rightFill].forEach(function (el) {
        if (el) { el.style.transition = ""; }
      });
      els.leftBot.parentNode.classList.remove("celebrate-jump");
      els.rightBot.parentNode.classList.remove("celebrate-jump");
      els.bots.className = className;
      els.leftBot.src = r.sadBot;
      els.rightBot.src = r.sadBot;
      els.leftPod.src = r.podLeft || r.pod;
      els.rightPod.src = r.podRight || r.pod;
      els.leftPod.style.transform = r.podFlipLeft ? "translateX(-50%) scaleX(-1)" : "translateX(-50%)";
      els.rightPod.style.transform = r.podFlipRight ? "translateX(-50%) scaleX(-1)" : "translateX(-50%)";
      /* Defer pod-mask application until fillSlotWithPiece runs. The mask
         (used by round 7 LEFT pod to hide the cream "neck" taper that the
         orange piece's apex can't cover) creates a visible *cable cut*
         between the bowl and the connector when the slot is still empty —
         because the masked band sits in the bowl-to-cable transition of
         the asset. Clearing the mask in the empty state lets the cable
         render whole; fillSlotWithPiece re-applies the mask once the
         orange piece is in the bowl and hiding the taper is actually
         desired. Safe: the mask is a pure visual filter on the pod IMG,
         not a layout property. */
      applyPodMaskBand(els.leftPod, null);
      applyPodMaskBand(els.rightPod, null);
      var botW = botWidthForLayout(r, layout);
      els.leftBot.style.width = botW + "px";
      els.rightBot.style.width = botW + "px";
      els.leftBot.style.marginLeft = "";
      els.rightBot.style.marginLeft = "";

    function normalizedAngle(angle) {

    function clipPolygon(points, width, height, angle, keepSign) {
      var rad = lineAngleDegrees(angle) * Math.PI / 180;
      var dx = Math.cos(rad);
      var dy = Math.sin(rad);
      var cx = width / 2;
      var cy = height / 2;
      var eps = 0.001;

      function side(p) {
        return (p.x - cx) * dy - (p.y - cy) * dx;
      }
      function inside(s) {
        return keepSign > 0 ? s >= -eps : s <= eps;
      }
      function intersect(a, b, sa, sb) {
        var t = sa / (sa - sb);
        return {
          x: a.x + (b.x - a.x) * t,
          y: a.y + (b.y - a.y) * t

      var output = [];
      for (var i = 0; i < points.length; i++) {
        var current = points[i];
        var prev = points[(i + points.length - 1) % points.length];
        var currentSide = side(current);
        var prevSide = side(prev);
        var currentInside = inside(currentSide);
        var prevInside = inside(prevSide);

        if (currentInside) {

          output.push(current);

          output.push(intersect(prev, current, prevSide, currentSide));

        var prev = arr[(index + arr.length - 1) % arr.length];
        return Math.abs(p.x - prev.x) > eps || Math.abs(p.y - prev.y) > eps;
      });

    function pieceGeometry(width, height, angle, index) {

      var minX = Math.min.apply(null, polygon.map(function (p) { return p.x; }));
      var minY = Math.min.apply(null, polygon.map(function (p) { return p.y; }));
      var maxX = Math.max.apply(null, polygon.map(function (p) { return p.x; }));
      var maxY = Math.max.apply(null, polygon.map(function (p) { return p.y; }));

        minY: minY,

    function makeCutPiece(r, index, width, height, angle) {

           innerHTML on an SVG element has a known Chromium first-paint
           glitch where the inner `<image>` paints UNCLIPPED for one frame
           before the `<defs>/<clipPath>` reference is resolved — visible as
           an oversized rectangle (rectangle block) or full circle (circle

           the same tree node-by-node forces the clip-path linkage to be
           live on the very first paint. Safe: produces a structurally

          var circleClip = document.createElementNS(ns, "clipPath");

        imageEl.setAttributeNS(xlinkNs, "xlink:href", r.blockSrc);
        imageEl.setAttribute("href", r.blockSrc);
        imageEl.setAttribute("width", width);
        imageEl.setAttribute("height", height);
        imageEl.setAttribute("clip-path", "url(#" + clipId + ")");
        imageEl.setAttribute("preserveAspectRatio", "none");
        groupEl.appendChild(imageEl);
        svg.appendChild(groupEl);
        wrap.appendChild(svg);
      } else {

        inner.classList.add("half-inner");
        inner.style.filter = "none";
        inner.style.borderRadius = "0";
        inner.style.left = (-g.minX) + "px";
        inner.style.top = (-g.minY) + "px";
        inner.style.clipPath = g.clipInner;
        wrap.appendChild(inner);
      }
      return wrap;
    }

    function splitOffsetForOrientation(orientation, distance) {

    function renderWhole(glow, cue) {

    function renderSplitCue() {
