      demo.style.width = r.blockW + "px";
      demo.style.height = r.blockH + "px";

      var whole = makeBlock(r, r.blockW, r.blockH);
      whole.classList.add("static-glow");
      demo.appendChild(whole);

      var dPieces = [];
      [0, 1].forEach(function (index) {
        var g = pieceGeometry(r.blockW, r.blockH, angle, index);
        var piece = makeCutPiece(r, index, r.blockW, r.blockH, angle);
        piece.classList.add("split-demo-piece");
        /* half-wrap has position:relative (later in stylesheet than split-demo-piece's absolute),
           so inline style wins and correctly positions pieces within the block-sized container */
        piece.style.position = "absolute";
        piece.style.left = g.minX + "px";
        piece.style.top = g.minY + "px";
        dPieces.push(piece);
        demo.appendChild(piece);
      });

      els.shapeStage.appendChild(demo);
      show(els.shapeStage);

      whenInstructionAudioEnds(function () {
        playInstructionAudio("into two equal parts.");
        sndSplitDemo();
        whole.style.transition = "opacity 0.3s ease";
        whole.style.opacity = "0";

        /* Show halves with tiny seam only — pieces stay centre-aligned */
        var seamOffsets = splitOffsetForOrientation(orientation, 2);
        dPieces.forEach(function (piece, index) {
          piece.style.opacity = "1";
          piece.style.transform = "translate(" + seamOffsets[index].x + "px," + seamOffsets[index].y + "px)";
        });

        /* After a brief pause, draw the travel guides and run the full
           out-and-back preview before the final move into each hollow slot. */
        later(function () {
          var podTopL = podTopForRound(r, "layout-ready", "left");
          var podTopR = podTopForRound(r, "layout-ready", "right");
          var slotSize = targetSlotSizeForRound(r);
          /* Left bot: left:80px, slot width 260px → centre x = 80+130 = 210
             Right bot: right:80px → centre x = 1280-80-130 = 1070
             Plus per-round X nudge to align with the visual hollow */
          var leftSlotCX  = 80 + 130 + targetSlotXOffsetForRound(r, "left");
          var rightSlotCX = 1280 - 80 - 130 + targetSlotXOffsetForRound(r, "right");
          var leftSlotCY  = podTopL + targetSlotOffsetForRound(r, "left")  + slotSize.height / 2;
          var rightSlotCY = podTopR + targetSlotOffsetForRound(r, "right") + slotSize.height / 2;

          dPieces.forEach(function (piece, index) {
            var g = pieceGeometry(r.blockW, r.blockH, angle, index);
            /* Piece centre in game-space coordinates */
            var pcX = 640 - r.blockW / 2 + g.minX + g.width  / 2;
            var pcY = 360 - r.blockH / 2 + g.minY + g.height / 2;
            var goesToLeft = pieceIndexForSlot(r, 0) === index;
            var targetSide = goesToLeft ? "left" : "right";
            var previewNudge = previewSlotNudgeForRound(r, targetSide);
            var targetX = (goesToLeft ? leftSlotCX  : rightSlotCX) + previewNudge.x;
            var targetY = (goesToLeft ? leftSlotCY  : rightSlotCY) + previewNudge.y;
            var dx = targetX - pcX;
            var dy = targetY - pcY;
            var startX = pcX + seamOffsets[index].x;
            var startY = pcY + seamOffsets[index].y;
            var controlX = (startX + targetX) / 2 + (goesToLeft ? -62 : 62);
            var panelClearY = 245;
            var softArcY = Math.min(startY, targetY) - 96;
            var controlY = Math.max(panelClearY, softArcY);
            var mx = controlX - pcX;
            var my = controlY - pcY;
            var slotScale = slotScaleForPiece({ width: slotSize.width, height: slotSize.height }, g) *
              visualFitScaleForRound(r) * previewFitScaleForRound(r);
            var motionEndX = targetX;
            var motionEndY = targetY;
            var guideEndX = targetX + (targetSide === "left" ? slotSize.width / 2 + 22 : -slotSize.width / 2 - 22);
            var guideEndY = targetY;
            var p18 = bezierPoint(startX, startY, controlX, controlY, motionEndX, motionEndY, 0.18);
            var p38 = bezierPoint(startX, startY, controlX, controlY, motionEndX, motionEndY, 0.38);
            var p62 = bezierPoint(startX, startY, controlX, controlY, motionEndX, motionEndY, 0.62);
            var p82 = bezierPoint(startX, startY, controlX, controlY, motionEndX, motionEndY, 0.82);

            piece.style.setProperty("--seamX", seamOffsets[index].x + "px");
            piece.style.setProperty("--seamY", seamOffsets[index].y + "px");
            piece.style.setProperty("--tx", dx + "px");
            piece.style.setProperty("--ty", dy + "px");
            piece.style.setProperty("--mx", mx + "px");
            piece.style.setProperty("--my", my + "px");
            piece.style.setProperty("--p18x", (p18.x - pcX) + "px");
            piece.style.setProperty("--p18y", (p18.y - pcY) + "px");
            piece.style.setProperty("--p38x", (p38.x - pcX) + "px");
            piece.style.setProperty("--p38y", (p38.y - pcY) + "px");
            piece.style.setProperty("--p62x", (p62.x - pcX) + "px");
            piece.style.setProperty("--p62y", (p62.y - pcY) + "px");
            piece.style.setProperty("--p82x", (p82.x - pcX) + "px");
            piece.style.setProperty("--p82y", (p82.y - pcY) + "px");
            piece.style.setProperty("--slotScale", slotScale.toFixed(3));
            /* Clear the inline transform so the keyframe owns it */
            piece.style.transition = "none";
            piece.style.transform = "";
            if (r.name === "rectangle") {
              piece.classList.add("socket-square-preview");
            }
            piece.classList.add("fly-tease");

            addSlotPathGuide(startX, startY, controlX, controlY, guideEndX, guideEndY, index);
          });
        }, 700);
      });
    }

    function bezierPoint(startX, startY, controlX, controlY, endX, endY, t) {
      var inv = 1 - t;
      return {
        x: inv * inv * startX + 2 * inv * t * controlX + t * t * endX,
        y: inv * inv * startY + 2 * inv * t * controlY + t * t * endY
      };
    }

    function addSlotPathGuide(startX, startY, controlX, controlY, targetX, targetY, index) {
      var svg = els.flightLayer.querySelector(".slot-path-guide");
      var ns = "http://www.w3.org/2000/svg";
      if (!svg) {
        svg = document.createElementNS(ns, "svg");
        svg.setAttribute("class", "slot-path-guide");
        svg.setAttribute("viewBox", "0 0 1280 720");
        svg.setAttribute("aria-hidden", "true");

        els.flightLayer.appendChild(svg);
      }

      /* Compute arrowhead geometry first so the dashed path can stop at the
         arrow's base — otherwise the line draws through the arrow body. */
      var endAngle = Math.atan2(targetY - controlY, targetX - controlX);
      var size = 28;
      var tipX = targetX;
      var tipY = targetY;
      var backX = tipX - Math.cos(endAngle) * size;
      var backY = tipY - Math.sin(endAngle) * size;
      var wing = size * 0.58;
      var leftX = backX + Math.cos(endAngle + Math.PI / 2) * wing;
      var leftY = backY + Math.sin(endAngle + Math.PI / 2) * wing;
      var rightX = backX + Math.cos(endAngle - Math.PI / 2) * wing;
      var rightY = backY + Math.sin(endAngle - Math.PI / 2) * wing;

      var d = "M " + startX.toFixed(1) + " " + startY.toFixed(1) +
        " Q " + controlX.toFixed(1) + " " + controlY.toFixed(1) +
        " " + backX.toFixed(1) + " " + backY.toFixed(1);

      var shadow = document.createElementNS(ns, "path");
      shadow.setAttribute("class", "slot-path-shadow");
      shadow.setAttribute("d", d);
      svg.appendChild(shadow);

      var path = document.createElementNS(ns, "path");
      path.setAttribute("d", d);
      path.style.animationDelay = (index * 0.16) + "s";
      svg.appendChild(path);

      var arrow = document.createElementNS(ns, "polygon");
      arrow.setAttribute("class", "slot-path-arrow");
      arrow.setAttribute("points",
        tipX.toFixed(1) + "," + tipY.toFixed(1) + " " +
        leftX.toFixed(1) + "," + leftY.toFixed(1) + " " +
        rightX.toFixed(1) + "," + rightY.toFixed(1));
      arrow.style.animationDelay = (index * 0.16) + "s";
      svg.appendChild(arrow);
    }

    function renderHalves(target, size) {
      var r = currentRound();
      var width = size && size.width ? size.width : r.blockW;
      var height = size && size.height ? size.height : r.blockH;
      var row = document.createElement("div");
      row.className = "halves-row";
      row.appendChild(makeHalf(r, 0, width, height));
      row.appendChild(makeHalf(r, 1, width, height));
      target.innerHTML = "";
      target.appendChild(row);
    }

    function makeTeachingPieces(r, angle, width, height) {
      var orientation = cutOrientation(angle);
      var gap = 30;
      var pad = gap + 10; /* extra room for pieces sliding out */
      var lblH = 38; /* space for "Half" label below pieces */

      var g0 = pieceGeometry(width, height, angle, 0);
      var g1 = pieceGeometry(width, height, angle, 1);

      /* Expanded container so pieces don't clip when they slide apart */
      var cW = width + pad * 2;
      var cH = height + pad * 2 + lblH;

      var box = document.createElement("div");
      box.className = "teach-halves-box";

      var container = document.createElement("div");
      container.style.cssText = "position:relative;width:" + cW + "px;height:" + cH + "px;";

      var h0 = makeCutPiece(r, 0, width, height, angle);
      var h1 = makeCutPiece(r, 1, width, height, angle);
      h0.classList.add("teach-shape-glow", "teach-pop");
      h1.classList.add("teach-shape-glow", "teach-pop", "teach-pop-d1");
      h0.style.transition = "transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)";
      h1.style.transition = "transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)";

      /* Offset pieces into padded container center */
      h0.style.position = "absolute";
      h0.style.left = (g0.minX + pad) + "px";
      h0.style.top = (g0.minY + pad) + "px";
      h1.style.position = "absolute";
      h1.style.left = (g1.minX + pad) + "px";
      h1.style.top = (g1.minY + pad) + "px";

      h0.dataset.gapX = "0"; h0.dataset.gapY = "0";
      h1.dataset.gapX = "0"; h1.dataset.gapY = "0";

      if (orientation === "slash") {
        h0.dataset.gapX = -gap; h0.dataset.gapY = -gap;
        h1.dataset.gapX = gap; h1.dataset.gapY = gap;
      } else if (orientation === "backslash") {
        h0.dataset.gapX = gap; h0.dataset.gapY = -gap;
        h1.dataset.gapX = -gap; h1.dataset.gapY = gap;
      } else if (orientation === "vertical") {
        h0.dataset.gapX = -gap; h0.dataset.gapY = 0;
        h1.dataset.gapX = gap; h1.dataset.gapY = 0;
      } else if (orientation === "horizontal") {
        h0.dataset.gapX = 0; h0.dataset.gapY = -gap;
        h1.dataset.gapX = 0; h1.dataset.gapY = gap;
      }

      function polygonPoints(g) {
        return g.absPolygon.split(" ").map(function (pair) {
          var xy = pair.split(",");
          return { x: parseFloat(xy[0]), y: parseFloat(xy[1]) };
        });
      }

      function polygonCentroid(points) {
        var area = 0;
        var cx = 0;
        var cy = 0;
        for (var i = 0; i < points.length; i++) {
          var p0 = points[i];
          var p1 = points[(i + 1) % points.length];
          var cross = p0.x * p1.y - p1.x * p0.y;
          area += cross;
          cx += (p0.x + p1.x) * cross;
          cy += (p0.y + p1.y) * cross;
        }
        area *= 0.5;
        if (Math.abs(area) < 0.001) {
          return points.reduce(function (acc, p) {
            acc.x += p.x / points.length;
            acc.y += p.y / points.length;
            return acc;
          }, { x: 0, y: 0 });
        }
        return { x: cx / (6 * area), y: cy / (6 * area) };
      }

      function teachingHalfLabelPosition(g, piece, index) {
        var points = polygonPoints(g);
        var centroid = polygonCentroid(points);
        var dx = parseFloat(piece.dataset.gapX || "0");
        var dy = parseFloat(piece.dataset.gapY || "0");
        var maxX = Math.max.apply(null, points.map(function (p) { return p.x; }));
        var bottom = Math.max.apply(null, points.map(function (p) { return p.y; }));
        var labelGap = (orientation === "slash" || orientation === "backslash") ? 10 : 10;
        /* For circle rounds with diagonal cuts the visible half-disk's bottom is the
           chord-circle intersection on the "upper" side (~0.854h), not the polygon
           bottom corner (h). Pull the label up to match the actual curve. */
        if (r.name === "circle" && (orientation === "slash" || orientation === "backslash")) {
          var upperPiece = index === 0;
          if (upperPiece) {
            bottom = height * (2 + Math.sqrt(2)) / 4;
          }
        }
        if (r.cut === "diagonal" && orientation === "backslash" && index === 0) {
          return {
            x: pad + maxX + dx + 36,
            y: pad + centroid.y + dy + 8
          };
        }
        return {
          x: pad + centroid.x + dx,
          y: pad + bottom + dy + labelGap
        };
      }

      /* Labels follow each clipped polygon, not its bounding box. This matters for diagonal triangles. */
      var lbl0 = teachingHalfLabelPosition(g0, h0, 0);
      var lbl1 = teachingHalfLabelPosition(g1, h1, 1);

      function makeHalfLabel(pos) {
        var lbl = document.createElement("span");
        lbl.className = "t-half-lbl";
        lbl.textContent = "Half";
        lbl.style.cssText = "position:absolute;left:" + pos.x + "px;top:" + pos.y + "px;" +
          "transform:translateX(-50%) translateY(8px);opacity:0;" +
          "transition:opacity .5s ease,transform .5s ease;";
        return lbl;
      }

      var halfLbl0 = makeHalfLabel(lbl0);
      var halfLbl1 = makeHalfLabel(lbl1);

      container.appendChild(h0);
      container.appendChild(h1);
      container.appendChild(halfLbl0);
      container.appendChild(halfLbl1);
      box.appendChild(container);

      box._halfLabels = [halfLbl0, halfLbl1];
      box._pieces = [h0, h1];
      return box;
    }

    function renderTeaching(kind, angle, equal, onNext) {
      var r = currentRound();
      var cutAngle = angle === undefined ? canonicalCutAngle(r) : angle;
      var w;
      if (r.name === "rectangle" && r.variant === "rectangle-tall") {
        w = 80;
      } else if (r.name === "rectangle" && r.variant === "rectangle-wide") {
        w = 360;
      } else if (r.name === "rectangle" && r.variant === "rectangle-vertical") {
        w = 110;
      } else if (r.name === "rectangle" && r.variant === "rectangle-wide-hcut") {
        w = 180;
      } else if (r.name === "rectangle" && r.variant === "rectangle-flat-hcut") {
        w = 220;
      } else if (r.name === "rectangle") {
        w = 170;
      } else if (r.name === "circle") {
        w = 145;
      } else {
        w = 130;
      }
      var h = Math.round(w * r.blockH / r.blockW);
      els.teachContent.innerHTML = "";
      state.teachingActive = true;
      els.game.classList.add("teaching-active");
      setInstruction("");

      /* ── Frame ── */
      var frame = document.createElement("div");
      frame.className = "teach-frame";

      /* ── Left column ── */
      var leftCol = document.createElement("div");
      leftCol.className = "teach-frame-left";

      /* Whole block section — appears at top, stays there */
      var wholeSection = document.createElement("div");
      wholeSection.className = "teach-whole-section";
      wholeSection.style.opacity = "0";
      var wholeBlk = makeBlock(r, w, h);
      wholeSection.appendChild(wholeBlk);
      leftCol.appendChild(wholeSection);

      /* Moving clone — this replica descends and turns into the halves */
      var cloneSection = document.createElement("div");
      cloneSection.className = "teach-clone-section";
      var cloneBlk = makeBlock(r, w, h);
      cloneSection.appendChild(cloneBlk);
      leftCol.appendChild(cloneSection);

      /* Halves section — positioned below whole section, initially hidden */
      var halvesSection = document.createElement("div");
      halvesSection.className = "teach-halves-section";
      halvesSection.style.opacity = "0";
      var halvesBox = makeTeachingPieces(r, cutAngle, w, h);
      halvesSection.appendChild(halvesBox);
      leftCol.appendChild(halvesSection);

      /* ── Right column ── */
      var rightCol = document.createElement("div");
      rightCol.className = "teach-frame-right";

      var lblWhole = document.createElement("div");
      lblWhole.style.cssText = "opacity:0; transform:translateY(14px); transition:opacity .52s ease, transform .52s cubic-bezier(.18,.89,.32,1.18);";
      var lblWholeText = document.createElement("div");
      lblWholeText.className = "teach-big-label";
      lblWholeText.textContent = "1 Whole";
      lblWhole.appendChild(lblWholeText);
      rightCol.appendChild(lblWhole);

      var lblEqual = document.createElement("div");
      lblEqual.style.cssText = "opacity:0; transform:translateY(14px); transition:opacity .52s ease, transform .52s cubic-bezier(.18,.89,.32,1.18);";
      var lblEqualText = document.createElement("div");
      lblEqualText.className = "teach-equal-label";
      lblEqualText.textContent = equal === false ? "2 Equal Parts" : "2 Equal Parts";
      lblEqual.appendChild(lblEqualText);
      rightCol.appendChild(lblEqual);

      frame.appendChild(leftCol);
      frame.appendChild(rightCol);
      els.teachContent.appendChild(frame);
      show(els.teachStage);

      /* Step 1: whole block fades in at top position */
      later(function () {
        wholeSection.style.opacity = "1";
      }, TIMING.TEACH_WHOLE_IN);

      later(function () {
        lblWhole.style.opacity = "1";
        lblWhole.style.transform = "translateY(0)";
        wholeBlk.classList.add("teach-shape-glow");
      }, TIMING.TEACH_LABEL_IN);

      later(function () {
        /* Clone descends to halves position while the original whole stays visible */
        cloneSection.style.opacity = "1";
        cloneSection.style.transform = "translateY(230px) scale(.97)";
      }, TIMING.TEACH_MOVE_DOWN);

      /* Step 5: clone fades out, halves fade in at the same Y position */
      later(function () {
        wholeBlk.classList.remove("teach-shape-glow");
        cloneSection.style.opacity = "0";
        halvesSection.style.opacity = "1";
        halvesSection.style.transform = "translateY(0) scale(1)";
        var pieces = halvesBox._pieces || [];
        requestAnimationFrame(function () {
          pieces.forEach(function (p) {
            /* Remove teach-pop fill-mode so its transform no longer competes with the inline translate */
            p.classList.remove("teach-pop", "teach-pop-d1");
            p.style.transform = "translate(" + p.dataset.gapX + "px," + p.dataset.gapY + "px)";
          });
        });
      }, TIMING.TEACH_SPLIT);

      later(function () {
        (halvesBox._halfLabels || []).forEach(function (lbl) {
          lbl.style.opacity = "1";
          lbl.style.transform = "translateX(-50%) translateY(0)";
        });
      }, TIMING.TEACH_HALF_LABELS);

      later(function () {
        (halvesBox._pieces || []).forEach(function (p) {
          p.style.transition = "filter 0.5s ease, transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)";
          p.classList.remove("teach-shape-glow");
        });
      }, TIMING.TEACH_SPLIT + 3000);

      later(function () {
        lblEqual.style.opacity = "1";
        lblEqual.style.transform = "translateY(0)";
      }, TIMING.TEACH_EQUAL_LABEL);

      if (typeof onNext === "function") {
        scheduleTeachingNext(onNext);
      }
    }

    function renderStep() {
      clearTimers();
      resetScene();
      playScreenFade();

      var r = currentRound();
      var step = FLOW[state.step];
      var text = step.text ? step.text.replace("{shape}", r.name) : "";
      if (state.round > 0) {
        if (step.scene === "intro" || step.scene === "plug" || step.scene === "plugReady" ||
          step.scene === "moveOut" || step.scene === "whole" || step.scene === "needs" ||
          step.scene === "halves" || step.scene === "laserIntro" || step.scene === "tutorial" || step.scene === "preplay") {
          nextStep();
          return;
        }
      }

      if (step.scene === "intro") {
        els.sceneBg.style.display = "block";
        setInstruction(text);
        setupBots("layout-intro");
      }

      if (step.scene === "plug") {
        setupPlugAttach();
      }

      if (step.scene === "plugReady") {
        setupPlugReady(text);
      }

      if (step.scene === "moveOut") {
        setupMoveOut();
      }

      if (step.scene === "whole") {
        setupWholeIntro(text);
      }

      if (step.scene === "needs") {
        els.sceneBg.style.display = "block";
        setInstruction(text);
        setupBots("layout-ready");
        renderWhole(false, "halves");
      }

      if (step.scene === "halves") {
        els.sceneBg.style.display = "block";
        setInstruction(text);
        setupBots("layout-ready");
        renderSplitCue();
      }

      if (step.scene === "play") {
        if (state.round > 0) { nextStep(); return; }
        state.locked = false;
        setInstruction("");
        setupBots("layout-clear");
        els.playBg.src = ASSETS + "GameStartScreen.png";
        els.playButtonImg.src = ASSETS + "LetsGoButton.png";
        els.playButtonImg.alt = "Let's Go";
        els.playButton.setAttribute("aria-label", "Let's go");
        els.playStage.classList.add("start-mode");
        els.iraChar.classList.remove("play-idle");
        els.iraChar.style.transition = "";
        els.iraChar.style.transform = "";
        els.iraGlowRing.classList.remove("show");
        els.playStage.classList.remove("play-exit");
        els.playButton.classList.remove("play-ready", "play-clicked");
        els.playButton.style.opacity = "0";
        els.playButton.style.transform = "scale(0.85) translateY(16px)";
        show(els.playStage);
        later(function () {
          els.playButton.style.opacity = "1";
          els.playButton.style.transform = "scale(1) translateY(0)";
        }, 220);
        later(function () {
          els.playButton.classList.add("play-ready");
        }, 560);
      }

      if (step.scene === "tutorial") {
        if (state.round > 0) {
          nextStep();
          return;
        }
        setupTutorial();
        return;
      }

      if (step.scene === "preplay") {
        setupPreplay(text);
      }

      if (step.scene === "laserIntro") {
        setupLaserIntro(text);
      }

      if (step.scene === "cutInstruct") {
        setupCutInstruct(text);
      }

      if (step.scene === "slotInstruct") {
        setupSlotInstruct(text);
      }

      if (step.scene === "laser") {
        setupLaser();
        return;
      }

      if (step.duration) {
        later(nextStep, step.duration);
      }
    }

    function nextStep() {
      state.step++;
      if (state.step >= FLOW.length) {
        state.step = FLOW.length - 1;
      }
      renderStep();
    }

    /* ── Tutorial guided sequence (4 moves × 4 cuts demo) ── */
    var TUTORIAL_START_ANGLE = 180;
    /* Angles the laser moves to at each movement step (steps 0,2,4,6) */
    var TUTORIAL_STEP_ANGLES = [135, 90, 225, 270];
    var TUT = [
      { bubble: "right", btn: "right" },   /* step 0: move right → 135° */
      { bubble: "cut", btn: "cut" },     /* step 1: cut at 135° */
      { bubble: "right", btn: "right" },   /* step 2: move right → 90° */
      { bubble: "cut", btn: "cut" },     /* step 3: cut at 90° */
      { bubble: "left", btn: "left" },    /* step 4: move left → 225° */
      { bubble: "cut", btn: "cut" },     /* step 5: cut at 225° */
      { bubble: "left", btn: "left" },    /* step 6: move left → 270° */
      { bubble: "cut", btn: "cut" }      /* step 7: cut at 270° — last, advance to play */
    ];

    function setupTutorial() {
      var r = currentRound();
      state.tutActive = true;
      state.tutStep = -1;
      state.tutMoveVOPlayed = false;
      state.tutCutVOPlayed = false;
      state.locked = false;
      state.angle = TUTORIAL_START_ANGLE;
      /* Decode-gate the tutorial background swap. resetScene already left
         sceneBg at display:none with src=Mainbg.png; if we flip src to
         BgForTutorial and show it before the new bitmap is decoded, the
         element repaints its last-decoded frame (Mainbg) for a frame — the
         reported "wrong background for a sec" flash. Keep it hidden, swap the
         src, then reveal only once the new bitmap is ready. The asset is
         warm-cached at startup, so decode() resolves on the next microtask
         and the reveal is effectively instant with no Mainbg frame. */
      els.sceneBg.style.display = "none";
      els.sceneBg.src = ASSETS + "BgForTutorial.png";
      var revealTutorialBg = function () { els.sceneBg.style.display = "block"; };
      if (typeof els.sceneBg.decode === "function") {
        els.sceneBg.decode().then(revealTutorialBg, revealTutorialBg);
      } else {
        revealTutorialBg();
      }
      setupBots("layout-laser");
      setInstruction("");
      /* LaserMachine.png as tutorial overlay; LaserMachineWithoutLines stays as base */
      els.tutorialOverlay.classList.add("show");
      els.machineBlock.innerHTML = "";
      els.machineBlock.appendChild(makeBlock(r, r.blockW, r.blockH));
      els.blockCover.style.width = (r.blockW + 22) + "px";
      els.blockCover.style.height = (r.blockH + 22) + "px";
      els.blockCover.style.borderRadius = (r.name === "circle" ? "50%" : "18px");
      els.blockCover.style.opacity = "1";
      els.cutLine.style.width = (r.blockW + 12) + "px";
      els.cutLine.style.height = (r.blockH + 12) + "px";
      els.cutLine.style.borderRadius = (r.name === "circle" ? "50%" : "0");
      els.cutLine.classList.remove("show");
      els.wrongSlash.style.width = els.blockCover.style.width;
      els.wrongSlash.style.height = els.blockCover.style.height;
      els.wrongSlash.style.borderRadius = els.blockCover.style.borderRadius;
      state.orbitActive = true;
      snapLaser(TUTORIAL_START_ANGLE);
      showLaserHead();
      [els.bubbleLeft, els.bubbleRight, els.bubbleCut].forEach(function (el) {
        el.classList.add("fade");
      });
      if (els.handGesture) els.handGesture.className = "hand-gesture hidden";
      els.cutOverlay.classList.remove("show");
      els.hitLeft.disabled = true;
      els.hitRight.disabled = true;
      els.hitCut.disabled = true;
      show(els.machineStage);
      later(function () {
        if (state.tutActive && state.tutStep === -1) {
          tutSetStep(0);
        }
      }, 900);
    }

    function tutSetStep(n) {
      state.tutStep = n;
      var t = TUT[n];
      setInstruction("");
      els.bots.className = "layout-clear";
      if (els.handGesture) els.handGesture.className = "hand-gesture hidden";
      els.cutOverlay.classList.remove("show");

      els.btnLeft.classList.remove("tut-highlight");
      els.btnRight.classList.remove("tut-highlight");
      els.btnCut.classList.remove("tut-highlight");

      if (t.bubble === "left") {
        els.bubbleLeft.classList.remove("fade");
        if (els.handGesture) els.handGesture.className = "hand-gesture point-left show";
        els.btnLeft.classList.add("tut-highlight");
        if (!state.tutMoveVOPlayed) { playInstructionAudio("Tap to move."); state.tutMoveVOPlayed = true; }
      }
      if (t.bubble === "right") {
        els.bubbleRight.classList.remove("fade");
        if (els.handGesture) els.handGesture.className = "hand-gesture point-right show";
        els.btnRight.classList.add("tut-highlight");
        if (!state.tutMoveVOPlayed) { playInstructionAudio("Tap to move."); state.tutMoveVOPlayed = true; }
      }
      if (t.bubble === "cut") {
        els.bubbleCut.classList.remove("fade");
        if (els.handGesture) els.handGesture.className = "hand-gesture point-cut show";
        els.btnCut.classList.add("tut-highlight");
        if (!state.tutCutVOPlayed) { playInstructionAudio("Tap to cut."); state.tutCutVOPlayed = true; }
      }
      els.hitLeft.disabled = (t.btn !== "left");
      els.hitRight.disabled = (t.btn !== "right");
      els.hitCut.disabled = (t.btn !== "cut");
    }

    function tutHandleRight() {
      var step = state.tutStep;
      if (!state.tutActive || state.locked) { return; }
      if (step < 0 || step >= TUT.length || TUT[step].btn !== "right") { return; }
      pressButton(els.hitRight);
      sndRotate();
      [els.bubbleLeft, els.bubbleRight, els.bubbleCut].forEach(function (el) { el.classList.add("fade"); });
      if (els.handGesture) els.handGesture.className = "hand-gesture hidden";
      state.angle = normalizedAngle(state.angle - 45);
      updateLaser(); /* smooth orbital rotation — NO beam */
      els.hitLeft.disabled = true;
      els.hitRight.disabled = true;
      els.hitCut.disabled = true;
      later(function () { tutSetStep(step + 1); }, 520);
    }

    function tutHandleLeft() {
      var step = state.tutStep;
      if (!state.tutActive || state.locked) { return; }
      if (step < 0 || step >= TUT.length || TUT[step].btn !== "left") { return; }
      pressButton(els.hitLeft);
      sndRotate();
      [els.bubbleLeft, els.bubbleRight, els.bubbleCut].forEach(function (el) { el.classList.add("fade"); });
      if (els.handGesture) els.handGesture.className = "hand-gesture hidden";
      state.angle = normalizedAngle(state.angle + 45);
      updateLaser(); /* smooth orbital rotation — NO beam */
      els.hitLeft.disabled = true;
      els.hitRight.disabled = true;
      els.hitCut.disabled = true;
      later(function () { tutSetStep(step + 1); }, 520);
    }

    function tutHandleCut() {
      var step = state.tutStep;
      if (!state.tutActive || state.locked) { return; }
      if (step < 0 || step >= TUT.length || TUT[step].btn !== "cut") { return; }
      state.locked = true;
      pressButton(els.hitCut);
      sndCut();
      [els.bubbleLeft, els.bubbleRight, els.bubbleCut].forEach(function (el) { el.classList.add("fade"); });
      if (els.handGesture) els.handGesture.className = "hand-gesture hidden";
      els.cutOverlay.classList.remove("show");
      els.hitLeft.disabled = true;
      els.hitRight.disabled = true;
      els.hitCut.disabled = true;
      showBeam(state.angle); /* Beam.svg fires on CUT */
      later(function () {
        hideBeam();
        splitMachineBlock(state.angle);
      }, 950);
      later(function () {
        if (step < TUT.length - 1) {
          resetTutorialCut();
          state.locked = false;
          tutSetStep(step + 1);
        } else {
          state.tutActive = false;
          lowerThemeAfterTutorial();
          nextStep();
        }
      }, 1900);
    }

    function resetTutorialCut() {
      var r = currentRound();

    function setupPreplay(text) {
      state.locked = false;

      els.playButtonImg.src = ASSETS + "PlayButton.png";
      els.playButtonImg.alt = "Play";

      els.playStage.classList.remove("play-exit");

      els.playButton.style.opacity = "0";
      els.playButton.style.transform = "scale(0.85) translateY(16px)";
      els.iraChar.classList.remove("play-idle");
      els.iraChar.style.transition = "none";
      els.iraChar.style.transform = "translateX(1200px)";
      els.iraGlowRing.classList.remove("show");
      seedPlayMagic();

      function revealPlayButton() {
        els.iraChar.style.transition = "";
        els.iraChar.classList.add("play-idle");
        els.playButton.style.opacity = "1";
        els.playButton.style.transform = "scale(1) translateY(0)";
        els.playButton.classList.add("play-ready");
      }

      function startPreplaySequence() {
        // Guard against state changes that may have occurred while we waited
        // for the new background to finish decoding.
        if (FLOW[state.step] && FLOW[state.step].scene !== "preplay") { return; }
        show(els.playStage);

        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            els.iraChar.style.transition = "transform 0.72s cubic-bezier(0.25, 1.1, 0.4, 1)";
            els.iraChar.style.transform = "translateX(0)";
            later(function () { els.iraGlowRing.classList.add("show"); }, 680);
          });

        // After Ira finishes sliding in, play "You are all set." then "Let's play.",
        // then reveal the Play button.
        later(function () {
          var first = playInstructionAudio("You are all set.");
          whenInstructionAudioEnds(first, function () {
            var second = playInstructionAudio("Let's play.");
            whenInstructionAudioEnds(second, function () {
              revealPlayButton();
            });

        }, 760);
      }

      // Wait for the new LetsPlayBG.png to finish decoding before unhiding the
      // stage; otherwise the <img> keeps painting the previously-decoded
      // GameStartScreen.png for a frame, flashing the start screen.
      if (typeof els.playBg.decode === "function") {
        els.playBg.decode().then(startPreplaySequence, startPreplaySequence);
      } else {
        startPreplaySequence();
      }
    }

    function setupLaserIntro(text) {

    function setupLaser() {
      var r = currentRound();
      els.sceneBg.style.display = "block";
      setInstruction("");
      setupBots("layout-laser");
      state.angle = r.startAngle;
      state.locked = false;
      state.wrongAttempts = 0;
      /* Gameplay: no tutorial overlay */
      els.tutorialOverlay.classList.remove("show", "supportive-guide");
      els.machineBlock.innerHTML = "";
      els.machineBlock.appendChild(makeBlock(r, r.blockW, r.blockH));
      els.blockCover.style.width = (r.blockW + 22) + "px";
      els.blockCover.style.height = (r.blockH + 22) + "px";
      els.blockCover.style.borderRadius = (r.name === "circle" ? "50%" : "18px");
      els.blockCover.style.opacity = "1";
      els.cutLine.style.width = (r.blockW + 12) + "px";
      els.cutLine.style.height = (r.blockH + 12) + "px";
      els.cutLine.style.borderRadius = (r.name === "circle" ? "50%" : "0");
      els.cutLine.classList.remove("show");
      els.wrongSlash.style.width = els.blockCover.style.width;
      els.wrongSlash.style.height = els.blockCover.style.height;
      els.wrongSlash.style.borderRadius = els.blockCover.style.borderRadius;
      state.orbitActive = true;
      snapLaser(r.startAngle);
      showLaserHead();
      /* Gameplay starts clean; tutorial prompts are only shown in the guided flow. */
      [els.bubbleLeft, els.bubbleRight, els.bubbleCut].forEach(function (el) {
        el.classList.add("fade");
      });
      show(els.machineStage);
      applyAttemptGuides();
      startIdleHint();
    }

    /* ── Orbital laser system — all geometry is anchored to the ring and nozzle. ── */
    var MACHINE_NATIVE_SIZE = 1454;
    var RING_INNER_R_NATIVE = 488;

    var LASER_SRC_W = 258;
    var LASER_SRC_H = 172;
    var LASER_W = 96;
    var LASER_H = 64;
    /* Source-pixel anchors in Laser.png: rear body pivot and glowing emission point. */
    var LASER_BODY_SRC_X = 42;
    var LASER_BODY_SRC_Y = 86;
    var LASER_NOZZLE_SRC_X = 238;
    var LASER_NOZZLE_SRC_Y = 86;

    var BEAM_NATIVE_SIZE = 683;
    var BEAM_START_NATIVE = 98.8398;
    var BEAM_END_NATIVE = 583.34;
    var BEAM_START_PCT = BEAM_START_NATIVE / BEAM_NATIVE_SIZE;
    var BEAM_LINE_PCT = (BEAM_END_NATIVE - BEAM_START_NATIVE) / BEAM_NATIVE_SIZE;

    function ringGeometry() {
      var w = els.machineStage.clientWidth || 900;
      var styles = getComputedStyle(els.machineStage);
      var ringSize = parseFloat(styles.getPropertyValue("--ring-size")) || 500;
      var centerY = parseFloat(styles.getPropertyValue("--ring-center-y")) || ringSize / 2;
      var ringScale = ringSize / MACHINE_NATIVE_SIZE;
      return {
        centerX: w / 2,
        centerY: centerY,
        radius: RING_INNER_R_NATIVE * ringScale
      };
    }

    function laserAnchors(deg) {
      var g = ringGeometry();
      var orbitRad = deg * Math.PI / 180;
      var beamRad = orbitRad + Math.PI;
      var laserScale = LASER_W / LASER_SRC_W;
      var bodyLocalX = LASER_BODY_SRC_X * laserScale;
      var bodyLocalY = LASER_BODY_SRC_Y * laserScale;
      var nozzleLocalX = LASER_NOZZLE_SRC_X * laserScale;
      var nozzleLocalY = LASER_NOZZLE_SRC_Y * laserScale;
      var bodyOffset = nozzleLocalX - bodyLocalX;

      var orbitX = g.centerX + g.radius * Math.cos(orbitRad);
      var orbitY = g.centerY + g.radius * Math.sin(orbitRad);
      var laserX = orbitX - Math.cos(beamRad) * bodyOffset;
      var laserY = orbitY - Math.sin(beamRad) * bodyOffset;

      return {
        nozzleX: orbitX,
        nozzleY: orbitY,
        bodyX: laserX,
        bodyY: laserY,
        bodyLocalX: bodyLocalX,
        bodyLocalY: bodyLocalY,
        nozzleLocalX: nozzleLocalX,
        nozzleLocalY: nozzleLocalY,
        rotationDeg: deg + 180,
        radius: g.radius
      };
    }

    function positionLaser(deg) {
      var p = laserAnchors(deg);
      els.laserImg.style.left = (p.bodyX - p.bodyLocalX) + "px";
      els.laserImg.style.top = (p.bodyY - p.bodyLocalY) + "px";
      els.laserImg.style.transformOrigin = p.bodyLocalX + "px " + p.bodyLocalY + "px";
      els.laserImg.style.transform = "rotate(" + p.rotationDeg + "deg)";
    }

    function positionBeam(deg) {
      var p = laserAnchors(deg);
      var beamLength = p.radius * 1.72;
      var beamSize = beamLength / BEAM_LINE_PCT;
      var startPx = BEAM_START_PCT * beamSize;
      els.beamImg.style.width = beamSize + "px";
      els.beamImg.style.height = beamSize + "px";
      els.beamImg.style.left = (p.nozzleX - startPx) + "px";
      els.beamImg.style.top = (p.nozzleY - startPx) + "px";
      els.beamImg.style.transformOrigin = startPx + "px " + startPx + "px";
      /* Beam.svg points 45° by default; deg + 135° aims it from nozzle to center. */
      els.beamImg.style.transform = "rotate(" + (deg + 135) + "deg)";
      els.wrongSlash.style.setProperty("--cut-angle", deg + "deg");
      els.cutLine.style.setProperty("--cut-angle", deg + "deg");
    }

    function showBeam(deg) {
      positionBeam(deg);
      els.beamImg.style.display = "block";
      els.beamImg.style.opacity = "1";
    }

    function showCutLine(deg) {
      els.cutLine.style.setProperty("--cut-angle", deg + "deg");
      els.cutLine.style.width = "";
      els.cutLine.style.height = "";
      els.cutLine.style.borderRadius = "";
      els.cutLine.classList.add("show", "correct-guide");
    }

    function showMachineGuideLine(deg) {
      els.tutorialOverlay.classList.remove("show", "supportive-guide", "line-guide");
      els.guideLineHighlight.classList.remove("show");
      els.guideLineHighlight.style.clipPath = "";
      els.cutLine.classList.remove("show", "correct-guide");
      var idx = machineSvgLineIndexForAngle(deg);
      loadLaserMachineSvg().then(function (svgText) {
        if ((state.wrongAttempts || 0) < 2) { return; }
        els.machineSvgLayer.innerHTML = svgText;
        var svg = els.machineSvgLayer.querySelector("svg");
        if (svg) {
          svg.setAttribute("preserveAspectRatio", "xMidYMid meet");
          var lines = svg.querySelectorAll("line");
          lines.forEach(function (ln) { ln.classList.remove("correct-line-glow"); });
          if (idx >= 0 && lines[idx]) {
            lines[idx].classList.add("correct-line-glow");
          }
        }
        els.machineSvgLayer.classList.add("show");
        els.machineImg.style.display = "none";
      });
    }

    function hideBeam() {
      els.beamImg.style.opacity = "0";
      setTimeout(function () {
        if (els.beamImg.style.opacity === "0") { els.beamImg.style.display = "none"; }
      }, 220);
    }

    function _animateOrbit() {
      if (!state.orbitActive) { return; }
      var diff = state.orbitTarget - state.orbitCurrent;
      /* shortest-arc wraparound */
      if (diff > 180) { diff -= 360; }
      if (diff < -180) { diff += 360; }
      state.orbitCurrent += diff * 0.18;
      positionLaser(state.orbitCurrent);
      if (Math.abs(diff) > 0.3) {
        state.orbitRaf = requestAnimationFrame(_animateOrbit);
      } else {
        state.orbitCurrent = state.orbitTarget;
        positionLaser(state.orbitCurrent);
        state.orbitRaf = null;
      }
    }

    function snapLaser(deg) {
      if (state.orbitRaf) { cancelAnimationFrame(state.orbitRaf); state.orbitRaf = null; }
      state.orbitCurrent = deg;
      state.orbitTarget = deg;
      positionLaser(deg);
    }

    function updateLaser() {
      state.orbitTarget = state.angle;
      if (!state.orbitActive) { return; }
      if (state.orbitRaf) { cancelAnimationFrame(state.orbitRaf); state.orbitRaf = null; }
      state.orbitRaf = requestAnimationFrame(_animateOrbit);
    }

    function showLaserHead() {
      els.laserImg.style.display = "block";
      /* beam stays hidden until CUT */
      els.beamImg.style.display = "none";
      els.cutLine.classList.remove("show");
    }

    function pressButton(button) {
      button.classList.remove("pressed");
      void button.offsetWidth;
      button.classList.add("pressed");

      if (button === els.hitLeft) {
        els.btnLeft.src = ASSETS + "LeftButtonClicked.png";
        setTimeout(function () { els.btnLeft.src = ASSETS + "LeftButton.png"; }, 220);
      } else if (button === els.hitRight) {
        els.btnRight.src = ASSETS + "RightButtonClicked.png";
        setTimeout(function () { els.btnRight.src = ASSETS + "RightButton.png"; }, 220);
      } else if (button === els.hitCut) {
        els.btnCut.src = ASSETS + "ClickedCutButton.png";
        setTimeout(function () { els.btnCut.src = ASSETS + "CutButton.png"; }, 320);
      }
    }

    function rotateLaser(delta, button) {
      if (state.locked) { return; }
      stopIdleHint();
      pressButton(button);
      sndRotate();
      [els.bubbleLeft, els.bubbleRight, els.bubbleCut].forEach(function (el) { el.classList.add("fade"); });
      state.angle = (state.angle + delta + 360) % 360;
      updateLaser();
      startIdleHint();
    }

    function angleDiff(a, b) {
      var diff = Math.abs(a - b) % 360;
      return diff > 180 ? 360 - diff : diff;
    }

    function acceptedCutAnglesForRound(r) {
      if (r.acceptedAngles && r.acceptedAngles.length) {
        return r.acceptedAngles;
      }
      var targets = [r.targetAngle];
      if (r.targetAngle2 !== undefined) { targets.push(r.targetAngle2); }
      return targets;
    }

    function isCorrectCutForRound(r, angle) {
      return acceptedCutAnglesForRound(r).some(function (target) {
        return angleDiff(angle, target) <= 8;
      });
    }

    function resolvedCutAngleForRound(r, angle) {
      if (r.successAngle !== undefined && isCorrectCutForRound(r, angle)) {
        return r.successAngle;
      }
      return angle;
    }

    function wrongPieceClip(angle, index) {
      var normalized = ((angle % 360) + 360) % 360;
      var diagonalDown = (normalized > 90 && normalized < 270);
      if (diagonalDown) {
        return index === 0 ? "polygon(0 0,100% 0,100% 100%)" : "polygon(0 0,0 100%,100% 100%)";
      }
      return index === 0 ? "polygon(0 0,100% 0,0 100%)" : "polygon(100% 0,100% 100%,0 100%)";
    }

    function machineCenterInGame() {
      var styles = getComputedStyle(els.machineStage);
      var top = parseFloat(styles.top) || 425;
      var height = els.machineStage.clientHeight || 600;
      var centerY = parseFloat(styles.getPropertyValue("--ring-center-y")) || 250;
      return {
        x: 640,
        y: top - height / 2 + centerY
      };
    }

    function slotTargetsFromFills() {
      var leftW = parseFloat(els.leftFill.style.width || "0");
      var leftH = parseFloat(els.leftFill.style.height || "0");
      var rightW = parseFloat(els.rightFill.style.width || "0");
      var rightH = parseFloat(els.rightFill.style.height || "0");
      var leftSlot = els.leftFill.parentNode;
      var rightSlot = els.rightFill.parentNode;
      var leftX = (leftSlot.offsetLeft || 20) + leftSlot.offsetWidth / 2 + parseFloat(els.leftFill.style.marginLeft || "0");
      var rightX = (rightSlot.offsetLeft || 1000) + rightSlot.offsetWidth / 2 + parseFloat(els.rightFill.style.marginLeft || "0");
      var leftY = parseFloat(els.leftFill.style.top || "0") + leftH / 2;
      var rightY = parseFloat(els.rightFill.style.top || "0") + rightH / 2;
      return [
        { x: leftX, y: leftY, width: leftW, height: leftH },
        { x: rightX, y: rightY, width: rightW, height: rightH }
      ];
    }

    function cutBlock() {
      if (state.locked) { return; }
      stopIdleHint();
      var r = currentRound();
      state.locked = true;
      state.lastCutAngle = state.angle;
      pressButton(els.hitCut);
      sndCut();
      [els.bubbleLeft, els.bubbleRight, els.bubbleCut].forEach(function (el) { el.classList.add("fade"); });
      showBeam(state.angle); /* Beam.svg fires on CUT — was hidden during alignment */

      later(function () {
        hideBeam();
        var correct = isCorrectCutForRound(r, state.angle);
        if (correct) {
          state.lastCutAngle = resolvedCutAngleForRound(r, state.angle);
          showSuccess();
        } else {
          showFail();
        }
      }, 650);
    }

    function slotScaleForPiece(target, piece) {
      return Math.min(
        (target.width || piece.width) / piece.width,
        (target.height || piece.height) / piece.height
      );
    }

    /* ──────────────────────────────────────────────────────────────────────
       Semicircle hollow-fit system - last two flows (circle-diagonal rounds).

       Each diagonal-circle pod PNG is a half-disc with an OPAQUE dark hollow
       and a light rim. The orange fill is drawn at the measured hollow radius;
       a small chord-only tuck hides the dark hollow along the flat edge without
       growing the circular arc or the visible stroke.

       Geometry was measured from the hollow PNGs (fractions of pod image width):
         fx,fy - disc centre        fR - disc radius
         diamAng - flat-edge angle  keepDir - direction into the filled half  */
    var DIAG_HOLLOW_GEOMETRY = {
      "45angleCircleHollow.png":     { fx: 0.6132, fy: 0.4026, fR: 0.3670, diamAng: 42.5,   keepDir: 135.37, fillFlatPad: 0.20 },
      "135anglecutCircleHollow.png": { fx: 0.3861, fy: 0.6050, fR: 0.3586, diamAng: 44.40,  keepDir: -43.08, fillExpandPx: 1.7 },
      "CircleLastFlowHollow1.png":   { fx: 0.6308, fy: 0.6373, fR: 0.3732, diamAng: 134.50, keepDir: -135.26 },
      "CircleLastFlowHollow2.png":   { fx: 0.4199, fy: 0.3817, fR: 0.3501, diamAng: 136.5,  keepDir: 45.21, fillFlatPad: 0.20, fillAngleOffset: -0.75 }
    };
    var DIAG_FILL_OVERSCALE = 1.02; // overscale ~2% — arc still seals AA slivers, leaves room for the explicit SVG rim above it
    var DIAG_FILL_FLATPAD   = 0.075; // chord-only tuck; does not increase the circular radius
    var DIAG_FOCUS_RADIUS_FRAC = 0.365; // slot-instruct cyan cue: ONE size for both sides (equal); biased small to avoid spill

    function podBasename(src) {
      return String(src || "").split("/").pop();
    }

    function angDiffAbs(a, b) {
      var d = ((a - b) % 360 + 540) % 360 - 180;
      return Math.abs(d);
    }

    /* A circular-segment path in the SVG's own coordinates. flatPad pushes
       the chord outward (keeps the chord further from the disc centre, so
       the flat edge stays tucked past the diameter line). expandPx adds N
       SVG units to the ARC radius without moving the chord — this is how
       the orange fill grows past the hollow's measured rim by exactly N px
       to cover anti-aliased white slivers, instead of growing via uniform
       transform scale (which also distorts the chord). */
    function semicircleSegmentPath(cx, cy, r, diamAng, keepDir, flatPad, expandPx) {
      var rad = Math.PI / 180;
      var sign = angDiffAbs(diamAng + 90, keepDir) < angDiffAbs(diamAng - 90, keepDir) ? 1 : -1;
      var keepN = diamAng + sign * 90;
      var off = r * flatPad;
      var foot = { x: cx - Math.cos(keepN * rad) * off, y: cy - Math.sin(keepN * rad) * off };
      var rArc = r + (expandPx || 0);
      var halfChord = Math.sqrt(Math.max(0, rArc * rArc - off * off));
      var t = { x: Math.cos(diamAng * rad), y: Math.sin(diamAng * rad) };
      var A = { x: foot.x + t.x * halfChord, y: foot.y + t.y * halfChord };
      var B = { x: foot.x - t.x * halfChord, y: foot.y - t.y * halfChord };
      var aA = Math.atan2(A.y - cy, A.x - cx);
      var aB = Math.atan2(B.y - cy, B.x - cx);
      var span = aB - aA;
      if (sign > 0) { while (span < 0) { span += Math.PI * 2; } }
      else { while (span > 0) { span -= Math.PI * 2; } }
      var steps = 48;
      var path = "M" + A.x.toFixed(2) + "," + A.y.toFixed(2);
      for (var i = 1; i <= steps; i++) {
        var a = aA + span * (i / steps);
        path += " L" + (cx + Math.cos(a) * rArc).toFixed(2) + "," + (cy + Math.sin(a) * rArc).toFixed(2);
      }
      return path + " Z";
    }

    function diagPodH(r, side) {
      return (r.podW || 132) * (side === "right" ? (r.podAspectRight || r.podAspectLeft || 2.3)
                                                 : (r.podAspectLeft || 2.3));
    }

    /* Builds the orange semicircle-segment SVG for a diagonal-circle pod, sized to the
       pod box (podW × podH). Shared by the in-slot fill AND the fly-in piece,
       so the two are pixel-identical and the hand-off shows no shape/rotation
       change.
       Returns { svg, cx, cy, rr } (disc centre + radius in the SVG's coordinates). */
    function buildDiagSemicircleSvg(r, side, podW, podH) {
      var geo = DIAG_HOLLOW_GEOMETRY[podBasename(side === "right" ? r.podRight : r.podLeft)];
      if (!geo) { return null; }
      var cx = geo.fx * podW;
      var cy = geo.fy * podW;
      var fillScale = DIAG_FILL_OVERSCALE;
      var fillFlatPad = geo.fillFlatPad !== undefined ? geo.fillFlatPad : DIAG_FILL_FLATPAD;
      var fillAngle = geo.diamAng + (geo.fillAngleOffset || 0);
      var fillKeepDir = geo.keepDir + (geo.fillAngleOffset || 0);
      var rr = geo.fR * podW * fillScale;
      /* Local arc-only expansion (in SVG/CSS units): nudges ONLY the curved
         rim outward to seal sub-pixel AA slivers. The chord side is
         untouched — flatPad places it against the original radius `rr`,
         not `rArc`, so the flat edge stays tucked exactly where it was
         and can't spill past the pod's diagonal cut. The explicit SVG rim
         above the fill now owns the visible rim, so the arc can fully
         cover the AA gap without exposing the PNG's hollow band.

         Default 1.0 closed the hairline on three of four pods. The fourth
         (135anglecutCircleHollow.png) has the smallest measured radius
         (fR 0.3586) and the default 0.075 chord tuck, so it had the least
         arc cushion and still left a tiny visible hole — overridden via
         geo.fillExpandPx so only that pod expands further, leaving the
         clean pods exactly as they were. */
      var arcExpandPx = geo.fillExpandPx !== undefined ? geo.fillExpandPx : 1.0;
      var d = semicircleSegmentPath(cx, cy, rr, fillAngle, fillKeepDir, fillFlatPad, arcExpandPx);

      var ns = "http://www.w3.org/2000/svg";
      var svg = document.createElementNS(ns, "svg");
      svg.setAttribute("viewBox", "0 0 " + podW + " " + podH);
      svg.setAttribute("width", podW);
      svg.setAttribute("height", podH);
      svg.setAttribute("shape-rendering", "geometricPrecision");
      svg.style.overflow = "visible";
      svg.style.pointerEvents = "none";
      svg.style.transform = "translateZ(0)";
      svg.style.transformBox = "fill-box";
      svg.style.transformOrigin = "center center";
      svg.style.backfaceVisibility = "hidden";
      svg.style.willChange = "transform";

      var clipId = "diag-hollow-clip-" + Math.random().toString(36).substr(2, 9);
      var defs = document.createElementNS(ns, "defs");
      var clip = document.createElementNS(ns, "clipPath");
      clip.setAttribute("id", clipId);
      var path = document.createElementNS(ns, "path");
      path.setAttribute("d", d);
      path.setAttribute("vector-effect", "non-scaling-stroke");
      path.setAttribute("shape-rendering", "geometricPrecision");
      clip.appendChild(path);
      defs.appendChild(clip);
      svg.appendChild(defs);

      var blockSize = rr * 2.4; // orange block comfortably covers the clip region
      var image = document.createElementNS(ns, "image");
      image.setAttributeNS("http://www.w3.org/1999/xlink", "href", r.blockSrc);
      image.setAttribute("href", r.blockSrc);
      image.setAttribute("x", cx - blockSize / 2);
      image.setAttribute("y", cy - blockSize / 2);
      image.setAttribute("width", blockSize);
      image.setAttribute("height", blockSize);
      image.setAttribute("preserveAspectRatio", "none");
      image.setAttribute("clip-path", "url(#" + clipId + ")");
      svg.appendChild(image);

      /* Dedicated rim stroke layer ABOVE the orange fill — uses the EXACT
         same `d` as the clip path, so the rim hugs the orange edge with
         zero drift. vector-effect:non-scaling-stroke keeps the rim at a
         constant 2.5px regardless of any parent scale. The stroke is
         centered on the path, so the orange covers the inner half from
         below while the outer half sits over the PNG's natural hollow
         band — the visible result is a clean 2.5px embedded rim. The
         hollow geometry is well inside the pod outline (~3–7px inset on
         the chord, similarly on the arc), so a 1.25px overshoot can't
         reach the pod boundary.

         Rim starts hidden (opacity 0) and is activated by the caller —
         the fly-in path fades it in as motion begins; the in-slot path
         shows it briefly then settles to a subtle level. Animation is
         pure opacity (no scaling) so the geometry never drifts. */
      var rim = document.createElementNS(ns, "path");
      rim.setAttribute("d", d);
      rim.setAttribute("fill", "none");
      rim.setAttribute("stroke", "#ffffff");
      rim.setAttribute("stroke-width", "2.5");
      rim.setAttribute("stroke-linejoin", "round");
      rim.setAttribute("stroke-linecap", "round");
      rim.setAttribute("vector-effect", "non-scaling-stroke");
      rim.setAttribute("shape-rendering", "geometricPrecision");
      rim.style.transformBox = "fill-box";
      rim.style.transformOrigin = "center center";
      rim.style.opacity = "0";
      rim.style.transition = "opacity .55s cubic-bezier(.4,0,.2,1)";
      svg.appendChild(rim);
      return { svg: svg, cx: cx, cy: cy, rr: rr, rim: rim };
    }

    /* Game-space centre of a diagonal-circle hollow at the ready/charging layout, so the
       fly-in half can travel directly to its final aligned spot (no post-landing fix-up). */
    function diagHollowGameCenter(r, side) {
      var geo = DIAG_HOLLOW_GEOMETRY[podBasename(side === "right" ? r.podRight : r.podLeft)];
      if (!geo) { return null; }
      var podW = r.podW || 132;
      var botSlotLeft = side === "right" ? (1280 - 80 - 260) : 80; // layout-ready bot-slot
      var podCenterX = botSlotLeft + 130 + podXOffsetForRound(r, side);
      var podTop = podTopForRound(r, "layout-ready", side);
      return { x: podCenterX - podW / 2 + geo.fx * podW, y: podTop + geo.fy * podW };
    }

    /* Single source of truth for fitting the orange piece into a diagonal-circle
       hollow. The overlay is anchored to the pod box (read live from the pod/fill
       layout, which move together) and clipped to the measured hollow shape. */
    function fitSemicircleIntoHollow(r, side, fill) {
      var podEl = side === "right" ? els.rightPod : els.leftPod;
      var podW = r.podW || 132;
      var built = buildDiagSemicircleSvg(r, side, podW, diagPodH(r, side));
      if (!built || !podEl) { return false; }

      // The fill tracks the pod with a constant offset through every layout/
      // transition, so positioning the overlay relative to the pod box (read
      // from the live inline styles) keeps it locked to the hollow.
      var podML = parseFloat(podEl.style.marginLeft) || 0;
      var podTop = parseFloat(podEl.style.top) || 0;
      var fillML = parseFloat(fill.style.marginLeft) || 0;
      var fillTop = parseFloat(fill.style.top) || 0;
      var fillW = parseFloat(fill.style.width) || podW;
      var svg = built.svg;
      svg.style.position = "absolute";
      /* Snap to integer pixels so the SVG's internal path raster is consistent
         frame to frame and the disc centre lands on a whole-pixel boundary —
         subpixel positioning was a residual source of AA shimmer on the rim. */
      svg.style.left = Math.round((podML - fillML) + (fillW - podW) / 2) + "px";
      svg.style.top = Math.round(podTop - fillTop) + "px";

      var shell = document.createElement("div");
      shell.className = "fit-piece";
      shell.style.position = "absolute";
      shell.style.left = "0";
      shell.style.top = "0";
      shell.style.width = "0";
      shell.style.height = "0";
      shell.style.overflow = "visible";
      shell.appendChild(svg);

      fill.innerHTML = "";
      fill.appendChild(shell);
      fill.classList.add("filled");

      /* Rim handoff: the fly-in piece ended at opacity 0.92 right before
         it was removed. Snap the in-slot rim to the same level on its
         first mounted frame (no transition, so there's no flash), then
         gently fade down to a subtle settled level on the next frame.
         Net effect: the socket "activates" during movement, then relaxes
         once the piece is home. */
      if (built.rim) {
        var rimEl = built.rim;
        rimEl.style.transition = "opacity 0s";
        rimEl.style.opacity = "0.92";
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            rimEl.style.transition = "opacity .55s cubic-bezier(.4,0,.2,1)";
            rimEl.style.opacity = "0.42";
          });
        });
      }
      return true;
    }

    function fillSlotWithPiece(fill, r, index, angle) {
      var w = parseFloat(fill.style.width || "0");
      var h = parseFloat(fill.style.height || "0");
      var side = fill === els.rightFill ? "right" : "left";
      /* Re-apply the pod mask-band (now skipped in setupBots so the empty
         pod doesn't show a "cable cut") so the cream neck taper stays
         hidden behind the orange piece. Only the round/side combinations
         that actually declare a mask-band get one — others stay
         unmasked. The mask is set BEFORE the fill DOM is rebuilt so the
         pod and the fill paint coherently on the same frame. */
      if (r && r.podMaskBand) {
        var maskPodEl = side === "right" ? els.rightPod : els.leftPod;
        applyPodMaskBand(maskPodEl, r.podMaskBand[side]);
      }
      if (r.name === "circle" && r.variant === "circle-vertical") {
        var diameter = h;
        var shell = document.createElement("div");
        shell.className = "fit-piece";
        shell.style.width = w + "px";
        shell.style.height = h + "px";
        shell.style.overflow = "hidden";
        shell.style.transformOrigin = "center center";
        shell.style.transform = "translateZ(0)";
        shell.style.filter = "none";

        var block = makeBlock(r, diameter, diameter);
        block.style.position = "absolute";
        block.style.top = "0";
        block.style.left = side === "right" ? (-diameter / 2) + "px" : (w - diameter / 2) + "px";
        block.style.width = diameter + "px";
        block.style.height = diameter + "px";
        block.style.filter = "none";

        shell.appendChild(block);
        fill.innerHTML = "";
        fill.appendChild(shell);
        fill.classList.add("filled");
        return;
      }
      if (r.name === "circle" && r.variant === "circle-diagonal" && r.slotFocus) {
        if (fitSemicircleIntoHollow(r, side, fill)) {
          return;
        }
      }
      var piece = makeCutPiece(r, index, r.blockW, r.blockH, angle);
      var home = cutPieceHome(r.blockW, r.blockH, angle, index, 0, 0);
      var scale = slotScaleForPiece({ width: w, height: h }, home) * visualFitScaleForRound(r);
      fill.innerHTML = "";
      var dyOffset = (r.name === "rectangle" && !r.variant) ? "-8px" : "0px";
      piece.classList.add("fit-piece");
      piece.style.transformOrigin = "center center";
      var fitScaleXY = r.fitPieceScale;
      var sideScale = fitScaleXY && (fitScaleXY.left || fitScaleXY.right)
        ? (side === "right" ? fitScaleXY.right : fitScaleXY.left)
        : fitScaleXY;
      if (sideScale) {
        var sx = scale * (sideScale.x || 1);
        var sy = scale * (sideScale.y || 1);
        piece.style.transform = "translateZ(0) translateY(" + dyOffset + ") scale(" + sx + ", " + sy + ")";
      } else {
        piece.style.transform = "translateZ(0) translateY(" + dyOffset + ") scale(" + scale + ")";
      }
      piece.style.filter = "none";
      fill.appendChild(piece);
      fill.classList.add("filled");
    }

    function renderResultSplitScreen(r, angle) {
      var cutAngle = angle === undefined ? canonicalCutAngle(r) : angle;
      var orientation = cutOrientation(cutAngle);
      var pieces = [];
      els.shapeStage.innerHTML = "";
      els.shapeStage.style.opacity = "";

      var wrap = document.createElement("div");
      wrap.className = "split-demo";
      wrap.style.width = r.blockW + "px";
      wrap.style.height = r.blockH + "px";

      [0, 1].forEach(function (index) {
        var g = pieceGeometry(r.blockW, r.blockH, cutAngle, index);
        var piece = makeCutPiece(r, index, r.blockW, r.blockH, cutAngle);
        piece.style.position = "absolute";
        piece.style.left = g.minX + "px";
        piece.style.top = g.minY + "px";
        piece.style.opacity = "1";
        piece.style.filter = "none";
        pieces.push(piece);
        wrap.appendChild(piece);
      });

      var offsets = splitOffsetForOrientation(orientation, resultSplitGapForRound(r, orientation));
      pieces.forEach(function (piece, index) {
        piece.style.transform = "translate(" + offsets[index].x + "px," + offsets[index].y + "px)";
      });

      els.shapeStage.appendChild(wrap);
      show(els.shapeStage);
    }

    function hideResultSplitScreen() {
      hide(els.shapeStage);
      els.shapeStage.innerHTML = "";
    }

    function addChargingPulses() {
      function addPulse(slotEl) {
        var pulse = document.createElement("div");
        pulse.className = "electric-pulse";
        slotEl.appendChild(pulse);
        setTimeout(function () { if (pulse.parentNode) pulse.parentNode.removeChild(pulse); }, 1200);
      }
      addPulse(document.querySelector(".left-bot"));
      addPulse(document.querySelector(".right-bot"));
    }

    function switchBotsToHappy(r) {
      els.leftBot.src = r.happyBot;
      els.rightBot.src = r.happyBot;
      var hw = r.botWIntro + "px";
      els.leftBot.style.width = hw;
      els.rightBot.style.width = hw;
      els.leftBot.style.marginLeft = happyBotXOffsetForRound(r, "left") + "px";
      els.rightBot.style.marginLeft = happyBotXOffsetForRound(r, "right") + "px";
      var happyLift = r.happyBotLift !== undefined ? r.happyBotLift : 10;
      els.leftBot.style.bottom = happyLift + "px";
      els.rightBot.style.bottom = happyLift + "px";
      els.leftBot.classList.add("happy");
      els.rightBot.classList.add("happy");
      els.leftPod.classList.add("charged-focus");
      els.rightPod.classList.add("charged-focus");
      els.leftFill.classList.add("charged-focus");
      els.rightFill.classList.add("charged-focus");

      var happyAspect = r.happyBotAspect || r.botAspect || 1.2;
      var newBotTop = 720 - r.botWIntro * happyAspect;
      var podW = r.podW || 132;
      var aspectL = r.podAspectLeft || 2.3;
      var aspectR = r.podAspectRight || r.podAspectLeft || 2.3;
      var happyContactNudge = r.happyConnectorNudge !== undefined ? r.happyConnectorNudge : 10;
      var chargerOverlap = chargerOverlapForRound(r) +
        connectorOverlapBoostForRound(r, "layout-intro-connected") +
        (r.podHeadContactDrop || 0) +
        happyContactNudge;
      var newTopL = newBotTop - podW * aspectL + chargerOverlap;
      var newTopR = newBotTop - podW * aspectR + chargerOverlap;

      var leftHappyPodX = happyPodXOffsetForRound(r, "left");
      var rightHappyPodX = happyPodXOffsetForRound(r, "right");

      els.leftPod.style.transition = "top 0.4s ease, margin-left 0.4s ease";
      els.rightPod.style.transition = "top 0.4s ease, margin-left 0.4s ease";
      els.leftFill.style.transition = "top 0.4s ease, margin-left 0.4s ease";
      els.rightFill.style.transition = "top 0.4s ease, margin-left 0.4s ease";

      els.leftPod.style.top = newTopL + "px";
      els.rightPod.style.top = newTopR + "px";
      els.leftPod.style.marginLeft = leftHappyPodX + "px";
      els.rightPod.style.marginLeft = rightHappyPodX + "px";
      els.leftFill.style.top = (newTopL + targetSlotOffsetForRound(r, "left")) + "px";
      els.rightFill.style.top = (newTopR + targetSlotOffsetForRound(r, "right")) + "px";
      els.leftFill.style.marginLeft = (targetSlotXOffsetForRound(r, "left") + leftHappyPodX) + "px";
      els.rightFill.style.marginLeft = (targetSlotXOffsetForRound(r, "right") + rightHappyPodX) + "px";
      addConnectorStemCover(els.leftBot.parentNode, els.leftPod);
      addConnectorStemCover(els.rightBot.parentNode, els.rightPod);

      [els.leftBot.parentNode, els.rightBot.parentNode].forEach(function (slot) {
        slot.classList.remove("celebrate-jump");
        void slot.offsetWidth;
        slot.classList.add("celebrate-jump");
      });
      /* Clear the inline transitions once the happy-position animation has
         settled, so they cannot leak into the next round's setupBots (which
         would re-animate pod/fill positions during a question change).
         resetScene also clears these defensively; this is the matched
         cleanup at the source. 480ms = the 400ms transition + a small
         safety buffer. */
      setTimeout(function () {
        [els.leftPod, els.rightPod, els.leftFill, els.rightFill].forEach(function (el) {
          if (el) { el.style.transition = ""; }
        });
      }, 480);
    }

    /* ── fly the two half-pieces from a result/machine center to bot charging slots ── */
    function flyHalvesToSlots(r, angle, onDone, centerOverride) {
      var layer = els.flightLayer;
      layer.innerHTML = "";

      var center = centerOverride || machineCenterInGame();
      var targets = slotTargetsFromFills();

      [0, 1].forEach(function (slotIdx) {
        var pieceIdx = pieceIndexForSlot(r, slotIdx);
        var side = slotIdx === 0 ? "left" : "right";

        // Diagonal-circle rounds: fly the SAME semicircle SVG the slot fill uses, straight
        // into the hollow's final spot. The hand-off to the in-slot overlay is then
          // pixel-identical (same shape, angle, size, position) - no landing fix-up.
        if (r.name === "circle" && r.variant === "circle-diagonal" &&
          DIAG_HOLLOW_GEOMETRY[podBasename(side === "right" ? r.podRight : r.podLeft)]) {
          var dPodW = r.podW || 132;
          var dPodH = diagPodH(r, side);
          var built = buildDiagSemicircleSvg(r, side, dPodW, dPodH);
          var hc = diagHollowGameCenter(r, side);
          var dFly = document.createElement("div");
          dFly.className = "flying-half";
          dFly.style.width = dPodW + "px";
          dFly.style.height = dPodH + "px";
          /* Start position snapped to integer pixels — subpixel left/top
             shifts the AA pattern relative to the path interior and produces
             a visible hairline at the rim. */
          dFly.style.left = Math.round(center.x - built.cx) + "px";
          dFly.style.top = Math.round(center.y - built.cy) + "px";
          dFly.style.transformOrigin = built.cx + "px " + built.cy + "px";
          dFly.style.transition = "transform .9s cubic-bezier(.18,.89,.32,1.08),opacity .9s ease";
          dFly.style.transform = "translate(0px,0px) scale(1)";
          dFly.appendChild(built.svg);
          layer.appendChild(dFly);
          (function (el, rimEl, tx, ty, delay) {
            setTimeout(function () {
              requestAnimationFrame(function () {
                el.style.transform = "translate(" + tx + "px," + ty + "px) scale(1)";
                /* The white rim stays OFF for the whole flight — the piece
                   travels as a plain orange semicircle. It only lights up
                   once the piece reaches the hollow (transitionend below). */
              });
            }, delay);
            /* Once the fly transition settles, re-lock the transform to whole
               pixels so the rasterised rim cannot drift by a subpixel as the
               browser composits the final frame, AND light the socket rim now
               that the piece has arrived in the hollow. The quick .3s fade
               completes well before the in-slot hand-off (fitSettleDelay
               1450ms vs flight 900ms), so the rim is already at 0.92 when the
               in-slot overlay snaps to the same level — no flash, no rim
               visible mid-flight. */
            el.addEventListener("transitionend", function lockToInteger(e) {
              if (e.propertyName && e.propertyName !== "transform") { return; }
              el.removeEventListener("transitionend", lockToInteger);
              el.style.transform = "translate(" + Math.round(tx) + "px," + Math.round(ty) + "px) scale(1)";
              if (rimEl) {
                rimEl.style.transition = "opacity .3s cubic-bezier(.4,0,.2,1)";
                rimEl.style.opacity = "0.92";
              }
            });
          })(dFly, built.rim, hc.x - center.x, hc.y - center.y, slotIdx * 100);
          return;
        }

        var home = cutPieceHome(r.blockW, r.blockH, angle, pieceIdx, center.x, center.y);
        if (centerOverride) {
          var startOffsets = splitOffsetForOrientation(
            cutOrientation(angle),
            resultSplitGapForRound(r, cutOrientation(angle))
          );
          home.left += startOffsets[pieceIdx].x;
          home.top += startOffsets[pieceIdx].y;
          home.centerX += startOffsets[pieceIdx].x;
          home.centerY += startOffsets[pieceIdx].y;
        }
        var fly = makeCutPiece(r, pieceIdx, r.blockW, r.blockH, angle);
        fly.classList.add("flying-half");
        fly.style.left = home.left + "px";
        fly.style.top = home.top + "px";
        fly.style.width = home.width + "px";
        fly.style.height = home.height + "px";
        fly.style.transformOrigin = "center center";
        fly.style.transition = "transform .9s cubic-bezier(.18,.89,.32,1.08),opacity .9s ease";

        layer.appendChild(fly);

        var scale = slotScaleForPiece(targets[slotIdx], home) * visualFitScaleForRound(r);
        var dx = targets[slotIdx].x - home.centerX;
        var dyOffset = (r.name === "rectangle" && !r.variant) ? 8 : 0;
        var dy = targets[slotIdx].y - home.centerY - dyOffset;
        var stagger = slotIdx * 100;
        setTimeout(function () {
          requestAnimationFrame(function () {
            fly.style.transform = "translate(" + dx + "px," + dy + "px) scale(" + scale + ")";
          });
        }, stagger);
      });

      setTimeout(onDone, r.fitSettleDelay || 1150);
    }

    function showSuccess() {
      var r = currentRound();
      var cutAngle = state.lastCutAngle;
      sndSuccess();
      splitMachineBlock(cutAngle);
      setInstruction("");

      function powerBotsWithHalves() {
        state.teachingActive = false;
        els.game.classList.remove("teaching-active");
        hide(els.teachStage);
        hide(els.machineStage);
        /* The plugs were already connected earlier; return to the connected
           ready state without replaying the plug-connection sequence. */
        setupBots("layout-ready");
        setInstruction("");
        renderResultSplitScreen(r, cutAngle);

        later(function () {
          hideResultSplitScreen();
          flyHalvesToSlots(r, cutAngle, function () {
            els.flightLayer.innerHTML = "";
            fillSlotWithPiece(els.leftFill, r, pieceIndexForSlot(r, 0), cutAngle);
            fillSlotWithPiece(els.rightFill, r, pieceIndexForSlot(r, 1), cutAngle);
            switchBotsToHappy(r);
            addChargingPulses();
            sndCorrectCharged();
            setInstruction("");

            var tgts = slotTargetsFromFills();
            burstCelebration(tgts[0].x, tgts[0].y);
            burstCelebration(tgts[1].x, tgts[1].y);

            var successAudio = setInstruction(SUCCESS_CHARGED_TEXT, { playThrough: true });
            whenInstructionAudioEnds(successAudio, function () {
              setInstruction("", { forceAudioStop: true });
              state.nextAction = null;
              els.nextButton.classList.add("is-success");
              els.nextButton.querySelector("img").src = "assets/NextButton2.png";
              show(els.nextButton);
            });
          }, { x: 640, y: 360 });
        }, 1100);
      }

      later(function () {
        setupBots("layout-laser");
        renderTeaching("teach-full", cutAngle, true, powerBotsWithHalves);
      }, 700);
    }

    function splitMachineBlock(angle) {
      var r = currentRound();
      var cutAngle = angle === undefined ? canonicalCutAngle(r) : angle;
      var orientation = cutOrientation(cutAngle);
      var trans = "transform 0.45s cubic-bezier(.34,1.3,.64,1)";
      var h0 = makeCutPiece(r, 0, r.blockW, r.blockH, cutAngle);
      var h1 = makeCutPiece(r, 1, r.blockW, r.blockH, cutAngle);
      /* Remove the half-wrap drop-shadow in the machine — it looks odd for circles/triangles */
      h0.style.filter = "none";
      h1.style.filter = "none";
      els.machineBlock.innerHTML = "";

      if (orientation === "slash" || orientation === "backslash") {
        var g0 = pieceGeometry(r.blockW, r.blockH, cutAngle, 0);
        var g1 = pieceGeometry(r.blockW, r.blockH, cutAngle, 1);
        var container = document.createElement("div");
        container.style.cssText = "position:relative;width:" + r.blockW + "px;height:" + r.blockH + "px;";
        h0.style.position = "absolute"; h0.style.left = g0.minX + "px"; h0.style.top = g0.minY + "px";
        h1.style.position = "absolute"; h1.style.left = g1.minX + "px"; h1.style.top = g1.minY + "px";
        container.appendChild(h0);
        container.appendChild(h1);
        els.machineBlock.appendChild(container);
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            h0.style.transition = trans;
            h1.style.transition = trans;
            if (orientation === "slash") {
              h0.style.transform = "translate(-3px,-3px)";
              h1.style.transform = "translate(3px,3px)";
            } else {
              h0.style.transform = "translate(3px,-3px)";
              h1.style.transform = "translate(-3px,3px)";
            }
          });
        });
        return;
      }

      var row = document.createElement("div");
      row.className = "halves-row";
      row.style.flexDirection = orientation === "vertical" ? "row" : "column";
      row.appendChild(h0);
      row.appendChild(h1);
      els.machineBlock.appendChild(row);
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          h0.style.transition = trans;
          h1.style.transition = trans;
          if (orientation === "vertical") {
            h0.style.transform = "translateX(-25px)";
            h1.style.transform = "translateX(25px)";
          } else {
            h0.style.transform = "translateY(-18px)";
            h1.style.transform = "translateY(18px)";
          }
        });
      });
    }

    function showFail() {
      var r = currentRound();
      var cutAngle = state.lastCutAngle || state.angle;
      state.wrongAttempts = (state.wrongAttempts || 0) + 1;

      els.wrongSlash.classList.remove("show");

      setInstruction("");

      function showWrongFitResult() {
        state.teachingActive = false;
        els.game.classList.remove("teaching-active");
        hide(els.teachStage);
        hide(els.machineStage);

        later(function () {

          els.rightPod.classList.add("glow");

              setInstruction("");

            });

    function restoreMachineForRetry(r) {
      els.flightLayer.innerHTML = "";
      els.machineStage.classList.remove("checking-fit");
      setupBots("layout-laser");
      show(els.machineStage);
      els.machineBlock.style.opacity = "";
      els.machineBlock.classList.remove("rejoin-pop");
      els.machineBlock.innerHTML = "";
      els.machineBlock.appendChild(makeBlock(r, r.blockW, r.blockH));
      void els.machineBlock.offsetWidth;
      els.machineBlock.classList.add("rejoin-pop");
      showLaserHead();
