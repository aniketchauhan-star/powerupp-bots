<!DOCTYPE html>
<!--
  ============================================================================
  THE STORY NIGHT  —  interactive 3D flipbook (Neel & the dragon)
  ----------------------------------------------------------------------------
  • No build step, no frameworks. Just open this file in any modern browser.
  • A real 3D hardcover book: it has thickness, a spine, sits angled and casts a
    soft shadow. Tap PLAY to open it (the cover swings on the spine), then flip.
  • Full-bleed picture-book pages: page 1 is a video, pages 2-4 are scenes with
    a speech bubble that pops in once you fully land on the page.
  • Structure is split into THREE files:
        index.html   → this markup
        styles.css   → all styling + the night theme + animations
        script.js    → the flip engine + the page content (EDIT PAGES THERE)
  ============================================================================
-->
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Power Up, Bots!</title>

<!-- ── Google Fonts: Fredoka (headings + speech bubbles) + Patrick Hand & Caveat ── -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Fredoka:wght@500;600;700&family=Patrick+Hand&display=swap"
  rel="stylesheet"
/>

<!-- All styling lives in styles.css -->
<link rel="stylesheet" href="styles.css" />
</head>

<body>
<!-- Landscape lock: on phones/tablets (touch), the book shows only in landscape.
     In portrait the scene is hidden and this rotate prompt is shown instead. -->
<div class="rotate-notice" id="rotateNotice">
  <div class="rotate-inner">
    <div class="rotate-icon">🔄</div>
    <div class="rotate-text">Please rotate your device<br />to landscape to read</div>
  </div>
</div>
<div class="scene">
  <div class="stage">
    <!-- Fixed 1280×720 book layer. JS scales it (transform) to fit the screen. -->
    <div class="flip-scale" id="flipScale">
    <!-- INNER scale wrapper: the open motion runs here, so it composes with the
         outer responsive scale of .flip-scale. -->
    <div class="book-stage" id="bookStage">
    <!-- Outer hardcover outline — visible once the book is open -->
    <div class="book-frame"></div>
    <div class="floor-shadow"></div>

    <!-- The page-turning book mounts here (JS injects one .leaf per page).
         Sits beneath the 3D cover layer; revealed once the cover swings open.
         .page-stack = the tan fore-edge of the pages still to be turned (right). -->
    <div id="flipbook">
      <div class="page-stack" aria-hidden="true"><i></i><i></i><i></i></div>
    </div>

    <!-- Moving shadow the opening cover casts on the inside page. -->
    <div class="cover-cast"></div>

    <!-- The 3D hardcover + cover-opening animation (own perspective layer). -->
    <div class="cover-scene" id="coverScene">
    <div class="book-float" id="bookFloat">
      <div class="book-pop" id="bookPop">
        <div class="book" id="book">
          <div class="book-inner" id="bookInner">

            <!-- Open-book back cover backing -->
            <div class="book-body"></div>

            <!-- The 3D page block that gives the closed book its thickness -->
            <div class="pageblock">
              <div class="pbf pb-back"></div>
              <div class="pbf pb-left"></div>
              <div class="pbf pb-right"></div>
              <div class="pbf pb-top"></div>
              <div class="pbf pb-bottom"></div>
              <div class="pbf pb-front"></div>
            </div>

            <!-- Front hardcover (last so it stacks in front when closed). -->
            <div class="cover-holder">
            <div class="cover" id="cover">
              <div class="face front">
                <div class="cover-img"></div>
                <!-- Clean futuristic edge glow (replaces the old ornate gold frame).
                     Styled entirely in styles.css → .cover .front .cover-frame. -->
                <div class="cover-frame" aria-hidden="true"></div>
                <div class="back-fill"></div>
                <div class="curl"></div>
                <button class="play-btn" id="hint" type="button" aria-label="Play — open the book">
                  <img class="play-img" src="assets/play button.png" alt="" aria-hidden="true" draggable="false" />
                </button>
              </div>
              <!-- BACK of the front cover: intentionally BLANK (plain dark board). -->
              <div class="face back"></div>
            </div>
            </div><!-- /cover-holder -->

          </div>
        </div>
      </div>
    </div>
    </div><!-- /cover-scene -->

    <!-- Flat, top-most, transparent tap zone that only OPENS the book. -->
    <div class="tap-catcher" id="tapCatcher"></div>

    <!-- (THE END is now a real final PAGE — the last leaf, built by script.js:
         a cream "paper" page with "THE END" + a Replay button. Replay closes the
         whole book, reverse of the opening swing, back to the front cover.) -->
    </div><!-- /book-stage -->
    </div><!-- /flip-scale -->
  </div>

  <!-- Progress read-out -->
  <!-- (page counter removed) -->
</div>

<!-- HOME button — top-left, shown only while reading (hidden on the cover, the
     last page and the end). Closes the book (reverse of the opening swing) back
     to the front cover. -->
<button class="home-btn" id="homeBtn" type="button" aria-label="Back to the cover">
  <svg viewBox="0 0 24 24" aria-hidden="true">
    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" fill="currentColor"/>
  </svg>
</button>

<!-- Flip arrows OUTSIDE the book, fixed at the viewport's bottom corners
     (bottom-left = back, bottom-right = forward). -->
<button class="corner-arrow back" id="cornerPrev" aria-label="Previous page">
  <svg viewBox="0 0 48 48" aria-hidden="true">
    <path d="M46 19 L30 5 L30 12 C20 11 11 15 6 30 L12 33 C18 24 22 24 30 24 L30 33 Z" fill="currentColor"/>
  </svg>
</button>
<button class="corner-arrow fwd" id="cornerNext" aria-label="Next page">
  <svg viewBox="0 0 48 48" aria-hidden="true">
    <path d="M46 19 L30 5 L30 12 C20 11 11 15 6 30 L12 33 C18 24 22 24 30 24 L30 33 Z" fill="currentColor"/>
  </svg>
</button>

<!-- (legacy hidden nav elements kept only so existing JS refs stay valid) -->
<button class="arrow prev" id="prev" aria-label="Previous page">‹</button>
<button class="arrow next" id="next" aria-label="Next page">›</button>

<!-- ============================================================================
     EMBEDDED GAME OVERLAY — "Power Up, Bots!" halves game (after the video-10 page).
     A BODY-LEVEL iframe (deliberately NOT inside the 3D book): a CSS transform on
     .flip-scale would trap position:fixed, so true fullscreen must live out here.
     • Landing on the game page opens this OVER the whole screen (see script.js →
       updateLbdOverlay / setLbdFullscreen).
     • When the game posts that it's complete, the overlay shrinks away and the book
       auto-turns to the next page (see the "message" listener in script.js).
     Styling: styles.css → .lbd-stage / .lbd-stage.fullscreen / #lbdFrame.
     ============================================================================ -->
<div class="lbd-stage" id="lbdStage" aria-hidden="true">
  <iframe id="lbdFrame" title="Power Up, Bots! — game"
          allow="autoplay; fullscreen"
          allowfullscreen></iframe>
</div>

<!-- ============================================================================
     ASSET MANIFEST  —  every uploaded asset, referenced here so it is visible in
     DevTools "Inspect" (Elements) and view-source. The flipbook itself builds its
     pages in script.js; this hidden block is ONLY a reference list. Nothing here
     is force-downloaded: videos/audio use preload="none" and images loading="lazy"
     inside a display:none container, so the src paths show in inspect with no cost.
     ============================================================================ -->
<div id="asset-manifest" hidden aria-hidden="true" style="display:none">
  <!-- ── Page videos ── -->
  <video preload="none" muted playsinline src="assets/1.mp4"            data-role="page-1"></video>
  <video preload="none" muted playsinline src="assets/2.mp4"            data-role="page-2"></video>
  <video preload="none" muted playsinline src="assets/3.mp4"            data-role="page-3"></video>
  <video preload="none" muted playsinline src="assets/4.mp4"            data-role="page-4"></video>
  <video preload="none" muted playsinline src="assets/5(rectangle).mp4" data-role="page-5-rectangle"></video>
  <video preload="none" muted playsinline src="assets/5(green).mp4"     data-role="page-5-green"></video>
  <video preload="none" muted playsinline src="assets/5(circle).mp4"    data-role="page-5-circle"></video>
  <video preload="none" muted playsinline src="assets/6.mp4"            data-role="page-6"></video>
  <video preload="none" muted playsinline src="assets/7.mp4"            data-role="page-7-intro"></video>
  <video preload="none" muted playsinline src="assets/7(2).mp4"         data-role="page-7-reveal"></video>
  <video preload="none" muted playsinline src="assets/8.mp4"            data-role="page-8-intro"></video>
  <video preload="none" muted playsinline src="assets/9.mp4"            data-role="page-8-reveal"></video>
  <video preload="none" muted playsinline src="assets/10.mp4"           data-role="page-10"></video>
  <video preload="none" muted playsinline src="assets/11.mp4"           data-role="page-11"></video>

  <!-- ── Images ── -->
  <img loading="lazy" src="assets/coverpage.png"      alt="cover"            data-role="cover" />
  <img loading="lazy" src="assets/5.png"              alt="page 5 shelf"     data-role="page-5-still" />
  <img loading="lazy" src="assets/7(1).png"           alt="page 7 still"     data-role="page-7-still" />
  <img loading="lazy" src="assets/handNudge.webp"     alt="hand nudge"       data-role="hand-nudge" />
  <img loading="lazy" src="assets/play%20button.png"  alt="play button art"  data-role="play-button" />

  <!-- ── Audio (sfx) ── -->
  <audio preload="none" src="sfx/Page%20flip.mp3"        data-role="sfx-page-flip"></audio>
  <audio preload="none" src="sfx/cover%20page%20flip.mp3" data-role="sfx-cover-flip"></audio>
</div>

<!-- Inlined one-shot SFX (base64) for glitch-free Web Audio playback on file:// -->
<script src="sfx-data.js"></script>
<!-- All behaviour lives in script.js -->
<script src="script.js"></script>
</body>
</html>
